<style>
.opsedu-cockpit {
  position: relative;
  flex: 0 0 auto;
  overflow: hidden;
  padding: 12px;
  color: #132f3c;
  background:
    radial-gradient(circle at 92% 8%, rgba(242, 181, 68, .22), transparent 26%),
    linear-gradient(135deg, #f7f1df 0%, #edf5ee 54%, #e2eef2 100%);
  border: 1px solid #b8c9c4;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(22, 57, 69, .1);
}
.eduops-main { overflow-x: hidden; overflow-y: auto; }
.opsedu-secondary-controls,
.opsedu-secondary-surface { flex: 0 0 auto; }
.opsedu-cockpit-header { display: flex; align-items: end; justify-content: space-between; gap: 14px; margin-bottom: 9px; }
.opsedu-cockpit-kicker { display: block; margin-bottom: 4px; color: #8b5415; font: 700 12px/1.2 Georgia, serif; letter-spacing: .11em; text-transform: uppercase; }

.opsedu-cockpit-header p { max-width: 520px; margin: 7px 0 0; color: #4d6872; }
.opsedu-cockpit-snapshot { color: #5c737b; font-size: 12px; text-align: right; }
.opsedu-cockpit-actions { display: grid; justify-items: end; gap: 7px; }
.opsedu-cockpit-actions .eduops-button { min-height: 32px; padding: 5px 9px; }
.opsedu-primary-buckets { display: grid; grid-template-columns: repeat(8, minmax(0, 1fr)); gap: 5px; margin-bottom: 9px; }
.opsedu-primary-bucket { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 2px 5px; min-height: 50px; padding: 6px 7px; color: #294953; text-align: left; background: rgba(255,255,255,.88); border: 1px solid #c5d4d0; border-radius: 7px; }
.opsedu-primary-bucket[aria-pressed="true"] { color: #fff; background: #173b56; border-color: #173b56; }

.opsedu-primary-bucket strong { grid-row: 1 / span 2; grid-column: 2; align-self: center; font: 700 20px/1 Georgia, serif; }

.opsedu-package-heading { margin: 0 0 7px; color: #173b56; font-size: 14px; font-weight: 650; }
.opsedu-action-packages { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
.opsedu-action-card { display: grid; grid-template-rows: auto auto 1fr auto; gap: 6px; min-height: 128px; padding: 11px; background: rgba(255,255,255,.9); border: 1px solid #c5d4d0; border-top: 4px solid #17656a; border-radius: 8px; box-shadow: 0 4px 12px rgba(23, 70, 76, .07); }
.opsedu-action-card[data-secondary="true"] { opacity: .72; border-top-color: #70858a; }

.opsedu-action-card-top strong { color: #123b45; font: 700 24px/1 Georgia, serif; }
.opsedu-action-card h3 { margin: 0; font: 700 16px/1.12 Georgia, serif; }
.opsedu-action-card p { display: -webkit-box; margin: 0; overflow: hidden; color: #526d74; font-size: 12px; line-height: 1.25; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.opsedu-action-card-meta { display: flex; flex-wrap: wrap; gap: 5px; }
.opsedu-action-card-meta span { padding: 4px 7px; color: #31545c; background: #e7f0ed; border-radius: 999px; font-size: 11px; }
.opsedu-cockpit[data-package-rail="collapsed"] .opsedu-action-packages,
.opsedu-cockpit[data-package-rail="collapsed"] .opsedu-package-heading { display: none; }

.opsedu-secondary-controls { margin: 0; border: 1px solid #cad7d9; border-radius: 8px; background: #f7faf9; }
.opsedu-secondary-controls > summary { cursor: pointer; padding: 10px 14px; color: #48616a; font-weight: 650; }
.opsedu-secondary-controls[open] > summary { border-bottom: 1px solid #cad7d9; }
.opsedu-context-ribbon { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.opsedu-context-item { display: grid; gap: 1px; padding: 4px 6px; background: #eef4f2; border: 1px solid #d1ddda; border-radius: 5px; }

.opsedu-context-item strong { color: #294c54; font-size: 11px; font-weight: 650; }
.opsedu-context-unavailable { margin-top: 7px; color: #8a3c32; font-size: 12px; }
.opsedu-trace { margin-top: 6px; color: #5c7178; font-size: 11px; }
.opsedu-trace summary { cursor: pointer; }
.opsedu-trace dl { display: grid; gap: 3px; margin: 5px 0 0; }

.opsedu-trace dt { font-weight: 700; }
.opsedu-trace dd { margin: 0; }

}
@media (max-width: 720px) {
  .opsedu-cockpit { padding: 15px; }
  .opsedu-cockpit-header { align-items: start; flex-direction: column; }
  .opsedu-cockpit-snapshot { text-align: left; }
  .opsedu-primary-buckets,
  .opsedu-action-packages { grid-template-columns: 1fr; }
}
</style>
