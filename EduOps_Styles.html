<style>
  .eduops-app{
    --eduops-bg:#edf3f0;
    --eduops-panel:#ffffff;
    --eduops-panel-2:#f8fbf9;
    --eduops-ink:#102033;
    --eduops-muted:#334b63;
    --eduops-soft:#5a7188;
    --eduops-line:#b9cadd;
    --eduops-rail:#0b2a3d;
    --eduops-blue:#145c9e;
    --eduops-green:#17643a;
    --eduops-amber:#8a5700;
    --eduops-red:#8b1e1e;
    --eduops-shadow:0 18px 42px rgba(13,36,57,.12);
    min-height:100vh;
    display:grid;
    grid-template-columns:270px minmax(0,1fr);
    background:linear-gradient(135deg,#e7f0ea 0,#eef5fb 46%,#f7f2e8 100%);
    color:var(--eduops-ink);
    font-family:"Aptos","Segoe UI",Arial,sans-serif;
    font-size:15px;
    line-height:1.45;
  }
  .eduops-app *{box-sizing:border-box}
  .eduops-app button,.eduops-app input,.eduops-app select{font:inherit}
  .eduops-app input,.eduops-app select{
    min-height:42px;
    border:1px solid #879db2;
    border-radius:10px;
    color:#102033;
    background:#fff;
    padding:8px 10px;
    font-size:15px;
    -webkit-text-fill-color:#102033;
  }
  .eduops-app input::placeholder{color:#5d748a;opacity:1}
  .eduops-app button{
    border:1px solid #8ea7bf;
    background:#fff;
    color:#102033;
    border-radius:10px;
    padding:9px 12px;
    font-weight:700;
    cursor:pointer;
  }
  .eduops-app button:focus,.eduops-app input:focus,.eduops-app select:focus{
    outline:3px solid rgba(255,188,61,.55);
    outline-offset:2px;
  }
  .eduops-rail{
    position:sticky;
    top:0;
    height:100vh;
    overflow:auto;
    padding:18px 14px;
    background:linear-gradient(180deg,var(--eduops-rail),#071d2e);
    color:#f5fbff;
  }
  .eduops-brand{display:flex;gap:12px;align-items:center;margin-bottom:16px}
  .eduops-logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:#e8f5ef;color:#0b2a3d;font-weight:900}
  .eduops-brand h1{margin:0;font-size:23px;line-height:1}
  .eduops-brand p{margin:4px 0 0;color:#cfe1ef}
  .eduops-runtime{display:grid;gap:4px;padding:12px;border:1px solid rgba(255,255,255,.22);border-radius:12px;background:rgba(255,255,255,.08);margin-bottom:14px}
  .eduops-runtime span{font-size:13px;color:#d6e7f5}
  .eduops-nav{display:grid;gap:8px}
  .eduops-nav button,.eduops-rail-button{
    width:100%;
    text-align:left;
    background:rgba(255,255,255,.08);
    color:#f8fbff;
    border-color:rgba(255,255,255,.24);
  }
  .eduops-nav button.active{background:#dff1e8;color:#0b2a3d;border-color:#a6d2bd}
  .eduops-main{min-width:0;padding:22px;display:grid;gap:14px}
  .eduops-hero,.eduops-panel,.eduops-reliability,.eduops-toolbar,.eduops-search-results,.eduops-kpis,.eduops-worklists,.eduops-scopes,.eduops-lenses{
    border:1px solid var(--eduops-line);
    background:rgba(255,255,255,.92);
    border-radius:16px;
    box-shadow:0 8px 22px rgba(13,36,57,.06);
  }
  .eduops-hero{display:flex;justify-content:space-between;gap:16px;padding:18px}
  .eduops-hero h2{margin:2px 0 6px;font-size:30px;line-height:1.05}
  .eduops-hero p{margin:0;color:var(--eduops-muted)}
  .eduops-kicker{margin:0 0 4px!important;text-transform:uppercase;letter-spacing:.08em;color:#42627d!important;font-size:12px;font-weight:900}
  .eduops-readonly-badge{align-self:start;border:1px solid #98c4ae;background:#e8f6ef;color:#114c2e;padding:8px 11px;border-radius:999px;font-weight:900}
  .eduops-reliability{padding:12px 14px;border-left:6px solid var(--eduops-green);font-weight:800;color:#14324b}
  .eduops-reliability[data-state="STALE"],.eduops-reliability[data-state="CONFLICTING"]{border-left-color:var(--eduops-amber);background:#fff8e8}
  .eduops-toolbar{padding:12px;display:grid;grid-template-columns:1fr 150px 1fr;gap:12px;align-items:end}
  .eduops-toolbar label{display:grid;gap:5px;font-weight:800;color:#213b55}
  .eduops-kpis,.eduops-worklists,.eduops-scopes,.eduops-lenses{padding:10px;display:flex;gap:8px;flex-wrap:wrap}
  .eduops-kpis button,.eduops-worklists button,.eduops-scopes button,.eduops-lenses button{background:#f8fbff}
  .eduops-kpis button.active,.eduops-worklists button.active,.eduops-scopes button.active,.eduops-lenses button.active{background:#dcecff;border-color:#5791c8;color:#0d477d}
  .eduops-scope-pin{display:flex;align-items:center;gap:7px;margin-left:auto;padding:8px 10px;border:1px solid #9fb3c5;border-radius:7px;background:#fff;color:#17344d;font-size:14px;font-weight:700}
  .eduops-scope-pin input{width:17px;height:17px;margin:0}
  .eduops-request-status{margin-top:5px;color:#294761;font-size:13px;font-weight:650}
  .eduops-request-status[data-state="LOADING"],.eduops-request-status[data-state="QUEUED"]{color:#875600}
  .eduops-request-status[data-state="ERROR"]{color:#a4251b}
  .eduops-request-status[data-state="COMPLETE"]{color:#17633b}
  .eduops-panel{overflow:hidden}
  .eduops-panel-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px;border-bottom:1px solid var(--eduops-line);background:var(--eduops-panel-2)}
  .eduops-panel-head h3{margin:0;font-size:20px}
  .eduops-panel-head p{margin:4px 0 0;color:var(--eduops-muted)}
  .eduops-secondary{background:#f7fbff!important}
  .eduops-table-wrap{overflow:auto}
  .eduops-table{width:100%;border-collapse:collapse;min-width:980px}
  .eduops-table th,.eduops-table td{padding:11px 12px;border-bottom:1px solid #d7e2ec;text-align:left;vertical-align:top}
  .eduops-table th{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:#294761;background:#f5f9fc}
  .eduops-table td{font-size:14px;color:#14283c}
  .eduops-table strong{font-size:15px}
  .eduops-code{font-family:"Cascadia Mono","Consolas",monospace;font-size:13px;color:#294761}
  .eduops-pill{display:inline-block;border:1px solid #9bb3c8;border-radius:999px;padding:3px 8px;font-size:13px;font-weight:900;background:#f7fbff;color:#173b5e}
  .eduops-pill.ready{background:#e6f6ee;color:#135232;border-color:#9ed1b7}
  .eduops-pill.warn{background:#fff4da;color:#754a00;border-color:#d7b15d}
  .eduops-pill.block{background:#fdeaea;color:#842020;border-color:#df9a9a}
  .eduops-pagination{padding:12px;display:flex;justify-content:flex-end;gap:10px;align-items:center}
  .eduops-search-results{padding:12px}
  .eduops-search-item{display:flex;justify-content:space-between;gap:12px;padding:10px;border:1px solid #d2deea;border-radius:12px;margin-bottom:8px;background:#fff}
  .eduops-lens-panel{padding:14px}
  .eduops-workbench,.eduops-drawer{position:fixed;inset:0;background:rgba(7,24,39,.62);z-index:1000;padding:20px;display:grid;place-items:center}
  .eduops-workbench[hidden],.eduops-drawer[hidden]{display:none}
  .eduops-workbench-card,.eduops-drawer-card{width:min(1180px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px;border:1px solid #9bb3c8;box-shadow:var(--eduops-shadow)}
  .eduops-workbench-card>header,.eduops-drawer-card>header{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px;border-bottom:1px solid var(--eduops-line);background:#f5faf7}
  .eduops-workbench-card h2,.eduops-drawer-card h2{margin:0;font-size:24px}
  .eduops-tabs{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--eduops-line)}
  .eduops-tabs button.active{background:#dcecff;color:#0d477d}
  .eduops-workbench-body,.eduops-drawer-card #eduopsDrawerBody{padding:16px}
  .eduops-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .eduops-detail-card{border:1px solid #d2deea;border-radius:14px;padding:12px;background:#fff}
  .eduops-detail-card h4{margin:0 0 8px;font-size:16px}
  .eduops-detail-card p{margin:4px 0;color:#263f56}
  .eduops-disabled-action{display:block;margin-top:8px;padding:8px;border:1px dashed #b6c5d4;border-radius:10px;background:#f6f8fa;color:#334b63;font-weight:800}
  @media (max-width:900px){
    .eduops-app{grid-template-columns:1fr}
    .eduops-rail{position:relative;height:auto}
    .eduops-toolbar{grid-template-columns:1fr}
    .eduops-hero{display:grid}
    .eduops-detail-grid{grid-template-columns:1fr}
  }
</style>
