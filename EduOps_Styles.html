<style>
.eduops-body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  overflow: hidden;
  background: #eaf0f5;
}

.eduops-app,
.eduops-app * {
  box-sizing: border-box;
}

.eduops-app {
  --eduops-navy-950: #071b2c;
  --eduops-navy-900: #0b2740;
  --eduops-navy-800: #123c5e;
  --eduops-blue-700: #1559a6;
  --eduops-blue-600: #1f6fc2;
  --eduops-blue-100: #e7f1fb;
  --eduops-ink: #10283b;
  --eduops-ink-soft: #385267;
  --eduops-line: #b8c8d5;
  --eduops-line-strong: #8199ac;
  --eduops-canvas: #eef3f7;
  --eduops-surface: #ffffff;
  --eduops-surface-alt: #f6f9fb;
  --eduops-teal: #087d73;
  --eduops-teal-soft: #dff4ef;
  --eduops-amber: #9a5b00;
  --eduops-amber-soft: #fff0ce;
  --eduops-red: #a52c32;
  --eduops-red-soft: #fde8e8;
  --eduops-green: #197246;
  --eduops-green-soft: #e2f4e9;
  --eduops-slate: #566b7c;
  --eduops-shadow: 0 16px 42px rgba(7, 27, 44, 0.16);
  width: 100%;
  height: 100vh;
  overflow: hidden;
  color: var(--eduops-ink);
  background:
    linear-gradient(135deg, rgba(21, 89, 166, 0.055), transparent 38%),
    repeating-linear-gradient(90deg, transparent 0, transparent 63px, rgba(18, 60, 94, 0.025) 64px),
    var(--eduops-canvas);
  font-family: "Aptos", "Segoe UI Variable", "Trebuchet MS", sans-serif;
  font-size: 15px;
  line-height: 1.38;
}

.eduops-app[data-product="KIA"] {
  --eduops-blue-700: #0f6f6b;
  --eduops-blue-600: #148780;
  --eduops-blue-100: #e1f4f1;
}

.eduops-app[data-product="MLC"] {
  --eduops-blue-700: #9a4b13;
  --eduops-blue-600: #ba6225;
  --eduops-blue-100: #fff0e4;
}

:where(.eduops-app) button,
:where(.eduops-app) input,
:where(.eduops-app) select,
:where(.eduops-app) textarea {
  color: var(--eduops-ink);
  font: inherit;
  font-size: 15px;
}

.eduops-app input::placeholder,
.eduops-app textarea::placeholder {
  color: #61788a;
  opacity: 1;
}

.eduops-app button,
.eduops-app select {
  cursor: pointer;
}

.eduops-app button:disabled,
.eduops-app select:disabled,
.eduops-app input:disabled,
.eduops-app textarea:disabled {
  cursor: not-allowed;
  color: #465d6f;
  background: #e8edf1;
  border-color: #aab9c5;
  opacity: 1;
}

.eduops-app button:focus-visible,
.eduops-app input:focus-visible,
.eduops-app select:focus-visible,
.eduops-app textarea:focus-visible,
.eduops-app [tabindex]:focus-visible {
  outline: 3px solid #f2a900;
  outline-offset: 2px;
}

.eduops-app h1,
.eduops-app h2,
.eduops-app h3,
.eduops-app h4,
.eduops-app p {
  margin-top: 0;
}

.eduops-app h1,
.eduops-app h2,
.eduops-app h3,
.eduops-app h4,
.eduops-brand strong,
.eduops-kpi-value {
  font-family: "Bahnschrift", "Franklin Gothic Medium", "Aptos Display", sans-serif;
  letter-spacing: -0.018em;
}

.eduops-visually-hidden {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  padding: 0 !important;
  margin: -1px !important;
  overflow: hidden !important;
  clip: rect(0, 0, 0, 0) !important;
  white-space: nowrap !important;
  border: 0 !important;
}

.eduops-skip-link {
  position: fixed;
  z-index: 500;
  top: 8px;
  left: 8px;
  transform: translateY(-150%);
  padding: 10px 14px;
  color: #ffffff;
  background: #071b2c;
  border-radius: 5px;
  font-weight: 700;
}

.eduops-skip-link:focus {
  transform: translateY(0);
}

.eduops-topbar {
  position: relative;
  z-index: 40;
  display: grid;
  grid-template-columns: 220px minmax(240px, 1fr) auto;
  align-items: center;
  height: 58px;
  color: #ffffff;
  background:
    linear-gradient(100deg, rgba(255, 255, 255, 0.035), transparent 46%),
    var(--eduops-navy-950);
  border-bottom: 1px solid #25465f;
  box-shadow: 0 3px 12px rgba(7, 27, 44, 0.2);
}

.eduops-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 100%;
  padding: 0 12px;
  border-right: 1px solid #315168;
}

.eduops-brand-mark {
  display: grid;
  width: 32px;
  height: 32px;
  place-items: center;
  color: #ffffff;
  background: linear-gradient(145deg, var(--eduops-blue-600), #0c466f);
  border: 1px solid rgba(255, 255, 255, 0.46);
  border-radius: 7px 7px 14px 7px;
}

.eduops-brand-mark svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

.eduops-brand strong,
.eduops-brand small {
  display: block;
}

.eduops-brand strong {
  font-size: 18px;
  line-height: 1;
}

.eduops-brand small {
  margin-top: 4px;
  color: #c8d9e5;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.035em;
}

.eduops-topbar-context {
  min-width: 0;
  padding: 0 20px;
}

.eduops-topbar-context span,
.eduops-topbar-context strong {
  display: block;
}

.eduops-context-label {
  color: #afc8d9;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.eduops-topbar-context strong {
  overflow: hidden;
  margin-top: 2px;
  font-size: 15px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.eduops-topbar-tools {
  display: flex;
  align-items: center;
  gap: 14px;
  height: 100%;
  padding: 0 18px;
}

.eduops-snapshot {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 14px;
  border-right: 1px solid #315168;
}

.eduops-snapshot strong,
.eduops-snapshot small {
  display: block;
}

.eduops-snapshot strong {
  font-size: 12px;
}

.eduops-snapshot small {
  color: #bdd0dd;
  font-size: 11px;
}

.eduops-release-identity,
.eduops-release-snapshot {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.eduops-release-identity {
  max-width: 310px;
}

.eduops-release-identity span,
.eduops-release-identity strong,
.eduops-release-identity small {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.eduops-release-identity > span,
.eduops-release-identity small {
  color: #bdd0dd;
  font-size: 11px;
}

.eduops-release-snapshot {
  margin-top: 2px;
}

.eduops-release-snapshot strong {
  font-size: 11px;
}

.eduops-status-dot {
  width: 9px;
  height: 9px;
  background: #4ed29b;
  border: 2px solid #c9f5e2;
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(78, 210, 155, 0.16);
}

.eduops-profile-control {
  display: grid;
  grid-template-columns: auto 92px;
  align-items: center;
  gap: 8px;
  color: #d8e5ed;
  font-size: 12px;
  font-weight: 700;
}

.eduops-profile-control select {
  min-height: 36px;
  padding: 5px 28px 5px 10px;
  color: #ffffff;
  background: #173b56;
  border: 1px solid #638198;
  border-radius: 5px;
  font-weight: 700;
}

.eduops-release-badge {
  display: inline-flex;
  align-items: center;
  min-height: 27px;
  padding: 4px 8px;
  color: #ffedbf;
  background: #523b10;
  border: 1px solid #98722a;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.025em;
  white-space: nowrap;
}

.eduops-global-search-strip {
  position: relative;
  z-index: 35;
  min-height: 38px;
  padding: 4px 8px;
  background: #e9f0f3;
  border-bottom: 1px solid #c6d5dd;
}

.eduops-global-search-strip .eduops-global-search {
  display: grid;
  grid-template-columns: minmax(380px, 0.72fr) minmax(280px, 1fr);
  gap: 8px;
  align-items: start;
  min-height: 0;
  max-width: 1480px;
  margin: 0 auto;
  padding: 0;
  background: transparent;
  border: 0;
  box-shadow: none;
}

.eduops-global-search-strip .eduops-global-search label {
  grid-template-columns: 126px minmax(0, 1fr);
  gap: 8px;
  min-height: 30px;
  font-size: 13px;
  font-weight: 600;
}

.eduops-global-search-strip .eduops-global-search input {
  min-height: 30px;
  padding: 4px 8px;
  font-size: 14px;
}

.eduops-global-search-strip .eduops-global-search-results {
  margin-top: 0;
  max-height: 118px;
}

.eduops-global-search-strip .eduops-search-result {
  grid-template-columns: minmax(260px, 1fr) auto;
  gap: 7px;
  padding: 6px 7px;
  font-size: 12px;
}

.eduops-global-search-strip .eduops-search-result strong {
  font-size: 13px;
  font-weight: 600;
}

.eduops-global-search-strip .eduops-search-result small {
  margin-top: 1px;
  font-size: 11px;
}

.eduops-global-search-strip .eduops-search-placeholder {
  display: inline;
  font-size: 12px;
}

.eduops-shell {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  height: calc(100vh - 97px);
}

.eduops-rail {
  position: relative;
  z-index: 20;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden auto;
  color: #dce8ef;
  background:
    linear-gradient(180deg, rgba(31, 111, 194, 0.11), transparent 34%),
    var(--eduops-navy-900);
  border-right: 1px solid #1c4664;
}

.eduops-rail-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 45px;
  padding: 0 11px 0 16px;
  color: #8fb4ce;
  border-bottom: 1px solid #274a62;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.eduops-icon-button {
  display: inline-grid;
  width: 36px;
  height: 36px;
  padding: 0;
  place-items: center;
  color: inherit;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
}

.eduops-icon-button:hover {
  background: rgba(255, 255, 255, 0.09);
  border-color: rgba(255, 255, 255, 0.18);
}

.eduops-icon-button svg,
.eduops-button svg,
.eduops-back-button svg,
.eduops-safety-banner svg {
  width: 19px;
  height: 19px;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2;
}

.eduops-action-nav,
.eduops-secondary-nav {
  display: grid;
  gap: 3px;
  padding: 8px;
}

.eduops-action-nav button,
.eduops-secondary-nav button {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  width: 100%;
  min-height: 42px;
  padding: 8px 9px 8px 11px;
  color: #dce8ef;
  text-align: left;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
}

.eduops-action-nav button:hover,
.eduops-secondary-nav button:hover {
  color: #ffffff;
  background: #163d59;
  border-color: #315875;
}

.eduops-action-nav button[aria-current="page"] {
  position: relative;
  color: #ffffff;
  background: var(--eduops-blue-700);
  border-color: #4e88bd;
  box-shadow: inset 4px 0 0 #ffc24c;
}

.eduops-nav-count,
.eduops-secondary-nav small {
  min-width: 27px;
  padding: 2px 6px;
  color: #dce8ef;
  background: #234962;
  border: 1px solid #365d76;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 800;
  text-align: center;
}

.eduops-action-nav button[aria-current="page"] .eduops-nav-count {
  color: #09243b;
  background: #ffffff;
  border-color: #ffffff;
}

.eduops-nav-state-marker {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin-right: 8px;
  background: #8ba4b6;
  border: 1px solid #d9e3e9;
  border-radius: 2px;
}

.eduops-nav-state-marker[data-state="READY"] { background: #43bf85; }
.eduops-nav-state-marker[data-state="COOLING_OFF"] { background: #f4b53f; }
.eduops-nav-state-marker[data-state="AWAITING_APPLICANT"] { background: #55a7d6; }
.eduops-nav-state-marker[data-state="AWAITING_PAYMENT"] { background: #d9953a; }
.eduops-nav-state-marker[data-state="REVIEW_REQUIRED"] { background: #e47b55; }
.eduops-nav-state-marker[data-state="BLOCKED"] { background: #d44d58; }
.eduops-nav-state-marker[data-state="UNKNOWN"] { background: #98a0aa; }

.eduops-rail-section {
  margin-top: 3px;
  border-top: 1px solid #274a62;
}

.eduops-rail-label {
  display: block;
  padding: 10px 16px 3px;
  color: #8fb4ce;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.eduops-secondary-nav {
  padding-top: 4px;
}

.eduops-secondary-nav button {
  min-height: 36px;
  font-size: 13px;
}

.eduops-rail-pass {
  color: #baf2d6 !important;
  background: #15513b !important;
  border-color: #267558 !important;
}

.eduops-rail-footer {
  display: grid;
  gap: 2px;
  margin-top: auto;
  padding: 13px 16px 16px;
  color: #b8cfdd;
  border-top: 1px solid #274a62;
  font-size: 11px;
}

.eduops-rail-footer strong {
  color: #ffffff;
  font-size: 12px;
}

.eduops-main {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;
  min-height: 0;
  padding: 10px 14px 12px;
  overflow: hidden;
}

.eduops-safety-banner {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 9px;
  min-height: 38px;
  padding: 7px 11px;
  color: #593b04;
  background: #fff5d9;
  border: 1px solid #d7ad4e;
  border-left: 4px solid #c47b09;
  border-radius: 5px;
  font-size: 13px;
}

.eduops-safety-banner svg {
  width: 20px;
  height: 20px;
}

.eduops-safety-banner button {
  padding: 3px 0;
  color: #704805;
  background: transparent;
  border: 0;
  border-bottom: 1px solid currentColor;
  font-size: 13px;
  font-weight: 800;
}

.eduops-overview {
  flex: 0 0 auto;
}

.eduops-page-heading {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  padding: 0 2px 8px;
}

.eduops-eyebrow {
  display: block;
  margin-bottom: 2px;
  color: var(--eduops-blue-700);
  font-size: 11px;
  font-weight: 850;
  letter-spacing: 0.105em;
  text-transform: uppercase;
}

.eduops-page-heading h1 {
  margin-bottom: 1px;
  color: var(--eduops-navy-950);
  font-size: clamp(24px, 2vw, 31px);
  line-height: 1.08;
}

.eduops-page-heading p {
  margin-bottom: 0;
  color: var(--eduops-ink-soft);
  font-size: 13px;
}

.eduops-heading-actions,
.eduops-workspace-actions,
.eduops-selection-actions,
.eduops-confirm-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.eduops-button,
.eduops-back-button {
  display: inline-flex;
  min-height: 30px;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 5px 9px;
  color: var(--eduops-ink);
  background: #ffffff;
  border: 1px solid var(--eduops-line-strong);
  border-radius: 5px;
  font-size: 13px;
  font-weight: 650;
  text-decoration: none;
}

.eduops-button:hover:not(:disabled),
.eduops-back-button:hover {
  border-color: var(--eduops-blue-700);
  box-shadow: 0 2px 6px rgba(16, 40, 59, 0.1);
}

.eduops-button-primary {
  color: #ffffff;
  background: var(--eduops-blue-700);
  border-color: var(--eduops-blue-700);
}

.eduops-button-primary:hover:not(:disabled) {
  color: #ffffff;
  background: var(--eduops-navy-800);
}

.eduops-button-secondary {
  background: #ffffff;
}

.eduops-button-quiet {
  color: var(--eduops-blue-700);
  background: transparent;
  border-color: transparent;
}

.eduops-button-danger {
  color: #ffffff;
  background: var(--eduops-red);
  border-color: var(--eduops-red);
}

.eduops-kpi-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(108px, 1fr));
  gap: 7px;
}

.eduops-kpi-card {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  grid-template-rows: auto auto;
  min-height: 77px;
  padding: 9px 10px 8px;
  color: var(--eduops-ink);
  text-align: left;
  background: var(--eduops-surface);
  border: 1px solid var(--eduops-line);
  border-top: 4px solid var(--eduops-state-color, #8199ac);
  border-radius: 6px;
  box-shadow: 0 2px 5px rgba(16, 40, 59, 0.05);
}

.eduops-kpi-card:hover {
  border-right-color: var(--eduops-state-color, #8199ac);
  border-bottom-color: var(--eduops-state-color, #8199ac);
  border-left-color: var(--eduops-state-color, #8199ac);
  transform: translateY(-1px);
}

.eduops-kpi-card[aria-pressed="true"] {
  color: #ffffff;
  background: var(--eduops-navy-900);
  border-color: var(--eduops-navy-900);
  border-top-color: var(--eduops-state-color, #ffffff);
  box-shadow: 0 4px 10px rgba(7, 27, 44, 0.2), inset 0 0 0 2px rgba(255, 255, 255, 0.13);
}

.eduops-kpi-label {
  align-self: start;
  font-size: 13px;
  font-weight: 800;
  line-height: 1.15;
}

.eduops-kpi-value {
  grid-row: 1 / span 2;
  grid-column: 2;
  align-self: center;
  margin-left: 6px;
  color: var(--eduops-state-color, var(--eduops-blue-700));
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
}

.eduops-kpi-card[aria-pressed="true"] .eduops-kpi-value {
  color: #ffffff;
}

.eduops-kpi-caption {
  align-self: end;
  margin-top: 5px;
  color: var(--eduops-ink-soft);
  font-size: 11px;
  font-weight: 650;
  line-height: 1.15;
}

.eduops-kpi-card[aria-pressed="true"] .eduops-kpi-caption {
  color: #cfe0eb;
}

.eduops-kpi-card[data-state="READY"] { --eduops-state-color: #197246; }
.eduops-kpi-card[data-state="COOLING_OFF"] { --eduops-state-color: #a76a05; }
.eduops-kpi-card[data-state="AWAITING_APPLICANT"] { --eduops-state-color: #216d99; }
.eduops-kpi-card[data-state="AWAITING_PAYMENT"] { --eduops-state-color: #9a5b00; }
.eduops-kpi-card[data-state="REVIEW_REQUIRED"] { --eduops-state-color: #b44c28; }
.eduops-kpi-card[data-state="BLOCKED"] { --eduops-state-color: #a52c32; }
.eduops-kpi-card[data-state="UNKNOWN"] { --eduops-state-color: #586777; }
.eduops-kpi-card[data-state="COMPLETE"] { --eduops-state-color: #566b7c; }

.eduops-metric-strip {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 1px;
  margin-top: 6px;
  overflow: hidden;
  background: var(--eduops-line);
  border: 1px solid var(--eduops-line);
  border-radius: 5px;
}

.eduops-metric {
  display: flex;
  min-width: 0;
  min-height: 39px;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 6px 9px;
  color: var(--eduops-ink-soft);
  text-align: left;
  background: #f8fafc;
  border: 0;
  font-size: 11px;
  font-weight: 700;
}

.eduops-metric:hover {
  color: var(--eduops-ink);
  background: #ffffff;
}

.eduops-metric strong {
  color: var(--eduops-ink);
  font-size: 14px;
  white-space: nowrap;
}

.eduops-workspace {
  display: flex;
  flex: 1 1 auto;
  flex-direction: column;
  min-height: 300px;
  overflow: hidden;
  background: var(--eduops-surface);
  border: 1px solid var(--eduops-line-strong);
  border-radius: 7px;
  box-shadow: 0 5px 14px rgba(16, 40, 59, 0.07);
}

.eduops-workspace-header {
  display: flex;
  flex: 0 0 auto;
  min-height: 36px;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 5px 8px;
  background: linear-gradient(90deg, #f9fbfc, #ffffff);
  border-bottom: 1px solid var(--eduops-line);
}

.eduops-workspace-header h2 {
  margin-bottom: 1px;
