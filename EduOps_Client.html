<script>
(function () {
  "use strict";

  var app = window.EduOpsApp;
  var suppressPop = false;
  var bound = false;

  function byId(id) { return document.getElementById(id); }
  function focusable(root) {
    return Array.prototype.slice.call(root.querySelectorAll('button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])')).filter(function (element) { return !element.hidden && element.offsetParent !== null; });
  }
  function handleDialogKey(event) {
    var layer = byId("eduopsConfirmLayer");
    if (!layer || layer.hidden) return false;
    if (event.key === "Escape") {
      event.preventDefault();
      event.stopPropagation();
      app.closeConfirm(true);
      return true;
    }
    if (event.key !== "Tab") return false;
    var items = focusable(layer);
    if (!items.length) return true;
    var first = items[0];
    var last = items[items.length - 1];
    if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
    else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
    return true;
  }
  function handleEscape(event) {
    if (handleDialogKey(event)) return;
    if (event.key !== "Escape") return;
    var report = byId("eduopsReportPanel");
    if (report && !report.hidden) { event.preventDefault(); app.components.closeReport(); return; }
    var drawer = byId("eduopsQuickDrawer");
    if (drawer && !drawer.hidden) { event.preventDefault(); app.components.closeQuickView(); return; }
    var batch = byId("eduopsBatchWorkspace");
    if (batch && !batch.hidden) { event.preventDefault(); app.closeBatch(); return; }
    var workbench = byId("eduopsWorkbench");
    if (workbench && !workbench.hidden) { event.preventDefault(); app.closeWorkbench(document.activeElement); }
  }
  function handlePopState() {
    if (suppressPop) { suppressPop = false; return; }
    var workbench = byId("eduopsWorkbench");
    if (workbench && !workbench.hidden) {
      if (app.state.dirty) {
        suppressPop = true;
        history.forward();
        app.requestWorkbenchLeave(function () {
          suppressPop = true;
          history.back();
          app.closeWorkbench(null, true);
        }, byId("eduopsCloseWorkbench"));
        return;
      }
      app.closeWorkbench(null, true);
      return;
    }
    var batch = byId("eduopsBatchWorkspace");
    if (batch && !batch.hidden) app.closeBatch(true);
  }
  function bindConfirm() {
    byId("eduopsConfirmCancel").addEventListener("click", function () { app.closeConfirm(true); });
    byId("eduopsConfirmProceed").addEventListener("click", function () {
      var confirm = app.state.confirm;
      if (confirm && typeof confirm.onProceed === "function") confirm.onProceed();
      else app.closeConfirm(true);
    });
  }
  function applyBootstrap(access, profile) {
    app.state.access = access;
    app.state.profile = profile;
    app.state.capabilities = access && access.user && access.user.capabilities || {};
    app.state.featureFlags = profile && profile.featureFlags || {};
    var userEmail = byId("eduopsUserEmail");
    var role = byId("eduopsRole");
    if (userEmail) userEmail.textContent = access && access.user && access.user.email || app.bootstrap.userEmail || "Authorised operator";
    if (role) role.textContent = access && access.user && access.user.role || app.bootstrap.role || "Admin";
    var runtime = access && access.runtime || {};
    var runtimeTarget = byId("eduopsRuntimeIdentity");
    if (runtimeTarget) runtimeTarget.textContent = (runtime.version || app.bootstrap.runtime || "runtime") + " / " + (runtime.deployVersion || "-");
    var mode = byId("eduopsMode");
    if (mode) mode.textContent = app.isPreview() ? "Preview Lab" : "FODE guarded operations";
  }
  function bindOnce() {
    if (bound) return;
    bound = true;
    app.bindWorkspace();
    app.bindWorkbench();
    app.bindBatch();
    app.installControlClassification();
    bindConfirm();
    document.addEventListener("keydown", handleEscape, true);
    window.addEventListener("popstate", handlePopState);
    var initialUrl = location.protocol === "about:" ? undefined : location.pathname + location.search + "#workload";
    history.replaceState({ eduopsRoute: "workload" }, "", initialUrl);
  }
  function bootstrapFailure(phase, error) {
    var state = error && error.code === "TIMEOUT" ? "TIMEOUT" : phase;
    app.setBootstrapState(state, error && error.message || error);
    if (app.renderBootstrapError) app.renderBootstrapError(state, error);
  }
  function startBootstrap() {
    app.setBootstrapState("BOOT_START", "Starting EduOps with a clean client state.");
    app.setBootstrapState("ASSETS_READY", "Shared client assets loaded.");
    return app.withBootstrapTimeout(app.waitForTransport(), "TRANSPORT_READY").then(function () {
      app.setBootstrapState("TRANSPORT_READY", "EduOps transport is ready.");
      return app.withBootstrapTimeout(app.call("eduops_getAccessProjection", {}), "ACCESS_READY");
    }).then(function (access) {
      app.state.access = access;
      app.setBootstrapState("ACCESS_READY", "Operator access projection resolved.");
      return app.withBootstrapTimeout(app.call("eduops_getProfile", {}), "PROFILE_READY").then(function (profile) {
        applyBootstrap(access, profile);
        app.setBootstrapState("PROFILE_READY", "Product profile and feature projection resolved.");
      });
    }).then(function () {
      return app.withBootstrapTimeout(app.requestWorkload({ refreshSnapshot: true }), "WORKLOAD_READY");
    }).then(function (result) {
      if (!result || result.error || !result.response || result.response.ok === false) {
        throw result && result.error || new Error(result && result.response && (result.response.message || result.response.code) || "The first workload did not complete.");
      }
    }).catch(function (error) {
      var current = app.bootstrapMachine && app.bootstrapMachine.state || "BOOT_START";
      var phase = current === "TRANSPORT_READY" ? "ACCESS_ERROR" : current === "ACCESS_READY" ? "PROFILE_ERROR" : current === "PROFILE_READY" ? "WORKLOAD_ERROR" : current === "ASSETS_READY" ? "TRANSPORT_ERROR" : "SOURCE_ERROR";
      bootstrapFailure(phase, error);
    });
  }
  function start() {
    bindOnce();
    app.retryBootstrap = startBootstrap;
    startBootstrap();
  }
  window.addEventListener("eduops:preview-reload", function () {
    app.state.snapshotId = "";
    app.state.selected = {};
    app.state.page = 1;
    app.requestWorkload({ refreshSnapshot: true });
  });
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", start);
  else start();
})();
</script>
