<script>
    function opsTemplateDefinitions_(){
      return [
        { type:"legacy_invite", name:"Portal Access", purpose:"Resend portal access for incomplete applicants.", stage:"Portal Access / Submission", subject:"FODE Portal Access", body:"Portal access reminder with applicant-specific link when eligible.", vars:"ApplicantID, student name, portal URL", use:"Use when portal access is missing or invite is pending." },
        { type:"reminder", name:"General Reminder", purpose:"Single-applicant reminder for incomplete intake.", stage:"Applicant / Portal", subject:"FODE Application Reminder", body:"Reminder to complete the current application step.", vars:"ApplicantID, effective email, due state", use:"Use when reminder is due and not suppressed." },
        { type:"docs_missing", name:"Missing Documents", purpose:"Request outstanding documents.", stage:"Awaiting Uploads / Document Evidence Pending", subject:"FODE Documents Required", body:"Documents are still required before eligibility can progress.", vars:"ApplicantID, document state", use:"Use when document evidence is missing or pending; uploaded/review-required rows stay in document review." },
        { type:"payment_followup", name:"Invoice Reminder", purpose:"Follow up while payment evidence is not verified.", stage:"Invoice Sent / Payment Evidence Not Verified", subject:"FODE Invoice Payment Reminder", body:"Invoice/payment follow-up for a single applicant.", vars:"ApplicantID, invoice state, amount if loaded", use:"Use when invoice exists and payment is not verified." },
        { type:"quote_fee_estimate", name:"Quote / Fee Estimate", purpose:"Workflow marker for quote or fee estimate follow-up.", stage:"Docs Quote Ready", subject:"Quote / Fee Estimate", body:"Quote / Fee Estimate - backend exists, OPS wiring pending", vars:"ApplicantID, quote context if available", use:"Backend exists, OPS wiring pending. Do not send from this card." },
        { type:"custom_email", name:"Custom Email", purpose:"Editable single-record message.", stage:"Any", subject:"Custom subject required", body:"Operator edits subject and body before preview.", vars:"ApplicantID and typed content", use:"Use only after careful preview; confirmation still required." }
      ];
    }
    function opsSelectedTemplateType_(){
      return String(opsActionState.templateType || "reminder");
    }
    function opsCommunicationRoleStatus_(){
      if (readOpsMode_() === "operator") return "Operator: Preview only. Escalate to Operations Admin for send/export.";
      if (opsSupervisoryExecutionAllowed_()) return "Super Admin: Supervisory action. High-risk actions remain separately gated.";
      if (opsOperationalExecutionAllowed_()) return "Operations Admin: Operational action. Requires selected records, preview, confirmation, caps, and backend gates.";
      return "Operations Admin or Super Admin mode is required for gated send/export controls.";
    }
    function opsCommunicationQueueDefinitions_(){
      return [
        { key:"ready_to_contact", label:"Ready to Contact", messageType:"reminder", actionLevel:"Operator preview only / Operations Admin gated", countAvailable:true, meaning:"Loaded rows with an email, no visible bounce/suppression issue, no recent contact/cooldown evidence, and no review-only/terminal state.", next:"Preview reminder or selected queue action; send only through existing operational gates.", test:function(r){ return opsBuildCommunicationRowFacts_(r).communicationQueues.readyToContact; } },
        { key:"missing_documents", label:"Missing Documents", messageType:"docs_missing", actionLevel:"Operations Admin gated", countAvailable:true, meaning:"Awaiting uploads / document evidence pending rows, excluding email issues, recent contact/cooldown rows, and terminal records.", next:"Preview Missing Documents; send only through the existing single-applicant gate.", test:function(r){ var facts = opsBuildCommunicationRowFacts_(r); return facts.communicationQueues.missingDocuments && facts.hasEmail && !facts.emailIssue && !facts.recentlyContacted && !facts.cooldownActive; } },
        { key:"docs_quote_ready", label:"Docs Quote Ready", messageType:"quote_fee_estimate", actionLevel:"unavailable / follow-up needed", countAvailable:false, meaning:"Quote / Fee Estimate workflow marker surfaced for OPS visibility.", next:"Quote / Fee Estimate - backend exists, OPS wiring pending.", test:function(){ return false; } },
        { key:"uploaded_review_required", label:"Uploaded / Review Required", messageType:"custom_email", actionLevel:"review bridge", countAvailable:true, meaning:"Uploaded or correction-required document evidence needs human review before applicant reminders.", next:"Open document review. Do not treat as Missing Documents reminder workload.", test:function(r){ return opsBuildCommunicationRowFacts_(r).communicationQueues.uploadedReviewRequired; } },
        { key:"invoice_payment", label:"Invoice / Payment Follow-Up", messageType:"payment_followup", actionLevel:"Operations Admin gated", countAvailable:true, meaning:"Loaded rows in payment or invoice follow-up stages, excluding email issues, recent contact/cooldown rows, and terminal records.", next:"Preview Invoice Reminder / Payment Follow-Up through the existing single-applicant gate.", test:function(r){ var facts = opsBuildCommunicationRowFacts_(r); return facts.activeProgressionAllowed && (facts.workflowStage === "payment" || facts.workflowStage === "invoice") && facts.hasEmail && !facts.emailIssue && !facts.recentlyContacted && !facts.cooldownActive; } },
        { key:"portal_access", label:"Portal Access / Reminder", messageType:"legacy_invite", actionLevel:"Operations Admin gated", countAvailable:true, meaning:"Loaded rows that appear to need portal access or a general portal reminder, excluding email issues, recent contact/cooldown rows, and terminal records.", next:"Preview Portal Access or General Reminder; send only through existing gates.", test:function(r){ var facts = opsBuildCommunicationRowFacts_(r); return facts.activeProgressionAllowed && (facts.workflowStage === "fd_received" || facts.workflowStage === "portal") && facts.hasEmail && !facts.emailIssue && !facts.recentlyContacted && !facts.cooldownActive; } },
        { key:"email_issue", label:"Email Issue / Contact Correction", messageType:"custom_email", actionLevel:"Operations Admin gated handoff", countAvailable:true, meaning:"Bounce, suppression, invalid email, or correction-needed rows, excluding terminal records.", next:"Use Email Correction handoff / Admin Review. Do not send until contact is corrected.", test:function(r){ return opsBuildCommunicationRowFacts_(r).communicationQueues.emailIssue; } },
        { key:"whatsapp_fallback", label:"WhatsApp Fallback", messageType:"custom_email", actionLevel:"Operations Admin gated export", countAvailable:true, meaning:"Loaded rows where phone/WhatsApp fallback is useful because email is missing or blocked, excluding terminal records and recent contact/cooldown rows.", next:"Export governed CSV only through existing WhatsApp fallback gate; no WhatsApp message is sent by this system.", test:function(r){ var facts = opsBuildCommunicationRowFacts_(r); return facts.communicationQueues.whatsappFallback && !facts.recentlyContacted && !facts.cooldownActive; } },
        { key:"cooldown_recent", label:"Cooldown / Recently Contacted", messageType:"reminder", actionLevel:"wait / blocked", countAvailable:true, meaning:"Loaded rows with recent/next-action communication evidence or active cooldown, excluding terminal records.", next:"Inspect timeline, cooldown, and block reason before any escalation. This queue is not actionable now.", test:function(r){ return opsBuildCommunicationRowFacts_(r).communicationQueues.cooldownRecentlyContacted; } },
        { key:"legacy_summary", label:"Read-only Legacy Campaign Summary", messageType:"reminder", actionLevel:"unavailable / follow-up needed", countAvailable:false, meaning:"Read-only legacy campaign summary is acknowledged as a future OPS workflow entry.", next:"No legacy campaign live send/follow-up is exposed here.", test:function(){ return false; } }
      ];
    }
    function opsSelectedCommunicationQueueDef_(){
      var key = String(opsActionState.communicationQueue || "ready_to_contact");
      var defs = opsCommunicationQueueDefinitions_();
      return defs.filter(function(def){ return def.key === key; })[0] || defs[0];
    }
    function opsCommunicationQueueRows_(def){
      var d = def || opsSelectedCommunicationQueueDef_();
      if (d.countAvailable === false) return [];
      return opsAllQueueRows_().filter(function(row){ return d.test(row || {}); });
    }
    function opsCommunicationSelectedIds_(){
      return Array.isArray(opsActionState.communicationSelectedIds) ? opsActionState.communicationSelectedIds.slice() : [];
    }
    function opsSetCommunicationSelectedIds_(ids){
      var seen = {};
      opsActionState.communicationSelectedIds = (ids || []).map(function(id){ return String(id || "").trim(); }).filter(function(id){
        if (!id || seen[id]) return false;
        seen[id] = true;
        return true;
      });
    }
    function opsCommunicationSelectedRows_(){
      var ids = opsCommunicationSelectedIds_();
      if (!ids.length) return [];
      return ids.map(function(id){ return opsQueueRowByApplicantId_(id); }).filter(function(row){ return !!row; });
    }
    function opsCommunicationRecipientCounts_(rows){
      var loaded = 0;
      var missing = 0;
      (rows || []).forEach(function(row){
        if (opsBuildCommunicationRowFacts_(row).hasEmail) loaded++;
        else missing++;
      });
      return { loaded: loaded, missing: missing };
    }
    function opsCommunicationQueueNeedsSingleApplicant_(def){
      var key = String((def && def.key) || "");
      return ["ready_to_contact", "missing_documents", "invoice_payment", "portal_access"].indexOf(key) >= 0;
    }
    function opsCommunicationQueueIsNonActionable_(def){
      var key = String((def && def.key) || "");
      return ["cooldown_recent", "uploaded_review_required", "email_issue", "whatsapp_fallback", "docs_quote_ready", "legacy_summary"].indexOf(key) >= 0;
    }
    function opsCommunicationQueueContextReason_(def){
      var key = String((def && def.key) || "");
      if (key === "cooldown_recent") return "Cooldown / Recently Contacted is a wait queue. Inspect timeline and next eligible send; do not preview or send from this queue.";
      if (key === "uploaded_review_required") return "Uploaded / Review Required is a document review queue. Open review instead of email preview/send.";
      if (key === "email_issue") return "Email Issue / Contact Correction requires correction handoff before any applicant email preview/send.";
      if (key === "whatsapp_fallback") return "WhatsApp Fallback uses the governed CSV export path, not applicant email preview/send.";
      if (key === "docs_quote_ready") return "Quote / Fee Estimate remains unavailable from OPS Communications.";
      if (key === "legacy_summary") return "Legacy Campaign Summary is read-only and does not expose a live preview/send path.";
      return "";
    }
    function opsRenderCommunicationIaLabels_(){
      function setCardHeader_(anchorId, title, note, pill){
        var anchor = document.getElementById(anchorId);
        if (!anchor) return;
        var card = anchor.closest ? anchor.closest(".opsCard") : null;
        if (!card) return;
        var titleEl = card.querySelector(".opsSectionHeader h3");
        var noteEl = card.querySelector(".opsSectionHeader p");
        var pillEl = card.querySelector(".opsSectionHeader .opsStatusPill");
        if (titleEl) titleEl.textContent = title;
        if (noteEl) noteEl.textContent = note;
        if (pillEl) pillEl.textContent = pill;
      }
      setCardHeader_(
        "opsCommunicationQueueList",
        "Communications Action Cohorts",
        "Loaded OPS snapshot only. These counts are not total applicant or total lifecycle counts.",
        "Loaded snapshot"
      );
      setCardHeader_(
        "opsCommunicationSelectedPane",
        "Selected Applicant Actions",
        "Single-applicant preview/send context. Queue cohort selection alone is not enough.",
        "Single applicant"
      );
      var queueList = document.getElementById("opsCommunicationQueueList");
      if (queueList) {
        var helper = document.getElementById("opsCommunicationIaNote");
        if (!helper) {
          helper = document.createElement("div");
          helper.id = "opsCommunicationIaNote";
          helper.className = "opsSafetyNotice";
          helper.style.marginBottom = "12px";
          queueList.parentNode.insertBefore(helper, queueList);
        }
        helper.textContent = "Use Lifecycle Map for total stage counts. Use Applicant Queue for loaded operational drill-down. This Communications screen is for loaded communication action cohorts and selected-applicant reminder/preview actions.";
      }
      var result = document.getElementById("opsCommunicationResult");
      var resultCard = result && result.closest ? result.closest(".opsCard") : null;
      if (resultCard) {
        var note = resultCard.querySelector(".opsControlNote");
        if (note) note.textContent = "Read-only previews and handoffs for one selected applicant. These controls do not send email by themselves.";
        Array.prototype.slice.call(resultCard.querySelectorAll("button")).forEach(function(btn){
          var handler = String(btn.getAttribute("onclick") || "");
          if (handler.indexOf("opsPreviewSelectedCommunicationAction_()") >= 0) {
            btn.textContent = "Preview Selected Applicant Action";
            btn.title = "Preview the governed action for one visible selected ApplicantID.";
          }
        });
      }
    }
    function opsCommunicationSelectionContext_(){
      var def = opsSelectedCommunicationQueueDef_();
      var selectedIds = opsCommunicationSelectedIds_();
      var selectedRows = opsCommunicationSelectedRows_();
      var selectedFacts = selectedRows.length === 1 ? opsBuildCommunicationRowFacts_(selectedRows[0]) : null;
      var selectedApplicantId = opsApplicantId_();
      var selectedApplicantBound = !!selectedApplicantId;
      var singleApplicantFromCohort = !!(selectedFacts && selectedFacts.applicantId);
      var queueIsNonActionable = opsCommunicationQueueIsNonActionable_(def);
      var queueNeedsSingleApplicant = opsCommunicationQueueNeedsSingleApplicant_(def);
      var queueReason = opsCommunicationQueueContextReason_(def);
      return {
        def: def,
        selectedIds: selectedIds,
        selectedRows: selectedRows,
        selectedFacts: selectedFacts,
        selectedApplicantId: selectedApplicantId,
        selectedApplicantBound: selectedApplicantBound,
        singleApplicantFromCohort: singleApplicantFromCohort,
        queueIsNonActionable: queueIsNonActionable,
        queueNeedsSingleApplicant: queueNeedsSingleApplicant,
        queueReason: queueReason,
        cohortSelected: selectedRows.length > 1,
        noSelection: selectedRows.length === 0,
        singleSelection: selectedRows.length === 1,
        requiresApplicantForPreview: queueNeedsSingleApplicant,
        requiresApplicantForCustomEmail: true
      };
    }
    function opsBindSingleCommunicationSelection_(){
      var rows = opsCommunicationSelectedRows_();
      if (rows.length !== 1) return false;
      var facts = opsBuildCommunicationRowFacts_(rows[0]);
      if (!facts.applicantId) return false;
      opsSelectedApplicantId = facts.applicantId;
      opsSelectedApplicantName = facts.name || facts.applicantId;
      opsSelectedApplicantExplicit = true;
      opsApplicantDetailCache = null;
      opsClearSelectedActionState_();
      return true;
    }
    function opsSetCommunicationQueue_(key){
      var defs = opsCommunicationQueueDefinitions_();
      var def = defs.filter(function(item){ return item.key === key; })[0] || defs[0];
      opsActionState.communicationQueue = def.key;
      opsSetCommunicationSelectedIds_([]);
      if (def.messageType) opsActionState.templateType = def.messageType;
      renderOpsCommunicationWorkspace_();
      renderOpsTemplateBrowser_();
      opsApplyTemplateToCustomDraft_();
    }
    function renderOpsCommunicationWorkQueues_(){
      var list = document.getElementById("opsCommunicationQueueList");
      var detail = document.getElementById("opsCommunicationQueueInspector");
      if (!list) return;
      var selected = String(opsActionState.communicationQueue || "ready_to_contact");
      var defs = opsCommunicationQueueDefinitions_();
      list.innerHTML = defs.map(function(def){
        var countText = def.countAvailable === false ? "Count unavailable in current loaded data" : String(opsCommunicationQueueRows_(def).length);
        return "<button class='opsFilterBtn" + (selected === def.key ? " active" : "") + "' type='button' data-comm-queue='" + esc(def.key) + "'>"
          + "<strong>" + esc(def.label) + "</strong><br><span class='opsWorkflowSecondary'>" + esc(countText) + "</span></button>";
      }).join("");
      Array.prototype.slice.call(list.querySelectorAll(".opsFilterBtn")).forEach(function(btn){
        btn.addEventListener("click", function(){ opsSetCommunicationQueue_(String(btn.getAttribute("data-comm-queue") || "")); });
      });
      var def = opsSelectedCommunicationQueueDef_();
      var countText = def.countAvailable === false ? "Count unavailable in current loaded data" : String(opsCommunicationQueueRows_(def).length);
      if (detail) {
        detail.innerHTML = "<strong>" + esc(def.label) + "</strong>"
          + "<div style='margin-top:6px;'>Count: " + esc(countText) + "</div>"
          + "<div>Meaning: " + esc(def.meaning) + "</div>"
          + "<div>Next action: " + esc(def.next) + "</div>"
          + "<div>Action level: " + esc(def.actionLevel) + "</div>";
      }
    }
    function opsCommunicationStageLabel_(row){
      var facts = opsBuildCommunicationRowFacts_(row);
      return facts.displayStageLabel || facts.lifecycleLabel;
    }
    function opsCommunicationLastContact_(row){
      return opsBuildCommunicationRowFacts_(row).lastContactLabel;
    }
    function opsCommunicationBlockReason_(row){
      var facts = opsBuildCommunicationRowFacts_(row);
      return facts.displayBlockReason || facts.blockReason;
    }
    function opsCommunicationReminderSummaryText_(summary){
      var s = summary || {};
      var parts = [
        "Total loaded rows: " + String(Number(s.totalLoadedRows || 0)),
        "Reminder due now: " + String(Number(s.reminderDueNow || 0)),
        "Blocked by cooldown: " + String(Number(s.blockedByCooldown || 0)),
        "Blocked by portal submitted: " + String(Number(s.blockedByPortalSubmitted || 0)),
        "Blocked by docs/payment condition: " + String(Number(s.blockedByDocsPayment || 0)),
        "Blocked by invalid/missing email: " + String(Number(s.blockedByInvalidMissingEmail || 0)),
        "Blocked by bounce/do-not-contact: " + String(Number(s.blockedByBounceDoNotContact || 0)),
        "Blocked by max attempts: " + String(Number(s.blockedByMaxAttempts || 0)),
        "Unknown/needs inspection: " + String(Number(s.unknownNeedsInspection || 0)),
        "Aged 8+ days: " + String(Number(s.agedEightPlus || 0)),
        "Aged 8+ but blocked: " + String(Number(s.agedEightPlusBlocked || 0))
      ];
      if (Array.isArray(s.samples) && s.samples.length) parts.push("Samples: " + s.samples.join(", "));
      return parts.join(" | ");
    }
    function opsSelectCommunicationRow_(applicantId){
      var row = opsQueueRowByApplicantId_(applicantId) || {};
      var facts = opsBuildCommunicationRowFacts_(row);
      opsSetCommunicationSelectedIds_([facts.applicantId || applicantId]);
      opsSelectApplicantContext_(facts.applicantId || applicantId, facts.name || applicantId);
    }
    function opsToggleCommunicationRowSelection_(applicantId){
      var id = String(applicantId || "").trim();
      if (!id) return;
      var ids = opsCommunicationSelectedIds_();
      var idx = ids.indexOf(id);
      if (idx >= 0) ids.splice(idx, 1);
      else ids.push(id);
      opsSetCommunicationSelectedIds_(ids);
      if (opsBindSingleCommunicationSelection_()) {
        renderOpsSelectedApplicantContext_();
        renderOpsClassroomChecklist_();
        return;
      }
      renderOpsCommunicationWorkspace_();
    }
    function opsSelectAllCommunicationRows_(){
      var rows = opsCommunicationQueueRows_(opsSelectedCommunicationQueueDef_());
      opsSetCommunicationSelectedIds_(rows.map(function(row){ return opsBuildCommunicationRowFacts_(row).applicantId; }));
      if (opsBindSingleCommunicationSelection_()) {
        renderOpsSelectedApplicantContext_();
        renderOpsClassroomChecklist_();
        return;
      }
      renderOpsCommunicationWorkspace_();
    }
    function opsClearCommunicationSelection_(){
      opsSetCommunicationSelectedIds_([]);
      renderOpsCommunicationWorkspace_();
    }
    function renderOpsCommunicationSelectedPane_(){
      var pane = document.getElementById("opsCommunicationSelectedPane");
      var records = document.getElementById("opsCommunicationQueueRecords");
      var strip = document.getElementById("opsCommunicationStatusStrip");
      var reminderSummaryEl = document.getElementById("opsReminderTruthSummary");
      var row = opsApplicantContextRow_() || {};
      var facts = opsBuildCommunicationRowFacts_(row);
      var id = facts.applicantId || opsApplicantId_();
      var ctx = opsCommunicationSelectionContext_();
      var def = ctx.def;
      var rows = opsCommunicationQueueRows_(def);
      var selectedIds = ctx.selectedIds;
      var selectedRows = ctx.selectedRows;
      var selectedFacts = ctx.selectedFacts;
      var displayFacts = selectedFacts || facts;
      var displayId = selectedFacts ? selectedFacts.applicantId : id;
      var displayProof = displayFacts && displayFacts.resolverProof ? displayFacts.resolverProof : {};
      var displayReminder = displayFacts && displayFacts.reminderDiagnostic ? displayFacts.reminderDiagnostic : opsReminderDiagnosticFromRow_(displayFacts && displayFacts.row ? displayFacts.row : row, displayFacts);
      var reminderSummary = opsReminderDiagnosticSummary_(opsAllQueueRows_());
      var recipientCounts = opsCommunicationRecipientCounts_(selectedRows);
      if (pane) {
        var paneItems = ctx.cohortSelected
          ? [
            ["Selected cohort", "Bulk cohort selected"],
            ["Selected count", String(selectedRows.length)],
            ["Email recipients", String(recipientCounts.loaded) + " loaded / " + String(recipientCounts.missing) + " missing"],
            ["Selected applicant context", "No single applicant is selected from this cohort"],
            ["Queue action mode", ctx.queueIsNonActionable ? "Blocked queue / inspect only" : "Cohort selected; single-applicant preview/send is unavailable"],
            ["Selected template / queue action", def.label + " / " + opsSelectedTemplateType_()],
            ["What to do next", ctx.queueReason || "Open one applicant for single-record preview, or use the existing bulk cohort path."],
            ["Role gate result", opsCommunicationRoleStatus_()],
            ["Reminder truth summary", opsCommunicationReminderSummaryText_(reminderSummary)]
          ]
          : ctx.noSelection
          ? [
            ["Selected queue", def.label],
            ["Selected cohort", "No cohort rows selected"],
            ["Selected applicant context", displayId ? ("Using selected applicant " + displayId) : "No single applicant selected"],
            ["Queue action mode", ctx.queueIsNonActionable ? "Blocked queue / inspect only" : "Single-applicant preview/send requires one visible ApplicantID"],
            ["What to do next", ctx.queueReason || (displayId ? "Preview/send may use the current selected applicant." : "Open one applicant from the queue list before preview/send.")],
            ["Role gate result", opsCommunicationRoleStatus_()],
            ["Reminder truth summary", opsCommunicationReminderSummaryText_(reminderSummary)]
          ]
          : [
          ["ApplicantID", displayId || "No applicant selected"],
          ["Name", displayFacts.name || opsApplicantName_() || "Unknown"],
          ["Email", displayFacts.email || "No email loaded"],
          ["Aging / received age", displayId ? (displayReminder.aging || "Missing source") : "No applicant selected"],
          ["Email_Status", displayId ? (displayReminder.emailStatus || "Blank") : "No applicant selected"],
          ["Email_Attempt_Count", displayId ? (displayReminder.emailAttemptCount == null ? "Blank" : String(displayReminder.emailAttemptCount)) : "No applicant selected"],
          ["Email_Last_Sent_At", displayId ? (displayReminder.emailLastSentAt || "Blank") : "No applicant selected"],
          ["Last_Contacted_At", displayId ? (displayReminder.lastContactedAt || "Blank") : "No applicant selected"],
          ["Ack_Email_Sent_At", displayId ? (displayReminder.ackEmailSentAt || "Blank") : "No applicant selected"],
          ["Email_Next_Action_Date", displayId ? (displayReminder.emailNextActionDate || "Blank") : "No applicant selected"],
          ["Communication_Next_Action_At", displayId ? (displayReminder.communicationNextActionAt || "Blank") : "No applicant selected"],
          ["Phone / WhatsApp", displayFacts.phone || "No phone/WhatsApp loaded"],
          ["Lifecycle stage", displayId ? (displayFacts.displayStageLabel || displayFacts.lifecycleLabel) : "No applicant selected"],
          ["Current review queue", displayId ? (displayProof.currentQueueBucket || "not_in_loaded_review_queue") : "No applicant selected"],
          ["Communication status", displayId ? displayFacts.communicationStatus : "No applicant selected"],
          ["Current send eligibility", displayId ? (displayProof.currentSendEligibility || "unknown") : "No applicant selected"],
          ["Last communication", displayId ? displayFacts.lastContactLabel : "No applicant selected"],
          ["Cooldown / next eligible send", displayFacts.nextEligible || "No next eligible date loaded"],
          ["Bounce / suppression", displayFacts.emailIssue ? displayFacts.emailIssueReason : "No loaded suppression"],
          ["Resolver stage", displayId ? (displayProof.resolverStageLabel || "Unknown") : "No applicant selected"],
          ["Resolver next action", displayId ? (displayProof.resolverNextAction || "Unknown") : "No applicant selected"],
          ["Resolver block", displayId ? ((displayProof.resolverBlockCode || "NO_BLOCK") + " | " + (displayProof.resolverBlockReason || "No block reason")) : "No applicant selected"],
          ["Reminder Due?", displayId ? (displayReminder.reminderDueLabel || "NO") : "No applicant selected"],
          ["Reminder NO reason", displayId ? (displayReminder.reminderDue ? "Reminder due now." : (displayReminder.reasonLabel || "Needs inspection")) : "No applicant selected"],
          ["Selected template / queue action", def.label + " / " + opsSelectedTemplateType_()],
          ["Block reason", displayId ? (displayFacts.displayBlockReason || displayFacts.blockReason) : "No applicant selected"],
          ["Role gate result", opsCommunicationRoleStatus_()]
        ];
        pane.innerHTML = paneItems.map(function(item){
          return "<div class='opsInfoItem'><div class='k'>" + esc(item[0]) + "</div><div class='v'>" + esc(item[1]) + "</div></div>";
        }).join("");
      }
      if (reminderSummaryEl) reminderSummaryEl.textContent = opsCommunicationReminderSummaryText_(reminderSummary);
      if (records) {
        if (def.countAvailable === false) {
          records.innerHTML = "<div class='opsPlaceholder'>Count unavailable in current loaded data.</div>";
        } else if (!rows.length) {
          records.innerHTML = "<div class='opsPlaceholder'>No loaded rows match this communication queue.</div>";
        } else {
          records.innerHTML = "<div class='opsActionRow' style='margin-bottom:8px;'>"
            + "<button class='opsActionBtn' type='button' onclick='opsSelectAllCommunicationRows_()'>Select All Loaded</button>"
            + "<button class='opsActionBtn' type='button' onclick='opsClearCommunicationSelection_()'>Clear Selection</button>"
            + "<span class='opsStatusPill info'>Selected: " + esc(String(selectedIds.length)) + "</span>"
            + "<span class='opsStatusPill " + (recipientCounts.missing ? "warn" : "ok") + "'>Email recipients: " + esc(String(recipientCounts.loaded)) + " loaded / " + esc(String(recipientCounts.missing)) + " missing</span>"
            + "</div>" + rows.slice(0, 12).map(function(r){
            var rowFacts = opsBuildCommunicationRowFacts_(r);
            var rowReminder = rowFacts.reminderDiagnostic || opsReminderDiagnosticFromRow_(r, rowFacts);
            var rid = rowFacts.applicantId;
            var name = rowFacts.name || "Unknown applicant";
            var active = rid && rid === id;
            var checked = selectedIds.indexOf(rid) >= 0 ? " checked" : "";
            return "<div class='opsFilterBtn" + (active ? " active" : "") + "'>"
              + "<label><input type='checkbox' onchange='opsToggleCommunicationRowSelection_(\"" + esc(rid) + "\")'" + checked + "> "
              + "<strong>" + esc(rid || "No ApplicantID") + "</strong> - " + esc(name) + "</label>"
              + "<button class='opsActionBtn' type='button' onclick='opsSelectCommunicationRow_(\"" + esc(rid) + "\")'>Open</button>"
              + "<br><span class='opsWorkflowSecondary'>" + esc((rowFacts.displayStageLabel || rowFacts.lifecycleLabel) + " | " + rowFacts.lastContactLabel + " | Reminder Due: " + (rowReminder.reminderDue ? "YES" : "NO") + " | " + rowReminder.reasonCode) + "</span></div>";
          }).join("");
        }
      }
      if (strip) {
        strip.innerHTML = [
          ["Queue", def.label + (ctx.cohortSelected ? (" | Cohort " + String(selectedRows.length)) : ""), ctx.queueIsNonActionable ? "warn" : "info"],

          blockCode:"NO_RECIPIENT",
          blockReason:"Preview did not provide a recipient."
        }, "Send Blocked");
        renderOpsCommunicationStatePanel_();
        return;
      }
      if (!window.confirm("Send " + String(label || msgType) + " for " + applicantId + " to " + recipient + "?")) return;
      opsActionState.busy = true;
      var payload = { applicantId: applicantId, messageType: msgType, confirmManualSingleSend: true, sourceSurface: "ops", sourceView: "ops" };
      if (msgType === "custom_email") Object.assign(payload, opsCustomEmailPayload_());
      google.script.run
        .withSuccessHandler(function(res){
          opsActionState.busy = false;
          var out = res && typeof res === "object" ? res : { ok:false, result:"FAILED", blockReason:"Invalid send response." };
          setOpsResult_("opsCommunicationResult", out, String(label || "Email") + " Result");
          if (String(out.result || "").toUpperCase() === "SENT") {
            opsActionState.previewApplicantId = "";
            opsActionState.previewMessageType = "";
            opsActionState.previewResult = null;
            opsActionState.previewTimestamp = "";
            fetchOpsApplicantSummary_();
            fetchOperationalSafetyStatus_();
          }
          renderOpsCommunicationStatePanel_();
        })
        .withFailureHandler(function(err){
          opsActionState.busy = false;
          setOpsResult_("opsCommunicationResult", {
            result:"FAILED",
            applicantId: applicantId,
            blockReason:String((err && err.message) || err || "Send failed.")
          }, "Send Failed");
          renderOpsCommunicationStatePanel_();
        })
        .admin_sendApplicantMessage(payload);
    }
    function opsRenderCommunicationTimeline_(){
      var d = opsApplicantDetailCache || {};
      setOpsResult_("opsCommunicationResult", {
        result:"OPEN",
        applicantId: opsApplicantId_(),
        message:[
          "Last contacted at: " + String(d.Last_Contacted_At || "Unknown"),
          "Last contact type: " + String(d.Last_Contact_Type || "Unknown"),
          "Last contact result: " + String(d.Last_Contact_Result || "Unknown"),
          "Next eligible send: " + String(d.Email_Next_Action_Date || "Pending")
        ].join("\n")
      }, "Communication Timeline");
    }
    window.setTimeout(function(){
      try { opsRenderCommunicationIaLabels_(); } catch (_iaLabelErr) {}
    }, 0);
</script>
