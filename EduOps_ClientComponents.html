<script>
(function () {
  "use strict";

  var app = window.EduOpsApp;
  var dom = {};

  function byId(id) { return document.getElementById(id); }
  function cacheDom() {
    ["eduopsApp", "eduopsActionNav", "eduopsHistoryNav", "eduopsTopContext", "eduopsSnapshotShort", "eduopsSnapshotTime", "eduopsRuntimeIdentity", "eduopsAppsScriptIdentity", "eduopsReleaseSnapshotIdentity", "eduopsReleaseSnapshotTime", "eduopsReleaseDetails", "eduopsProductSwitcher", "eduopsReliabilityBanner", "eduopsGlobalSearch", "eduopsGlobalSearchResults", "eduopsPageTitle", "eduopsPageIntro", "eduopsKpis", "eduopsMetrics", "eduopsSelectedStateLabel", "eduopsSelectedWorklistLabel", "eduopsWorklistReason", "eduopsQueueCompactStats", "eduopsOpenBatch", "eduopsBatchReason", "eduopsWorklistKeys", "eduopsOpenReconciliation", "eduopsSearch", "eduopsOwnerFilter", "eduopsUrgencyFilter", "eduopsSort", "eduopsToggleFilters", "eduopsAdvancedFilters", "eduopsRouteFilter", "eduopsDocumentFilter", "eduopsFinanceFilter", "eduopsContactFilter", "eduopsCommunicationFilter", "eduopsCoolingFilter", "eduopsBlockKindFilter", "eduopsFilterCount", "eduopsFilterChips", "eduopsSelectionSummary", "eduopsWorklistRows", "eduopsEmptyState", "eduopsVisibleRange", "eduopsPreviousPage", "eduopsPageNumbers", "eduopsNextPage", "eduopsPageSize", "eduopsHiddenRailCount", "eduopsQuickDrawer", "eduopsCloseDrawer", "eduopsDrawerTitle", "eduopsDrawerContent", "eduopsDrawerActions", "eduopsDrawerScrim", "eduopsReportPanel", "eduopsReportType", "eduopsReportTitle", "eduopsReportContent", "eduopsOperationsQueueContext", "eduopsOperationsToolbarState", "eduopsOperationsToolbarPackage"].forEach(function (id) { dom[id] = byId(id); });
  }

  function authorityItem(list, code) {
    return (Array.isArray(list) ? list : []).filter(function (item) { return item && item.code === code; })[0] || null;
  }
  function badge(presentation, detail) {
    var item = presentation && presentation.available === true ? presentation : null;
    return '<span class="eduops-badge eduops-badge-' + app.esc(item && item.tone || "blocked") + '" title="' + app.esc(detail || item && item.reason || app.authorityUnavailable("state")) + '">' + app.esc(item && item.label || app.authorityUnavailable("state")) + '</span>';
  }
  function renderNavigation(presentation) {
    var buckets = presentation.actionabilityBuckets || [];
    var active = buckets.filter(function (item) { return item.code !== "COMPLETE"; });
    var complete = authorityItem(buckets, "COMPLETE");
    dom.eduopsActionNav.innerHTML = active.map(function (item) {
      return '<button type="button" data-state="' + app.esc(item.code) + '"' + (app.state.actionabilityState === item.code ? ' aria-current="page"' : '') + '><span><i class="eduops-nav-state-marker" data-state="' + app.esc(item.code) + '" aria-hidden="true"></i>' + app.esc(item.label) + '</span><small>' + Number(item.count || 0) + '</small></button>';
    }).join("");
    var all = presentation.allActionability || {};
    dom.eduopsHistoryNav.innerHTML = '<button type="button" data-state="COMPLETE"' + (app.state.actionabilityState === "COMPLETE" ? ' aria-current="page"' : '') + '><span>' + app.esc(complete && complete.label || app.authorityUnavailable("actionability")) + '</span><small>' + Number(complete && complete.count || 0) + '</small></button><button type="button" data-state="ALL"><span>' + app.esc(all.label || app.authorityUnavailable("actionability")) + '</span><small>' + Number(all.count || 0) + '</small></button>';
  }
  function renderKpis(presentation) {
    dom.eduopsKpis.innerHTML = (presentation.actionabilityBuckets || []).map(function (item) {
      return '<button type="button" class="eduops-kpi-card" role="listitem" data-state="' + app.esc(item.code) + '" data-state-summary="' + app.esc(item.code) + '" aria-pressed="' + (app.state.actionabilityState === item.code ? "true" : "false") + '"><span class="eduops-kpi-label">' + app.esc(item.label) + '</span><strong class="eduops-kpi-value">' + Number(item.count || 0) + '</strong><small class="eduops-kpi-caption">' + app.esc(item.reason) + '</small></button>';
    }).join("");
  }
  function renderMetrics(presentation) {
    dom.eduopsMetrics.innerHTML = (presentation.metrics || []).map(function (item) { return '<div class="eduops-metric"><span>' + app.esc(item.label) + '</span><strong>' + app.esc(item.value) + '</strong></div>'; }).join("");
  }
  function renderReliability(presentation) {
    var item = presentation.reliability;
    var controls = '<button id="eduopsRefreshAuthority" class="eduops-button eduops-button-primary" type="button">Refresh source</button>';
    dom.eduopsReliabilityBanner.setAttribute("data-reliability", item && item.code || "UNAVAILABLE");
    dom.eduopsReliabilityBanner.innerHTML = '<strong>' + app.esc(item && item.label || app.authorityUnavailable("source reliability")) + '</strong><span>' + app.esc(item && item.reason || app.authorityUnavailable("source reliability")) + '</span><div>' + controls + '</div>';
  }
  function renderWorklists(presentation) {
    dom.eduopsWorklistKeys.innerHTML = (presentation.worklists || []).map(function (item) {
      return '<button type="button" class="eduops-worklist-key" data-worklist="' + app.esc(item.code) + '" aria-selected="' + (app.state.worklistKey === item.code ? "true" : "false") + '">' + app.esc(item.label) + '<span class="eduops-key-count">' + Number(item.count || 0) + '</span></button>';
    }).join("");
  }
  function renderQueueContext(response, selectedState, selectedWorklist) {
    if (!dom.eduopsOperationsQueueContext) return;
    var cockpit = response && response.cockpit || {};
    var packages = (cockpit.actionPackages || []).filter(function (item) { return !item.actionabilityState || item.actionabilityState === app.state.actionabilityState; });
    var activePackage = packages.filter(function (item) { return item.worklistKey === app.state.worklistKey || (!app.state.worklistKey && !item.worklistKey); })[0] || packages[0] || null;
    var packageList = packages.map(function (item) {
      return '<button type="button" data-eduops-operations-package="' + app.esc(item.packageId) + '"' + (item.disabled ? " disabled" : "") + ' title="' + app.esc(item.packageId) + '"><span>' + app.esc(item.label) + '</span><strong>' + Number(item.count || 0) + '</strong><small>' + app.esc(item.ownerDomain || "Authority") + '</small></button>';
    }).join("") || '<div class="eduops-operations-context-empty">No granular work packages returned for this state.</div>';
    dom.eduopsOperationsToolbarState.textContent = selectedState && selectedState.label || app.authorityUnavailable("actionability");
    dom.eduopsOperationsToolbarPackage.textContent = selectedWorklist && selectedWorklist.label || activePackage && activePackage.label || "All work types";
    dom.eduopsOperationsQueueContext.innerHTML = '<span class="eduops-eyebrow">Operational context</span><h2>' + app.esc(selectedWorklist && selectedWorklist.label || activePackage && activePackage.label || "All work types") + '</h2><dl><div><dt>Matched</dt><dd>' + Number(response.totalMatched || 0) + '</dd></div><div><dt>Authority</dt><dd>' + app.esc(activePackage && activePackage.authoritySource || "Actionability Resolver") + '</dd></div><div><dt>Communication</dt><dd>' + app.esc(activePackage && activePackage.recommendedCommunication && activePackage.recommendedCommunication.label || "No single recommendation") + '</dd></div></dl><div class="eduops-operations-package-panel-control" role="group" aria-label="Package panel"><span>Package panel</span><button type="button" class="active">Compact</button><button type="button" data-eduops-operations-focus-packages>Expanded</button><button type="button" data-eduops-operations-hide-packages>Hidden</button></div><div class="eduops-operations-context-package-list">' + packageList + '</div>';
  }
  function renderScopes(presentation) {
    document.querySelectorAll("[data-work-scope]").forEach(function (button) {
      var code = button.getAttribute("data-work-scope");
      var item = authorityItem(presentation.workScopes, code);
      button.textContent = item && item.label || app.authorityUnavailable("work scope");
      button.disabled = !item;
      button.setAttribute("aria-pressed", code === app.state.workScope ? "true" : "false");
    });
  }
  function filterOptions(items, current, emptyLabel) {
    return '<option value="">' + app.esc(emptyLabel) + '</option>' + (Array.isArray(items) ? items : []).map(function (item) { return '<option value="' + app.esc(item.code) + '"' + (item.code === current ? " selected" : "") + '>' + app.esc(item.label) + '</option>'; }).join("");
  }

  function renderFilterControls(response) {
    var options = response && response.presentation && response.presentation.filterOptions || {};
    var filters = app.state.filters || {};
    dom.eduopsSearch.value = app.state.filters.search || "";
    dom.eduopsPageSize.value = String(app.state.pageSize);
    dom.eduopsSort.innerHTML = '<option value="urgency:asc">Urgency</option><option value="age:asc">Longest waiting</option><option value="name:asc">Applicant name</option>';
    dom.eduopsSort.value = (app.state.sort.key || "urgency") + ":" + (app.state.sort.direction || "asc");
    dom.eduopsOwnerFilter.innerHTML = filterOptions(options.owner, filters.owner, "All owners");
    dom.eduopsUrgencyFilter.innerHTML = filterOptions(options.urgency, filters.urgency, "All urgency");
    dom.eduopsRouteFilter.innerHTML = filterOptions(options.primaryRoute, filters.primaryRoute, "All routes");
    dom.eduopsDocumentFilter.innerHTML = filterOptions(options.documentState, filters.documentState, "All document states");
    dom.eduopsFinanceFilter.innerHTML = filterOptions(options.financeState, filters.financeState, "All Finance states");
    dom.eduopsContactFilter.innerHTML = filterOptions(options.contactabilityState, filters.contactabilityState, "All contactability");
    dom.eduopsCommunicationFilter.innerHTML = filterOptions(options.communicationState, filters.communicationState, "All communication states");
    dom.eduopsCoolingFilter.value = filters.cooling || "";
    dom.eduopsBlockKindFilter.innerHTML = filterOptions(options.blockKind, filters.blockKind, "All blocker types");
    var chips = [];
    if (app.state.filters.search) chips.push(["Search", app.state.filters.search]);
    if (app.state.workScope !== "ALL_AUTHORISED") { var scope = authorityItem(response.presentation.workScopes, app.state.workScope); chips.push(["Work scope", scope && scope.label || app.authorityUnavailable("work scope")]); }
    [["Owner", "owner", filters.owner], ["Urgency", "urgency", filters.urgency], ["Route", "primaryRoute", filters.primaryRoute], ["Documents", "documentState", filters.documentState], ["Finance", "financeState", filters.financeState], ["Contactability", "contactabilityState", filters.contactabilityState], ["Communication", "communicationState", filters.communicationState], ["Cooling-off", "cooling", filters.cooling], ["Blocker", "blockKind", filters.blockKind]].forEach(function (item) { if (item[2]) { var projected = authorityItem(options[item[1]], item[2]); chips.push([item[0], projected && projected.label || app.authorityUnavailable(item[0].toLowerCase())]); } });
    dom.eduopsFilterChips.innerHTML = chips.map(function (item) { return '<span class="eduops-filter-chip">' + app.esc(item[0]) + ': ' + app.esc(item[1]) + '</span>'; }).join("");
    dom.eduopsFilterCount.textContent = String(chips.length);
  }

  function excludedCount() { return Object.keys(app.state.selectionExcluded || {}).filter(function (key) { return app.state.selectionExcluded[key] === true; }).length; }
  function rowActionAvailable(row) {
    var decision = row && row.authorityDecision;
    return !!decision && decision.schemaVersion === "EDUOPS_ROW_AUTHORITY_DECISION_V1" && decision.stale !== true && decision.actionAvailable === true && row.selectable === true;
  }

  function contextRibbonHtml(row) {
    var ribbon = row && row.applicantContextRibbon;
    if (!ribbon || ribbon.schemaVersion !== "OPSEDU_APPLICANT_CONTEXT_RIBBON_V1") return '<div class="eduops-operations-context-unavailable">' + app.esc(app.authorityUnavailable("applicant context ribbon")) + '</div>';
    var items = (ribbon.items || []).map(function (item) {
      return '<span class="eduops-operations-context-item" data-context-key="' + app.esc(item.key) + '" title="' + app.esc(item.reason || item.authoritySource) + '"><small>' + app.esc(item.label) + '</small><strong>' + app.esc(item.displayValue) + '</strong></span>';
    }).join("");
    var trace = row.traceAudit;
    var traceHtml = trace && trace.schemaVersion === "OPSEDU_TRACE_AUDIT_V1"
      ? '<details class="eduops-operations-trace"><summary>Show trace</summary><dl><div><dt>Authority</dt><dd>' + app.esc(trace.authoritySource) + '</dd></div><div><dt>Snapshot</dt><dd>' + app.esc(trace.snapshotId) + '</dd></div><div><dt>Reason</dt><dd>' + app.esc(trace.reasonCode || trace.routeReason) + '</dd></div></dl></details>'
      : '<div class="eduops-operations-context-unavailable">' + app.esc(app.authorityUnavailable("trace audit")) + '</div>';
    return '<div class="eduops-operations-context-ribbon">' + items + '</div>' + traceHtml;
  }

  function operationalRow(row) {
    var dto = row && row.operationalRow;
    if (!dto || dto.schemaVersion !== "OPSEDU_OPERATIONAL_ROW_V1") {
      return {
        issueLabel: app.authorityUnavailable("operational row"),
        issueEvidence: "Refresh or retry before continuing.",
        nextActionLabel: app.authorityUnavailable("next action"),
        statusLabel: app.authorityUnavailable("actionability"),
        contactLabel: app.authorityUnavailable("contactability"),
        dueLabel: "",
        workPackageLabel: app.authorityUnavailable("work package"),
        authorityReason: app.authorityUnavailable("authority result"),
        selectionLabel: "Not selectable",
        missingDocumentNames: []
      };
    }
    return dto;
  }

  function rowDetailHtml(row, op, blockedReason) {
    var p = row.presentation || {};
    var missingNames = (op.missingDocumentNames || []).join(", ");
    return '<details class="eduops-row-detail"><summary>▾ Details</summary><div class="eduops-row-detail-grid">'
      + '<div><span>Lifecycle</span><strong>' + app.esc(op.lifecycleLabel || app.authorityLabel(p.lifecycle, "lifecycle state")) + '</strong></div>'
      + '<div><span>Actionability</span><strong>' + app.esc(op.actionabilityLabel || app.authorityLabel(p.actionability, "actionability")) + '</strong></div>'
      + '<div><span>Work package</span><strong>' + app.esc(op.workPackageLabel || app.authorityLabel(p.worklist, "worklist")) + '</strong></div>'
      + '<div><span>Primary route</span><strong>' + app.esc(op.primaryRouteLabel || app.authorityLabel(p.route, "operator route")) + '</strong></div>'
      + '<div><span>Lifecycle owner</span><strong>' + app.esc(op.lifecycleOwnerLabel || app.authorityLabel(p.owner, "owner")) + '</strong></div>'
      + '<div><span>Operator next action</span><strong>' + app.esc(op.nextActionLabel || app.authorityLabel(p.nextAction, "next action")) + '</strong></div>'
      + '<div><span>Reason code</span><strong>' + app.esc(op.reasonCode || "Not returned") + '</strong></div>'
      + '<div><span>Documents</span><strong>' + app.esc(op.documentLabel || app.authorityLabel(p.documents, "document state")) + '</strong></div>'
      + '<div><span>Missing documents</span><strong>' + app.esc(missingNames || "None returned") + '</strong></div>'
      + '<div><span>Finance</span><strong>' + app.esc(op.financeLabel || app.authorityLabel(p.finance, "finance")) + '</strong></div>'
      + '<div><span>Contactability</span><strong>' + app.esc(op.contactabilityLabel || app.authorityLabel(p.contactability, "contactability")) + '</strong></div>'
      + '<div><span>Communication</span><strong>' + app.esc(op.communicationLabel || "Not returned") + '</strong></div>'
      + '<div><span>Next-action timestamp</span><strong>' + app.esc(op.nextActionTimestamp || app.authorityUnavailable("next-action timestamp")) + '</strong></div>'
      + '<div><span>Selection</span><strong>' + app.esc(op.selectionLabel || "Not selectable") + '</strong></div>'
      + '<div><span>Selection block</span><strong>' + app.esc(row.selectBlockReason || "None") + '</strong></div>'
      + '<div><span>Authority result</span><strong>' + app.esc(op.authorityResultLabel || app.authorityLabel(p.actionability, "authority result")) + '</strong></div>'
      + '<div class="eduops-row-detail-wide"><span>Authority reason</span><strong>' + app.esc(blockedReason || op.authorityReason || "No block returned") + '</strong></div>'
      + '</div>' + contextRibbonHtml(row) + '</details>';
  }

  function selectionCount(response) {
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") {
      return Math.max(0, Number(response && response.reconciliation && response.reconciliation.totalAuthoritySelectable || 0) - excludedCount());
    }
    return Object.keys(app.state.selected).filter(function (key) { return app.state.selected[key] === true && app.state.selectionExcluded[key] !== true; }).length;
  }

  function renderSelection(response) {
    var count = selectionCount(response);
    var summary = response.presentation && response.presentation.selection || {};
    var selectable = Number(summary.visibleSelectable || 0);
    var blocked = Number(summary.visibleBlocked || 0);
    var mode = app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY" ? "all eligible matching current query" : "explicit selected applicants";
    dom.eduopsSelectionSummary.textContent = Number(summary.totalMatched || 0) + " matched / " + selectable + " selectable on this page / " + blocked + " unavailable. Operator selection intent " + count + " in " + mode + " / " + excludedCount() + " excluded. Execution authority is evaluated only in Batch Operations.";
    if (dom.eduopsQueueCompactStats) dom.eduopsQueueCompactStats.textContent = Number(summary.totalMatched || 0) + " matched · " + selectable + " visible · " + count + " selected · " + excludedCount() + " excluded";
    var batchAvailable = app.operationAvailable("BATCH_COMMUNICATION");
    dom.eduopsOpenBatch.disabled = count === 0 || !batchAvailable;
    dom.eduopsBatchReason.textContent = !batchAvailable ? app.operationUnavailableReason("BATCH_COMMUNICATION") : count === 0 ? "Select an eligible cohort to enable a batch preview." : "Selection is bound to product, snapshot, query and worklist; Batch Operations revalidates before preview.";
  }

  function rowHtml(row) {
    var id = row.applicantId;
    var excluded = app.state.selectionExcluded && app.state.selectionExcluded[id] === true;
    var available = rowActionAvailable(row);
    var selected = app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY" ? available && !excluded : app.state.selected[id] === true && !excluded;
    var blocked = !available;
    var p = row.presentation || {};
    var authority = row.authorityDecision || {};
    var blockedReason = authority.reason || row.selectBlockReason || app.authorityUnavailable("actionability");
    var op = operationalRow(row);
    var issueMeta = [op.issueEvidence, op.issueDetail].filter(function (value) { return !!value; }).join(" - ");
    var statusMeta = [op.contactLabel, op.dueLabel, op.statusLabel].filter(function (value) { return !!value; }).join(" - ");
    return '<tr data-applicant-row="' + app.esc(id) + '"' + (selected ? ' data-selected="true"' : '') + '>'
      + '<td class="eduops-col-select"><input class="eduops-row-checkbox" type="checkbox" data-select-applicant="' + app.esc(id) + '" aria-label="Select ' + app.esc(row.displayName) + '"' + (selected ? " checked" : "") + (blocked ? " disabled" : "") + '></td>'
      + '<td class="eduops-col-applicant"><button type="button" class="eduops-applicant-link" data-quick-applicant="' + app.esc(id) + '"><strong>' + app.esc(row.displayName) + '</strong><span>' + app.esc(id) + '</span></button></td>'
      + '<td class="eduops-col-issue"><strong>' + app.esc(op.issueLabel || app.authorityUnavailable("current issue")) + '</strong><span>' + app.esc(issueMeta || app.authorityUnavailable("evidence summary")) + '</span>' + rowDetailHtml(row, op, blockedReason) + '</td>'
      + '<td class="eduops-col-next-action"><strong>' + app.esc(op.nextActionLabel || app.authorityLabel(p.nextAction, "next action")) + '</strong><span>' + app.esc(op.nextActionDetail || op.workPackageLabel || app.authorityLabel(p.worklist, "work package")) + '</span></td>'
      + '<td class="eduops-col-row-status"><strong>' + app.esc(op.statusLabel || app.authorityLabel(p.actionability, "status")) + '</strong><span>' + app.esc(statusMeta || app.authorityUnavailable("contactability")) + '</span></td>'
      + '<td class="eduops-col-open"><button class="eduops-row-open" type="button" data-open-applicant="' + app.esc(id) + '">Open</button></td></tr>';
  }

  function renderRows(response) {
    var rows = response.rows || [];
    dom.eduopsWorklistRows.innerHTML = rows.map(rowHtml).join("");
    dom.eduopsEmptyState.hidden = rows.length !== 0;
    var start = rows.length ? ((response.page - 1) * response.pageSize + 1) : 0;
    var end = rows.length ? start + rows.length - 1 : 0;
    dom.eduopsVisibleRange.textContent = "Showing " + start + "-" + end + " of " + response.totalMatched;
  }

  function renderPagination(response) {
    dom.eduopsPreviousPage.disabled = response.page <= 1;
    dom.eduopsNextPage.disabled = response.page >= response.totalPages;
    var pages = [];
    var start = Math.max(1, response.page - 2);
    var end = Math.min(response.totalPages, start + 4);
    for (var page = start; page <= end; page++) pages.push(page);
    dom.eduopsPageNumbers.innerHTML = pages.map(function (page) { return '<button type="button" data-page="' + page + '"' + (page === response.page ? ' aria-current="page"' : '') + '>' + page + '</button>'; }).join("");
  }

  app.renderPendingWorkload = function (request, phase) {
    dom.eduopsApp.setAttribute("aria-busy", "true");
    dom.eduopsWorklistReason.textContent = (phase === "QUEUED" ? "Queued " : "Loading ") + app.contextLabel(request.payload) + ". Previous results will not be presented as the requested page.";
    dom.eduopsVisibleRange.textContent = (phase === "QUEUED" ? "Queued" : "Loading") + " page " + request.payload.page;
    dom.eduopsSelectionSummary.textContent = request.selectionCleared ? "Selection cleared while the requested workload is being reconciled." : "Loading requested workload. Selection will be shown only after the returned page is reconciled.";
    dom.eduopsOpenBatch.disabled = true;
    dom.eduopsBatchReason.textContent = "Unavailable until the active workload is fully reconciled.";
    dom.eduopsPreviousPage.disabled = true;
    dom.eduopsNextPage.disabled = true;
    dom.eduopsPageNumbers.innerHTML = "";
    dom.eduopsEmptyState.hidden = true;
    dom.eduopsWorklistRows.innerHTML = '<tr><td colspan="6"><div class="eduops-loading-state"><strong>Loading applicant workload...</strong><span>' + app.esc(app.contextLabel(request.payload)) + ' requested. Previous applicant rows were cleared while authority responds.</span></div></td></tr>';
  };

  app.renderWorkloadError = function (request, error, outcome) {
    dom.eduopsApp.setAttribute("aria-busy", "false");
    dom.eduopsWorklistReason.textContent = app.contextLabel(request.payload) + " did not complete. No stale response was applied.";
    dom.eduopsVisibleRange.textContent = "Workload unavailable";
    dom.eduopsSelectionSummary.textContent = "Workload unavailable. No selection is retained for this request.";
    dom.eduopsOpenBatch.disabled = true;
    dom.eduopsBatchReason.textContent = "Unavailable until the active workload is fully reconciled.";
    dom.eduopsPreviousPage.disabled = true;
    dom.eduopsNextPage.disabled = true;
    dom.eduopsPageNumbers.innerHTML = "";
    dom.eduopsEmptyState.hidden = true;
    dom.eduopsWorklistRows.innerHTML = '<tr><td colspan="6"><div class="eduops-error-state"><strong>' + app.esc(outcome === "TIMEOUT" ? "The request exceeded the 10-second limit." : "The workload request failed.") + '</strong><span>' + app.esc(error && error.message || error) + '</span><button type="button" class="eduops-button eduops-button-primary" data-retry-workload>Retry requested context</button></div></td></tr>';
  };

  app.renderWorkload = function (response, clientMs) {
    dom.eduopsApp.setAttribute("aria-busy", "false");
    var presentation = response && response.presentation;
    if (!presentation || presentation.schemaVersion !== "EDUOPS_WORKLOAD_PRESENTATION_V1") {
      return app.renderWorkloadError({ payload: app.queryPayload() }, new Error(app.authorityUnavailable("workload")), "BACKEND_CONTRACT_MISSING");
    }
    if (app.bootstrapMachine && app.bootstrapMachine.state !== "INTERACTIVE") app.setBootstrapState("SOURCE_READY", "Authoritative product source resolved.");
    renderNavigation(presentation);
    renderKpis(presentation);
    renderMetrics(presentation);
    renderReliability(presentation);
    renderWorklists(presentation);
    renderScopes(presentation);
    renderFilterControls(response);
    renderRows(response);
    if (typeof app.renderEduOpsOperationsWorkspace === "function") app.renderEduOpsOperationsWorkspace(response);
    renderSelection(response);
    renderPagination(response);
    var selectedState = authorityItem(presentation.actionabilityBuckets, app.state.actionabilityState) || presentation.allActionability;
    var selectedWorklist = authorityItem(presentation.worklists, app.state.worklistKey);
    var selectedScope = authorityItem(presentation.workScopes, app.state.workScope);
    renderQueueContext(response, selectedState, selectedWorklist);
    dom.eduopsSelectedStateLabel.textContent = selectedState && selectedState.label || app.authorityUnavailable("actionability");
    dom.eduopsSelectedWorklistLabel.textContent = selectedWorklist && selectedWorklist.label || app.authorityUnavailable("worklist");
    dom.eduopsSearch.placeholder = "Search within " + (selectedWorklist && selectedWorklist.label || selectedState && selectedState.label || "current workload");
    dom.eduopsWorklistReason.textContent = response.totalMatched + " matched. " + (selectedScope && selectedScope.label || app.authorityUnavailable("work scope")) + ". Request completed in " + clientMs + " ms; server " + Number(response.timings && response.timings.serverRpcMs || 0) + " ms.";
    dom.eduopsTopContext.textContent = (selectedState && selectedState.label || app.authorityUnavailable("actionability")) + " / " + (selectedWorklist && selectedWorklist.label || app.authorityUnavailable("worklist"));
    var runtime = response.runtime || {};
    var snapshotId = runtime.snapshotId || response.snapshotId || "";
    var snapshotAsOf = runtime.snapshotAsOf || response.snapshotAsOf || response.reconciliation && response.reconciliation.asOf || "";
    dom.eduopsSnapshotShort.textContent = snapshotId || "Snapshot unavailable";
    dom.eduopsSnapshotTime.textContent = snapshotAsOf || "Current authority";

    return '<section class="eduops-panel-card eduops-span-12"><header><div><h2>Temporary grant management</h2><p>Creates audited temporary grants only through admin_createTemporaryCapabilityGrant.</p></div></header><div class="eduops-form-grid"><label class="eduops-field">Configured non-SUPER account<select id="eduopsRoleGrantAccount">' + accountOptions + '</select></label><label class="eduops-field">Delegable capability<select id="eduopsRoleGrantCapability">' + capabilityOptions + '</select></label><label class="eduops-field">Start time<input id="eduopsRoleGrantStart" type="datetime-local"></label><label class="eduops-field">Duration hours<input id="eduopsRoleGrantHours" type="number" min="1" max="24" value="1"></label><label class="eduops-field eduops-field-wide">Mandatory reason<textarea id="eduopsRoleGrantReason" rows="3" placeholder="Required audit reason"></textarea></label></div><div class="eduops-action-row"><button type="button" class="eduops-button eduops-button-primary" data-role-create-grant>Review and create grant</button></div><p class="eduops-action-reason">The backend rejects SUPER targets, unknown accounts, non-delegable capabilities, inherited capabilities, indefinite or overlapping grants, and durations above 24 hours.</p></section>';
  }
  function openRolesReport(trigger) {
    var token = app.beginControlAction(trigger, "Loading...", "Loading Roles and Capabilities.");
    dom.eduopsReportContent.innerHTML = '<div class="eduops-loading-state"><strong>Loading Roles and Capabilities</strong><span>Resolving live backend capability authority.</span></div>';
    app.call("admin_getCapabilityGrantMatrix", {}).then(function (matrix) {
      if (app.state.report !== "roles") return;
      dom.eduopsReportContent.innerHTML = rolesMatrixHtml(matrix || {});
      app.finishControlAction(token, "SUCCESS", "Roles and Capabilities loaded.");
    }).catch(function (error) {
      if (app.state.report !== "roles") return;
      var message = String(error.message || error);
      dom.eduopsReportContent.innerHTML = '<div class="eduops-error-state"><strong>Roles and Capabilities unavailable</strong><span>' + app.esc(message) + '</span><button type="button" class="eduops-button eduops-button-primary" data-retry-report="roles">Retry Roles and Capabilities</button></div>';
      app.finishControlAction(token, "ERROR", "Roles and Capabilities failed: " + message);
    });
  }

  function openReport(kind, trigger) {
    app.state.report = kind;
    app.reportTrigger = trigger || document.activeElement;
    dom.eduopsReportPanel.hidden = false;
    dom.eduopsReportPanel.setAttribute("aria-hidden", "false");
    var meta = reportMeta[kind] || ["Supporting view", "READ-ONLY", "No operational workflow is attached to this view."];
    dom.eduopsReportPanel.setAttribute("data-module-state", meta[1]);
    dom.eduopsReportType.textContent = meta[1] === "STRUCTURAL" ? "Structural Preview / no operations" : (meta[1] === "AUTHORITY" ? "Administrative authority" : "Read-only supporting view");
    dom.eduopsReportTitle.textContent = meta[0];
    app.setInteractionState("SUCCESS", meta[0] + " opened. " + meta[1].toLowerCase() + ".");
    if (kind === "reconciliation" || kind === "hidden") {
      var context = app.contextLabel(app.queryPayload());
      var token = app.beginControlAction(trigger, "Loading...", "Loading " + meta[0] + " for " + context + ".");
      dom.eduopsReportContent.innerHTML = '<div class="eduops-loading-state"><strong>Loading ' + app.esc(meta[0]) + '</strong><span>' + app.esc(context) + '. This request has a bounded timeout and visible retry path.</span></div>';
      var reportPayload = app.queryPayload();
      reportPayload.hiddenPage = app.state.reportHiddenPage || 1;
      reportPayload.hiddenPageSize = 50;
      app.call("eduops_getReconciliation", reportPayload).then(function (response) {
        if (app.state.report !== kind) return;
        if (!response || response.schemaVersion !== "EDUOPS_RECONCILIATION_RESPONSE_V1" || !response.reconciliation || response.reconciliation.schemaVersion !== "EDUOPS_RECONCILIATION_V1") {
          dom.eduopsReportContent.innerHTML = '<div class="eduops-error-state"><strong>' + app.esc(app.authorityUnavailable("population reconciliation")) + '</strong><span>BACKEND_CONTRACT_MISSING</span></div>';
          app.finishControlAction(token, "BLOCKED", "Authoritative population reconciliation was not returned.");
          return;
        }
        var r = response.reconciliation || {};
        var page = response.hiddenReasonPage || r.hiddenReasonPage || {};
        var rows = [["Canonical population", r.canonicalPopulation], ["Matched workload", r.totalMatched], ["Visible page", r.visiblePageCount], ["Matching on later pages", r.matchingOnLaterPages], ["Outside current view", r.hiddenFromCurrentView], ["Authority-blocked in current view", r.totalAuthorityBlocked]];
        var arithmetic = '<div class="eduops-module-status" data-module-state="READ-ONLY"><strong>Count arithmetic</strong><span>Population = matched workload + outside current view. Matched workload = visible page + matching on later pages.</span></div>';
        var hidden = (page.rows || []).map(function (item) { return '<li><strong>' + app.esc(item.displayName || item.applicantId) + '</strong><span>' + app.esc(item.applicantId) + ' - ' + app.esc(item.reason || app.authorityUnavailable("hidden-record reason")) + '</span></li>'; }).join("");
        var pager = page.totalPages > 1 ? '<div class="eduops-action-row"><button class="eduops-button eduops-button-secondary" type="button" data-hidden-page="' + Math.max(1, Number(page.page || 1) - 1) + '"' + (Number(page.page || 1) <= 1 ? " disabled" : "") + '>Previous hidden reasons</button><span>Page ' + Number(page.page || 1) + ' of ' + Number(page.totalPages || 1) + '</span><button class="eduops-button eduops-button-secondary" type="button" data-hidden-page="' + Math.min(Number(page.totalPages || 1), Number(page.page || 1) + 1) + '"' + (Number(page.page || 1) >= Number(page.totalPages || 1) ? " disabled" : "") + '>Next hidden reasons</button></div>' : "";
        dom.eduopsReportContent.innerHTML = reportHtml("Authoritative workload composition", "Counts use one product snapshot and non-overlapping categories.", rows) + arithmetic + (hidden ? '<details class="eduops-disclosure" open><summary>Exact hidden reasons (' + Number(page.totalHidden || 0) + ')</summary>' + pager + '<ul class="eduops-audit-list">' + hidden + '</ul>' + pager + '</details>' : '<div class="eduops-empty-state"><strong>No hidden records returned</strong><span>The current view is fully reconciled.</span></div>');
        app.finishControlAction(token, "SUCCESS", meta[0] + " loaded for " + context + ".");
      }).catch(function (error) {
        if (app.state.report !== kind) return;
        var message = String(error.message || error);
        dom.eduopsReportContent.innerHTML = '<div class="eduops-error-state"><strong>' + app.esc(meta[0]) + ' unavailable</strong><span>' + app.esc(message) + '</span><button type="button" class="eduops-button eduops-button-primary" data-retry-report="' + app.esc(kind) + '">Retry ' + app.esc(meta[0]) + '</button><small>Requested context: ' + app.esc(context) + '</small></div>';
        app.finishControlAction(token, "ERROR", meta[0] + " failed: " + message);
      });
      return;
    }
    var workload = app.state.workload || {};
    var modules = workload.presentation && workload.presentation.modules || {};
    if (["finance", "communications", "portal", "contactability", "lifecycle"].indexOf(kind) >= 0) { dom.eduopsReportContent.innerHTML = moduleProjectionHtml(kind, modules[kind]); return; }
    if (kind === "roles") {
      openRolesReport(trigger);
      return;
    }
    if (/^(approvals|data-quality)$/.test(kind)) {
      dom.eduopsReportContent.innerHTML = '<div class="eduops-error-state"><strong>' + app.esc(app.authorityUnavailable(kind)) + '</strong><span>BACKEND_CONTRACT_MISSING</span></div>';
      return;
    }
    if (kind === "summary") {
      dom.eduopsReportContent.innerHTML = reportHtml("Operational position", meta[2], (workload.presentation.metrics || []).map(function (item) { return [item.label, item.value]; }));
    } else if (kind === "reports") {
      dom.eduopsReportContent.innerHTML = moduleProjectionHtml("population", modules.population);
    } else if (kind === "audit-system") {
      var diagnostics = window.__EDUOPS_REQUEST_DIAGNOSTICS__ || [];
      var failures = diagnostics.filter(function (item) { return item.outcome === "ERROR" || item.outcome === "TIMEOUT"; }).length;
      dom.eduopsReportContent.innerHTML = reportHtml("Client transport diagnostics", "Display-only browser request telemetry; not audit authority.", [["Workload requests", diagnostics.length], ["Failed or timed out", failures]]) + '<p class="eduops-module-next-step">Open an applicant Audit tab for authoritative receipts.</p>';
    } else if (kind === "health") {
      dom.eduopsReportContent.innerHTML = moduleProjectionHtml("health", modules.health);
    }
  }

  function closeReport() {
    dom.eduopsReportPanel.hidden = true;
    dom.eduopsReportPanel.setAttribute("aria-hidden", "true");
    app.state.report = null;
    if (app.reportTrigger && app.reportTrigger.isConnected) app.reportTrigger.focus();
  }

  app.components = { badge: badge, openReport: openReport, closeReport: closeReport, closeQuickView: closeQuickView };

  app.bindWorkspace = function () {
    cacheDom();
    dom.eduopsGlobalSearchResults.innerHTML = '<span class="eduops-search-placeholder">Find any applicant by name, ApplicantID, email or phone.</span>';
    var searchTimer = null;
    function applyFilter(key, value) {
      app.state.filters[key] = value || "";
      app.clearSelection();
      app.setInteractionState("SUCCESS", "Workload filter changed. The prior cohort was cleared because its server query binding no longer applies.");
      app.requestWorkload({ resetPage: true });
    }
    [[dom.eduopsOwnerFilter, "owner"], [dom.eduopsUrgencyFilter, "urgency"], [dom.eduopsRouteFilter, "primaryRoute"], [dom.eduopsDocumentFilter, "documentState"], [dom.eduopsFinanceFilter, "financeState"], [dom.eduopsContactFilter, "contactabilityState"], [dom.eduopsCommunicationFilter, "communicationState"], [dom.eduopsCoolingFilter, "cooling"], [dom.eduopsBlockKindFilter, "blockKind"]].forEach(function (entry) {
      entry[0].addEventListener("change", function () { applyFilter(entry[1], this.value); });
    });
    dom.eduopsGlobalSearch.addEventListener("input", function () { clearTimeout(searchTimer); searchTimer = setTimeout(runGlobalSearch, 250); });
    dom.eduopsSearch.addEventListener("input", function () { clearTimeout(searchTimer); searchTimer = setTimeout(function () { app.state.filters.search = dom.eduopsSearch.value; app.clearSelection(); app.requestWorkload({ resetPage: true }); }, 250); });
    dom.eduopsPageSize.addEventListener("change", function () { app.state.pageSize = Number(this.value || 25); app.clearSelection(); app.requestWorkload({ resetPage: true }); });
    dom.eduopsSort.addEventListener("change", function () { var parts = this.value.split(":"); app.state.sort = { key: parts[0], direction: parts[1] || "asc" }; app.requestWorkload({ resetPage: true }); });
    dom.eduopsToggleFilters.addEventListener("click", function () { var open = dom.eduopsAdvancedFilters.hidden; dom.eduopsAdvancedFilters.hidden = !open; this.setAttribute("aria-expanded", open ? "true" : "false"); app.setInteractionState("SUCCESS", open ? "Additional workload filters opened." : "Additional workload filters closed."); });
    byId("eduopsClearFilters").addEventListener("click", function () { app.state.filters = { search: "" }; app.clearSelection(); app.requestWorkload({ resetPage: true }); });
    byId("eduopsRailCollapse").addEventListener("click", function () {
      var collapsed = dom.eduopsApp.getAttribute("data-rail-collapsed") === "true";
      dom.eduopsApp.setAttribute("data-rail-collapsed", collapsed ? "false" : "true");
      this.setAttribute("aria-expanded", collapsed ? "true" : "false");
      this.setAttribute("aria-label", collapsed ? "Collapse navigation" : "Expand navigation");
      app.setInteractionState("SUCCESS", collapsed ? "Operations navigation expanded." : "Operations navigation collapsed.");
    });
    byId("eduopsSelectVisible").addEventListener("click", function () { app.clearSelection(); app.state.selectionMode = "EXPLICIT_SELECTION"; (app.state.workload.rows || []).forEach(function (row) { if (rowActionAvailable(row)) app.state.selected[row.applicantId] = true; }); app.state.selectionContext = app.selectionContext(app.queryPayload(), app.state.snapshotId); renderSelection(app.state.workload); renderRows(app.state.workload); });
    byId("eduopsSelectAllReturned").addEventListener("click", function () { app.clearSelection(); app.state.selectionMode = "EXPLICIT_SELECTION"; (app.state.workload.rows || []).forEach(function (row) { if (rowActionAvailable(row)) app.state.selected[row.applicantId] = true; }); app.state.selectionContext = app.selectionContext(app.queryPayload(), app.state.snapshotId); renderSelection(app.state.workload); renderRows(app.state.workload); app.setInteractionState("SUCCESS", "Eligible applicants on this page selected."); });
    byId("eduopsSelectAllMatching").addEventListener("click", function () {
      var binding = app.state.workload && app.state.workload.queryBinding || app.state.workload && app.state.workload.reconciliation && app.state.workload.reconciliation.queryBinding || null;
      if (!binding || !binding.query || !binding.queryFingerprint) {
        app.clearSelection();
        renderSelection(app.state.workload);
        renderRows(app.state.workload);
        app.setInteractionState("BLOCKED", "Server query binding is unavailable. Refresh the workload before selecting all matching applicants.");
        return;
      }
      app.clearSelection();
      app.state.selectionMode = "ALL_ELIGIBLE_MATCHING_QUERY";
      app.state.selectionQueryBinding = app.clone(binding);
      app.state.selectionQuery = app.clone(binding.query);
      app.state.selectionContext = app.selectionContext(app.state.selectionQuery, app.state.snapshotId);
      renderSelection(app.state.workload);
      renderRows(app.state.workload);
      app.setInteractionState("SUCCESS", "All eligible applicants matching the server-bound query selected for bounded batch execution.");
    });
    byId("eduopsClearSelection").addEventListener("click", function () { app.clearSelection(); renderSelection(app.state.workload); renderRows(app.state.workload); });
    byId("eduopsClearExclusions").addEventListener("click", function () { app.clearSelectionExclusions(); renderSelection(app.state.workload); renderRows(app.state.workload); app.setInteractionState("SUCCESS", "Exclusions cleared. The server-bound master cohort remains selected."); });
    byId("eduopsRefreshSnapshot").addEventListener("click", function () { app.requestWorkload({ refreshSnapshot: true }); });
    dom.eduopsOpenReconciliation.addEventListener("click", function () { openReport("reconciliation", this); });
    byId("eduopsCloseReport").addEventListener("click", closeReport);
    dom.eduopsCloseDrawer.addEventListener("click", closeQuickView);
    dom.eduopsDrawerScrim.addEventListener("click", closeQuickView);
    dom.eduopsPreviousPage.addEventListener("click", function () { if (app.state.page > 1) { app.state.page--; app.requestWorkload(); } });
    dom.eduopsNextPage.addEventListener("click", function () { if (app.state.workload && app.state.page < app.state.workload.totalPages) { app.state.page++; app.requestWorkload(); } });
    dom.eduopsProductSwitcher.addEventListener("change", function () {
      var requested = this.value;
      app.saveProductState(app.state.product);
      app.restoreProductState(requested);
      app.clearSelection();
      dismissGlobalSearch();
      app.requestWorkload();
    });

    document.addEventListener("click", function (event) {
      var stateButton = event.target.closest("[data-state]");
      if (stateButton && (stateButton.closest("#eduopsActionNav") || stateButton.closest("#eduopsHistoryNav"))) {
        var requested = stateButton.getAttribute("data-state");
        app.state.actionabilityState = requested;
        app.state.worklistKey = "";
        if (!app.state.workScopePinned) app.state.workScope = "ALL_AUTHORISED";
        app.clearSelection();
        app.requestWorkload({ resetPage: true });
        return;
      }
      var summaryState = event.target.closest("[data-state-summary]");
      if (summaryState) {
        app.state.actionabilityState = summaryState.getAttribute("data-state-summary");
        app.state.worklistKey = "";
        if (!app.state.workScopePinned) app.state.workScope = "ALL_AUTHORISED";
        app.clearSelection();
        app.requestWorkload({ resetPage: true });
        return;
      }
      var worklist = event.target.closest("[data-worklist]");
      if (worklist) { app.state.worklistKey = worklist.getAttribute("data-worklist"); app.clearSelection(); app.requestWorkload({ resetPage: true }); return; }
      var scope = event.target.closest("[data-work-scope]");
      if (scope) { app.state.workScope = scope.getAttribute("data-work-scope"); app.clearSelection(); app.requestWorkload({ resetPage: true }); return; }
      var page = event.target.closest("[data-page]");
      if (page) { app.state.page = Number(page.getAttribute("data-page")); app.requestWorkload(); return; }
      var select = event.target.closest("[data-select-applicant]");
      if (select) {
        var applicantId = select.getAttribute("data-select-applicant");
        if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") {
          if (select.checked) app.restoreSelectionExclusion(applicantId); else app.excludeFromSelection(applicantId);
        } else {
          var explicitId = app.upper(applicantId).replace(/\s+/g, "");
          app.state.selected[explicitId] = select.checked === true;
          delete app.state.selectionExcluded[explicitId];
          app.state.selectionContext = app.selectionContext(app.queryPayload(), app.state.snapshotId);
          app.invalidateBatchAuthority("Recipient selection changed. Revalidation is required.");
        }
        renderSelection(app.state.workload);
        renderRows(app.state.workload);
        return;
      }
      var quick = event.target.closest("[data-quick-applicant]");
      if (quick) { openQuickView(quick.getAttribute("data-quick-applicant"), quick); return; }
      var open = event.target.closest("[data-open-applicant]");
      if (open && app.openWorkbench) { closeQuickView(); app.openWorkbench(open.getAttribute("data-open-applicant"), open); return; }
      var searchOpen = event.target.closest("[data-search-open]");
      if (searchOpen && app.openWorkbench) { var searchApplicantId = searchOpen.getAttribute("data-search-open"); app.openWorkbench(searchApplicantId, searchOpen); return; }
      var searchWorklist = event.target.closest("[data-search-worklist]");
      if (searchWorklist) {
        var found = app.state.searchResults.filter(function (row) { return row.applicantId === searchWorklist.getAttribute("data-search-worklist"); })[0];
        if (found && found.searchHandoff && app.openServerBoundQueue) { app.openServerBoundQueue(found.searchHandoff.queueBinding, found.searchHandoff.openQueueLabel); }
        return;
      }
      var report = event.target.closest("[data-report]");
      if (report) { openReport(report.getAttribute("data-report"), report); return; }
      var retryReport = event.target.closest("[data-retry-report]");
      if (retryReport) { openReport(retryReport.getAttribute("data-retry-report"), retryReport); return; }
      var createGrant = event.target.closest("[data-role-create-grant]");
      if (createGrant) {
        var account = byId("eduopsRoleGrantAccount").value;
        var capability = byId("eduopsRoleGrantCapability").value;
        var hours = Math.max(1, Math.min(24, Number(byId("eduopsRoleGrantHours").value || 1)));
        var startRaw = byId("eduopsRoleGrantStart").value;
        var start = startRaw ? new Date(startRaw) : new Date();
        var expiry = new Date(start.getTime() + hours * 60 * 60 * 1000);
        var reason = byId("eduopsRoleGrantReason").value;
        if (!reason || reason.trim().length < 8) { app.setInteractionState("BLOCKED", "A specific grant reason is required."); return; }
        if (!window.confirm("Create audited temporary grant for " + account + " / " + capability + " until " + expiry.toLocaleString() + "?")) return;
        app.call("admin_createTemporaryCapabilityGrant", { accountEmail: account, capabilityKey: capability, startsAt: start.toISOString(), expiresAt: expiry.toISOString(), reason: reason }).then(function () { openReport("roles", createGrant); }).catch(function (error) { app.setInteractionState("BLOCKED", "Grant creation blocked: " + (error.message || error)); });
        return;
      }
      var hiddenPage = event.target.closest("[data-hidden-page]");
      if (hiddenPage && !hiddenPage.disabled) { app.state.reportHiddenPage = Number(hiddenPage.getAttribute("data-hidden-page") || 1); openReport(app.state.report || "reconciliation", hiddenPage); return; }
      var reportApplicant = event.target.closest("[data-report-open-applicant]");
      if (reportApplicant && app.openWorkbench) { var reportApplicantId = reportApplicant.getAttribute("data-report-open-applicant"); closeReport(); app.openWorkbench(reportApplicantId, reportApplicant); return; }
      var retry = event.target.closest("[data-retry-workload]");
      if (retry) { app.requestWorkload(); return; }
      var retryBootstrap = event.target.closest("[data-retry-bootstrap]");
      if (retryBootstrap && typeof app.retryBootstrap === "function") { app.retryBootstrap(); return; }
      if (event.target.closest("#eduopsRefreshAuthority")) {
        if (app.bootstrapMachine && app.bootstrapMachine.state !== "INTERACTIVE" && typeof app.retryBootstrap === "function") app.retryBootstrap();
        else app.requestWorkload({ refreshSnapshot: true });
      }
    });
  };
})();
</script>
