<script>
(function () {
  "use strict";

  var app = window.EduOpsApp;
  var dom = {};
  var steps = ["cohort", "partitions", "preview", "confirm", "receipt"];

  function byId(id) { return document.getElementById(id); }
  function ensureDom() {
    if (dom.root) return;
    dom.root = byId("eduopsBatchWorkspace");
    dom.title = byId("eduopsBatchTitle");
    dom.subtitle = byId("eduopsBatchSubtitle");
    dom.status = byId("eduopsBatchOperationStatus");
    dom.executionStatus = byId("eduopsBatchExecutionStatus");
    dom.cohort = byId("eduopsBatchCohort");
    dom.steps = byId("eduopsBatchSteps");
    dom.panel = byId("eduopsBatchPanel");
    dom.footer = byId("eduopsBatchFooter");
    dom.session = byId("eduopsSessionBar");
  }
  function selectedRows() {
    var rows = app.state.workload && app.state.workload.rows || [];
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") return rows.filter(function (row) { return row.selectable === true && app.state.selectionExcluded[row.applicantId] !== true; });
    return rows.filter(function (row) { return app.state.selected[row.applicantId] === true && row.selectable === true && app.state.selectionExcluded[row.applicantId] !== true; });
  }
  function selectedApplicantIds() {
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") return [];
    return Object.keys(app.state.selected || {}).filter(function (id) { return app.state.selected[id] === true && app.state.selectionExcluded[id] !== true; });
  }
  function excludedApplicantIds() {
    return Object.keys(app.state.selectionExcluded || {}).filter(function (id) { return app.state.selectionExcluded[id] === true; });
  }
  function masterCohortSize() {
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") {
      return Math.max(0, Number(app.state.workload && app.state.workload.reconciliation && app.state.workload.reconciliation.totalAuthoritySelectable || 0) - excludedApplicantIds().length);
    }
    return selectedApplicantIds().length;
  }
  function binding() {
    var serverBinding = app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY" ? app.clone(app.state.selectionQueryBinding || null) : null;
    var query = serverBinding && serverBinding.query || (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY" ? null : app.queryPayload());
    var queryFingerprint = serverBinding && serverBinding.queryFingerprint || (query ? app.queryFingerprint(query) : "");
    return { product: serverBinding && serverBinding.product || app.state.product, snapshotId: serverBinding && serverBinding.snapshotId || app.state.snapshotId, queryFingerprint: queryFingerprint, query: query, queryBinding: serverBinding, selectionMode: app.state.selectionMode, selectedApplicantIds: selectedApplicantIds(), excludedApplicantIds: excludedApplicantIds(), executionLimit: app.state.selectionExecutionLimit || 30 };
  }
  function cohortHeader() {
    var batch = app.state.batch;
    var master = batch.masterCohortSize || 0;
    var next = Math.min(master, Number(batch.binding.executionLimit || 30));
    dom.cohort.innerHTML = [["Product", batch.binding.product], ["Snapshot", batch.binding.snapshotId], ["Master cohort", master], ["Next execution", next], ["Excluded", batch.binding.excludedApplicantIds.length], ["Remaining after execution", Math.max(0, master - next)], ["Worklist", app.state.worklistKey ? app.humanize(app.state.worklistKey) : "All work types"], ["Query binding", batch.binding.queryFingerprint.slice(0, 56) + "..."]].map(function (item) { return '<div class="eduops-cohort-item"><span>' + app.esc(item[0]) + '</span><strong>' + app.esc(item[1]) + '</strong></div>'; }).join("");
  }
  function renderSteps() {
    var index = steps.indexOf(app.state.batch.step);
    dom.steps.innerHTML = steps.map(function (step, stepIndex) { var status = stepIndex < index ? "complete" : stepIndex === index ? "current" : "pending"; return '<button type="button" class="eduops-batch-step" data-batch-step="' + step + '" data-status="' + status + '"' + (stepIndex <= index ? "" : " disabled") + '><span class="eduops-batch-step-number">' + (status === "complete" ? "OK" : stepIndex + 1) + '</span>' + app.esc(app.humanize(step)) + '</button>'; }).join("");
  }
  function rowsTable(rows, outcome) {
    return '<div class="eduops-table-scroller"><table class="eduops-work-table"><thead><tr><th>Applicant</th><th>Actionability</th><th>Worklist</th><th>Outcome</th><th>Include</th><th>Handoff</th></tr></thead><tbody>' + rows.map(function (row) { var item = outcome && outcome[row.applicantId]; var excluded = app.state.selectionExcluded[row.applicantId] === true; var include = excluded ? '<button type="button" class="eduops-row-open" data-batch-restore="' + app.esc(row.applicantId) + '">Restore</button>' : '<button type="button" class="eduops-row-open" data-batch-exclude="' + app.esc(row.applicantId) + '">Exclude</button>'; return '<tr><td><strong>' + app.esc(row.displayName) + '</strong><span>' + app.esc(row.applicantId) + '</span></td><td>' + app.esc(app.humanize(row.actionabilityState)) + '</td><td>' + app.esc(app.humanize(row.worklistKey || row.worklistLabel)) + '</td><td>' + app.esc(excluded ? "Excluded by operator" : item ? item.outcome + (item.reason ? " - " + item.reason : "") : "Pending preview") + '</td><td>' + include + '</td><td><button type="button" class="eduops-row-open" data-batch-open="' + app.esc(row.applicantId) + '">Open</button></td></tr>'; }).join("") + '</tbody></table></div>';
  }
  function operationOptions() {
    return [
      ["BATCH_COMMUNICATION", "Batch communication", "The only proven batch-safe authority in this pass. Template, recipient and cooling-off are revalidated server-side."]
    ].map(function (item) { return '<label class="eduops-operation-option"><input type="radio" name="eduopsBatchOperation" value="' + item[0] + '"' + (app.state.batch.operation === item[0] ? " checked" : "") + '><span><strong>' + item[1] + '</strong><small>' + item[2] + '</small></span></label>'; }).join("");
  }
  function operationStatus(batch) {
    if (batch.receipt) {
      return { label: batch.receipt.outcome === "COMPLETE" ? "Operation complete" : "Execution receipt returned", state: batch.receipt.outcome === "COMPLETE" ? "READY" : "BLOCKED" };
    }
    if (batch.preview) {
      if (batch.preview.state !== "READY") return { label: "Preview blocked", state: "BLOCKED" };
      if (batch.step === "confirm") return { label: "Awaiting confirmation", state: "READY" };
      return { label: batch.step === "partitions" ? "Revalidation complete" : "Preview ready", state: "READY" };
    }
    if (batch.masterCohortSize > 0) return { label: "Awaiting revalidation", state: "READY" };
    return { label: "No eligible selection", state: "BLOCKED" };
  }
  function executionStatus(batch) {
    if (batch.receipt) return "Execution receipt returned";
    if (batch.step === "confirm") return "Execution confirmation pending";
    return "No execution performed";
  }
  function renderCohort() {
    var batch = app.state.batch;
    var templates = (app.state.workload && app.state.workload.batchTemplateOptions || []).map(function (item) { return '<option value="' + app.esc(item.messageType || item.templateId) + '"' + (batch.messageType === (item.messageType || item.templateId) ? " selected" : "") + '>' + app.esc(item.title || item.label || app.humanize(item.messageType || item.templateId)) + '</option>'; }).join("");
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><span class="eduops-eyebrow">Snapshot-bound selection</span><h2>Defined eligible cohort</h2><p>The server will revalidate every member before creating operation partitions.</p></div><span class="eduops-capability-state" data-state="' + (batch.masterCohortSize ? "READY" : "BLOCKED") + '">' + (batch.masterCohortSize ? "Ready to revalidate" : "No eligible selection") + '</span></header>' + rowsTable(batch.rows) + '</section><section class="eduops-panel-card eduops-span-12"><header><div><h2>Choose one homogeneous operation</h2><p>Document, payment and Portal actions are never batch-safe.</p></div></header><div class="eduops-operation-options">' + operationOptions() + '</div><div class="eduops-form-grid"><label class="eduops-field">Canonical template<select data-batch-template><option value="">Choose batch-safe template</option>' + templates + '</select></label><label class="eduops-field">Execution limit<select data-batch-execution-limit><option value="10">10</option><option value="25">25</option><option value="30">30</option></select></label></div></section></div>';
  }
  function renderPartitions() {
    var preview = app.state.batch.preview || {};
    var partitions = preview.partitions || [];
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-8"><header><div><h2>Server-authored partitions</h2><p>Capability, operation compatibility and current authority are revalidated.</p></div></header>' + (partitions.length ? partitions.map(function (part) { return '<article class="eduops-partition-card"><strong>' + app.esc(part.label || app.humanize(part.partitionKey)) + '</strong><span>' + Number(part.memberCount || 0) + ' execution members / cap ' + Number(part.executionCap || 0) + '</span><small>' + app.esc(part.requiredCapability || "Capability not returned") + '</small></article>'; }).join("") : '<div class="eduops-error-state"><strong>No executable partition returned</strong><span>' + app.esc(preview.message || "The cohort is blocked or incompatible.") + '</span></div>') + '</section><section class="eduops-panel-card eduops-span-4"><header><div><h2>Revalidation result</h2></div></header><dl class="eduops-definition-list"><div><dt>Master cohort</dt><dd>' + Number(preview.masterCohortSize || 0) + '</dd></div><div><dt>Execution cohort</dt><dd>' + Number(preview.executionCohortSize || preview.eligibleCount || 0) + '</dd></div><div><dt>Remaining after execution</dt><dd>' + Number(preview.remainingAfterExecution || 0) + '</dd></div><div><dt>Blocked</dt><dd>' + Number(preview.blockedCount || 0) + '</dd></div><div><dt>Excluded</dt><dd>' + Number(preview.excludedCount || 0) + '</dd></div><div><dt>Preview state</dt><dd>' + app.esc(app.humanize(preview.state || "UNKNOWN")) + '</dd></div></dl></section></div>';
  }
  function renderPreview() {
    var preview = app.state.batch.preview || {};
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><span class="eduops-eyebrow">Authoritative operation preview</span><h2>' + app.esc(preview.summary || app.humanize(app.state.batch.operation)) + '</h2><p>Nothing has executed. Review exact scope, capability and expiry.</p></div><span class="eduops-capability-state" data-state="' + (preview.state === "READY" ? "READY" : "BLOCKED") + '">' + app.esc(preview.state || "BLOCKED") + '</span></header><dl class="eduops-definition-list"><div><dt>Preview ID</dt><dd>' + app.esc(preview.previewId) + '</dd></div><div><dt>Snapshot</dt><dd>' + app.esc(preview.snapshotId) + '</dd></div><div><dt>Query fingerprint</dt><dd>' + app.esc(preview.queryFingerprint) + '</dd></div><div><dt>Required capability</dt><dd>' + app.esc(preview.requiredCapability) + '</dd></div><div><dt>Idempotency key</dt><dd>' + app.esc(preview.idempotencyKey) + '</dd></div><div><dt>Expires</dt><dd>' + app.esc(preview.expiresAt) + '</dd></div></dl>' + rowsTable(app.state.batch.rows) + '</section></div>';
  }
  function renderReceipt() {
    var receipt = app.state.batch.receipt || {};
    var outcomes = {};
    (receipt.applicantOutcomes || []).forEach(function (item) { outcomes[item.applicantId] = item; });
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><span class="eduops-eyebrow">Versioned authoritative receipt</span><h2>' + app.esc(receipt.outcome || "Receipt returned") + '</h2><p>' + app.esc(receipt.receiptId || "No receipt ID") + '</p></div><span class="eduops-capability-state" data-state="' + (receipt.outcome === "COMPLETE" ? "READY" : "BLOCKED") + '">' + app.esc(receipt.outcome || "UNKNOWN") + '</span></header>' + rowsTable(app.state.batch.rows, outcomes) + '</section></div>';
  }
  function render() {
    ensureDom();
    var batch = app.state.batch;
    cohortHeader();
    renderSteps();
    var status = operationStatus(batch);
    dom.status.textContent = "Operation status: " + status.label;
    dom.status.setAttribute("data-state", status.state);
    dom.executionStatus.textContent = executionStatus(batch);
    if (batch.step === "cohort") dom.panel.innerHTML = renderCohort();
    else if (batch.step === "partitions") dom.panel.innerHTML = renderPartitions();
    else if (batch.step === "preview" || batch.step === "confirm") dom.panel.innerHTML = renderPreview();
    else dom.panel.innerHTML = renderReceipt();
    var footer = "";
    if (batch.step === "cohort") footer = '<button class="eduops-button eduops-button-primary" type="button" data-batch-preview' + (!batch.operation || !batch.messageType || !batch.masterCohortSize ? " disabled" : "") + '>Revalidate and create preview</button>';
    if (batch.step === "partitions") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-back>Back to cohort</button><button class="eduops-button eduops-button-primary" type="button" data-batch-continue' + (batch.preview && batch.preview.state === "READY" ? "" : " disabled") + '>Review authoritative preview</button>';
    if (batch.step === "preview") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-back>Back</button><button class="eduops-button eduops-button-primary" type="button" data-batch-confirm' + (batch.preview && batch.preview.state === "READY" ? "" : " disabled") + '>Continue to confirmation</button>';
    if (batch.step === "confirm") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-back>Back</button><button class="eduops-button eduops-button-primary" type="button" data-batch-execute>Confirm batch send</button>';
    if (batch.step === "receipt") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-close>Return to updated workload</button>';
    dom.footer.innerHTML = footer;
  }

  app.openBatch = function (source) {
    if (app.state.workbench && app.state.dirty) return app.requestWorkbenchLeave(function () { app.openBatch(source); }, source);
    ensureDom();
    var rows = selectedRows();
    app.state.returnContext = app.snapshotReturnContext();
    var firstTemplate = (app.state.workload && app.state.workload.batchTemplateOptions || [])[0] || {};
    app.state.selectionMessageType = app.state.selectionMessageType || firstTemplate.messageType || firstTemplate.templateId || "";
    app.state.batch = { step: "cohort", binding: binding(), rows: rows, masterCohortSize: masterCohortSize(), operation: "BATCH_COMMUNICATION", messageType: app.state.selectionMessageType, preview: null, receipt: null, source: source };
    dom.root.hidden = false;
    dom.root.setAttribute("aria-hidden", "false");
    dom.title.textContent = "Batch Operations";
    dom.subtitle.textContent = app.state.batch.masterCohortSize + " selected applicant(s) / " + app.state.snapshotId;
    app.pushRoute("batch");
    render();
    byId("eduopsCloseBatch").focus();
  };
  app.closeBatch = function (fromHistory) {
    ensureDom();
    dom.root.hidden = true;
    dom.root.setAttribute("aria-hidden", "true");
    app.state.batch = null;
    if (!fromHistory) app.replaceRoute("workload");
    return app.restoreReturnContext();
  };
  function createPreview() {
    var batch = app.state.batch;
    var source = dom.footer.querySelector("[data-batch-preview]");
    var token = app.beginControlAction(source, "Revalidating...", "Revalidating the selected cohort and creating an authoritative preview.");
    var key = app.idempotencyKey(batch.operation, "COHORT");
    app.call("eduops_previewCommand", { operation: batch.operation, product: batch.binding.product, snapshotId: batch.binding.snapshotId, queryFingerprint: batch.binding.queryFingerprint, executionLimit: batch.binding.executionLimit, selection: batch.binding, idempotencyKey: key, draft: { messageType: batch.messageType } }).then(function (preview) { app.finishControlAction(token, "SUCCESS", "Batch preview created. Review server-authored partitions."); batch.preview = preview; batch.preview.idempotencyKey = preview.idempotencyKey || key; batch.step = "partitions"; render(); }).catch(function (error) { app.finishControlAction(token, "BLOCKED", "Batch preview blocked: " + (error.message || error)); batch.preview = { state: "BLOCKED", message: String(error.message || error), partitions: [] }; batch.step = "partitions"; render(); });
  }
  function execute() {
    var batch = app.state.batch;
    app.openConfirm({ title: "Confirm batch communication", html: '<p><strong>' + app.esc(batch.preview.summary || app.humanize(batch.operation)) + '</strong></p>' + '<dl class="eduops-definition-list"><div><dt>Message type</dt><dd>' + app.esc(batch.messageType) + '</dd></div><div><dt>Execution cohort</dt><dd>' + Number(batch.preview.executionCohortSize || batch.preview.eligibleCount || 0) + '</dd></div><div><dt>Excluded</dt><dd>' + Number(batch.preview.excludedCount || 0) + '</dd></div><div><dt>Blocked</dt><dd>' + Number(batch.preview.blockedCount || 0) + '</dd></div><div><dt>Remaining master cohort</dt><dd>' + Number(batch.preview.remainingAfterExecution || 0) + '</dd></div><div><dt>Snapshot</dt><dd>' + app.esc(batch.binding.snapshotId) + '</dd></div><div><dt>Expires</dt><dd>' + app.esc(batch.preview.expiresAt || "Not returned") + '</dd></div></dl>', proceedLabel: "Send confirmed batch", cancelLabel: "Return to preview", source: dom.footer.querySelector("[data-batch-execute]"), onProceed: function () { var executeToken = app.beginControlAction(byId("eduopsConfirmProceed"), "Executing...", "Executing the confirmed batch once."); app.call("eduops_executeCommand", { previewId: batch.preview.previewId, idempotencyKey: batch.preview.idempotencyKey, confirmation: true }).then(function (receipt) { app.finishControlAction(executeToken, "SUCCESS", "Batch receipt " + receipt.receiptId + " returned: " + receipt.outcome + "."); app.closeConfirm(false); batch.receipt = receipt; batch.step = "receipt"; app.clearSelection(); render(); }).catch(function (error) { app.finishControlAction(executeToken, "BLOCKED", "Batch blocked: " + (error.message || error)); app.closeConfirm(false); app.toast("Batch blocked: " + (error.message || error)); }); } });
  }
  function openWorkSession() {
    var rows = (app.state.workload && app.state.workload.rows || []).slice();
    if (!rows.length) { app.setInteractionState("BLOCKED", "Work Session cannot start because the current workload has no visible applicants."); return; }
    app.state.workSession = { applicantIds: rows.map(function (row) { return row.applicantId; }), index: 0, completed: [], skipped: [], exceptions: [] };
    app.openWorkbench(rows[0].applicantId, byId("eduopsStartSession"));
    app.setInteractionState("SUCCESS", "Work Session started with " + rows.length + " applicants.");
    renderSession();
  }
  function renderSession() {
    ensureDom();
    var session = app.state.workSession;
    if (!session || !app.state.workbench) { dom.session.hidden = true; return; }
    var current = session.applicantIds[session.index];
    dom.session.hidden = false;
    dom.session.innerHTML = '<div><strong>Work Session</strong><span>' + (session.index + 1) + ' of ' + session.applicantIds.length + ' / ' + app.esc(current) + '</span></div><div class="eduops-action-row"><button class="eduops-button eduops-button-secondary" type="button" data-session-skip>Skip</button><button class="eduops-button eduops-button-primary" type="button" data-session-next>Complete and next</button><button class="eduops-button eduops-button-secondary" type="button" data-session-exit>Return to workload</button></div>';
  }
  function advanceSession(outcome) {
    var session = app.state.workSession;
    if (!session) return;
    var current = session.applicantIds[session.index];
    session[outcome].push(current);
    app.setInteractionState("SUCCESS", current + " marked " + (outcome === "completed" ? "complete" : "skipped") + " in this Preview Work Session.");
    if (session.index >= session.applicantIds.length - 1) { app.state.workSession = null; app.closeWorkbench(); return; }
    session.index++;
    app.state.dirty = false;
    app.openWorkbench(session.applicantIds[session.index], dom.session);
    setTimeout(renderSession, 0);
  }

  app.bindBatch = function () {
    ensureDom();
    byId("eduopsCloseBatch").addEventListener("click", function () { app.closeBatch(); });
    byId("eduopsOpenBatch").addEventListener("click", function () { app.openBatch(this); });
    var sessionButton = byId("eduopsStartSession");
    if (sessionButton) sessionButton.addEventListener("click", openWorkSession);
    dom.root.addEventListener("change", function (event) {
      if (event.target.name === "eduopsBatchOperation") { app.state.batch.operation = event.target.value; app.state.batch.preview = null; render(); return; }
      if (event.target.matches("[data-batch-template]")) { app.state.batch.messageType = event.target.value; app.state.selectionMessageType = event.target.value; app.state.batch.preview = null; render(); return; }
      if (event.target.matches("[data-batch-execution-limit]")) { app.state.selectionExecutionLimit = Math.max(1, Math.min(30, Number(event.target.value || 30))); app.state.batch.binding = binding(); app.state.batch.preview = null; render(); }
    });
    dom.root.addEventListener("click", function (event) {
      var requestedStep = event.target.closest("[data-batch-step]");
      if (requestedStep && !requestedStep.disabled) { app.state.batch.step = requestedStep.getAttribute("data-batch-step"); render(); app.setInteractionState("SUCCESS", app.humanize(app.state.batch.step) + " batch step opened."); return; }
      if (event.target.closest("[data-batch-preview]")) return createPreview();
      if (event.target.closest("[data-batch-continue]")) { app.state.batch.step = "preview"; render(); return; }
      if (event.target.closest("[data-batch-confirm]")) { app.state.batch.step = "confirm"; render(); return; }
      if (event.target.closest("[data-batch-execute]")) return execute();
      if (event.target.closest("[data-batch-close]")) return app.closeBatch();
      var back = event.target.closest("[data-batch-back]");
      if (back) { var index = Math.max(0, steps.indexOf(app.state.batch.step) - 1); app.state.batch.step = steps[index]; render(); return; }
      var applicant = event.target.closest("[data-batch-open]");
      if (applicant) { var id = applicant.getAttribute("data-batch-open"); app.closeBatch(true); app.openWorkbench(id, applicant); }
      var exclude = event.target.closest("[data-batch-exclude]");
      if (exclude) { app.excludeFromSelection(exclude.getAttribute("data-batch-exclude")); app.state.batch.binding = binding(); app.state.batch.masterCohortSize = masterCohortSize(); app.state.batch.preview = null; render(); return; }
      var restore = event.target.closest("[data-batch-restore]");
      if (restore) { app.restoreSelectionExclusion(restore.getAttribute("data-batch-restore")); app.state.batch.binding = binding(); app.state.batch.masterCohortSize = masterCohortSize(); app.state.batch.preview = null; render(); }
    });
    document.addEventListener("click", function (event) {
      if (event.target.closest("[data-session-skip]")) advanceSession("skipped");
      if (event.target.closest("[data-session-next]")) advanceSession("completed");
      if (event.target.closest("[data-session-exit]")) { app.state.workSession = null; app.setInteractionState("SUCCESS", "Work Session ended. Returning to the exact workload context."); app.closeWorkbench(); }
    });
  };
  app.renderWorkSession = renderSession;
})();
</script>
