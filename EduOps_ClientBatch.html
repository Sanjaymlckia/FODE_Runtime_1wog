<script>
(function () {
  "use strict";

  var app = window.EduOpsApp;
  var dom = {};
  var steps = ["cohort", "partitions", "preview", "confirm", "receipt"];

  function byId(id) { return document.getElementById(id); }
  function ensureDom() {
    if (dom.root) return;
    dom.root = byId("eduopsBatchWorkspace");
    dom.title = byId("eduopsBatchTitle");
    dom.subtitle = byId("eduopsBatchSubtitle");
    dom.status = byId("eduopsBatchOperationStatus");
    dom.executionStatus = byId("eduopsBatchExecutionStatus");
    dom.cohort = byId("eduopsBatchCohort");
    dom.steps = byId("eduopsBatchSteps");
    dom.panel = byId("eduopsBatchPanel");
    dom.footer = byId("eduopsBatchFooter");
    dom.session = byId("eduopsSessionBar");
  }
  function selectedRows() {
    var rows = app.state.workload && app.state.workload.rows || [];
    function available(row) { var decision = row && row.authorityDecision; return !!decision && decision.schemaVersion === "EDUOPS_ROW_AUTHORITY_DECISION_V1" && decision.stale !== true && decision.actionAvailable === true && row.selectable === true; }
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") return rows.filter(function (row) { return available(row) && app.state.selectionExcluded[row.applicantId] !== true; });
    return rows.filter(function (row) { return app.state.selected[row.applicantId] === true && available(row); });
  }
  function selectedApplicantIds() {
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") return [];
    return Object.keys(app.state.selected || {}).filter(function (id) { return app.state.selected[id] === true; });
  }
  function excludedApplicantIds() { return Object.keys(app.state.selectionExcluded || {}).filter(function (id) { return app.state.selectionExcluded[id] === true; }); }
  function masterCohortSize() {
    if (app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY") return Math.max(0, Number(app.state.workload && app.state.workload.reconciliation && app.state.workload.reconciliation.totalAuthoritySelectable || 0) - excludedApplicantIds().length);
    return selectedApplicantIds().filter(function (id) { return app.state.selectionExcluded[id] !== true; }).length;
  }
  function binding() {
    var serverBinding = app.state.selectionMode === "ALL_ELIGIBLE_MATCHING_QUERY" ? app.clone(app.state.selectionQueryBinding || null) : null;
    var query = serverBinding && serverBinding.query || null;
    return {
      product: serverBinding && serverBinding.product || app.state.product,
      snapshotId: serverBinding && serverBinding.snapshotId || app.state.snapshotId,
      queryFingerprint: serverBinding && serverBinding.queryFingerprint || "",
      query: query,
      queryBinding: serverBinding,
      selectionMode: app.state.selectionMode,
      selectedApplicantIds: selectedApplicantIds(),
      excludedApplicantIds: excludedApplicantIds(),
      executionLimit: Number(app.state.selectionExecutionLimit || 0)
    };
  }
  function selectedTemplate() {
    var templates = app.state.batch && app.state.batch.catalogue && app.state.batch.catalogue.templates || [];
    return templates.filter(function (item) { return item.templateId === app.state.batch.templateId; })[0] || null;
  }
  function selectedRecipients() {
    var template = selectedTemplate();
    return template ? (template.recipients || []).filter(function (recipient) { return recipient.included === true; }) : [];
  }
  function invalidate(reason, reloadCatalogue) {
    var batch = app.state.batch;
    var catalogue = reloadCatalogue ? null : batch.catalogue;
    app.invalidateOperationAuthority(reason);
    batch.catalogue = catalogue;
  }
  function cohortHeader() {
    var batch = app.state.batch;
    var catalogue = batch.catalogue;
    var items = catalogue ? [["Master cohort", catalogue.masterCohortSize], ["Execution limit", catalogue.executionLimit], ["Evaluated execution cohort", catalogue.evaluatedCohortSize], ["Remaining after evaluation", catalogue.remainingAfterEvaluation], ["Excluded", catalogue.excludedCount], ["Snapshot", catalogue.snapshotId]] : [["Operator selection intent", batch.masterCohortSize], ["Execution limit", "Choose"], ["Authority status", "Not yet evaluated"], ["Excluded", batch.binding.excludedApplicantIds.length], ["Snapshot", batch.binding.snapshotId]];
    dom.cohort.innerHTML = items.map(function (item) { return '<div class="eduops-cohort-item"><span>' + app.esc(item[0]) + '</span><strong>' + app.esc(item[1]) + '</strong></div>'; }).join("");
  }
  function renderSteps() {
    var index = steps.indexOf(app.state.batch.step);
    dom.steps.innerHTML = steps.map(function (step, stepIndex) { var status = stepIndex < index ? "complete" : stepIndex === index ? "current" : "pending"; return '<button type="button" class="eduops-batch-step" data-batch-step="' + step + '" data-status="' + status + '"' + (stepIndex <= index ? "" : " disabled") + '><span class="eduops-batch-step-number">' + (status === "complete" ? "OK" : stepIndex + 1) + '</span>' + app.esc(app.formatCode(step)) + '</button>'; }).join("");
  }
  function recipientTable(rows, controls) {
    var list = rows || [];
    if (!list.length) return '<div class="eduops-empty-state"><strong>No recipients returned</strong><span>Authoritative decision unavailable. Refresh or retry.</span></div>';
    return '<div class="eduops-table-scroller eduops-recipient-review"><table class="eduops-work-table"><thead><tr><th>Applicant</th><th>Email</th><th>Actionability</th><th>Lifecycle / Finance</th><th>Communication decision</th><th>Template</th><th>Selection</th></tr></thead><tbody>' + list.map(function (row) {
      var excluded = app.state.selectionExcluded[row.applicantId] === true;
      var button = controls ? (excluded ? '<button type="button" class="eduops-row-open" data-batch-restore="' + app.esc(row.applicantId) + '">Restore</button>' : '<button type="button" class="eduops-row-open" data-batch-exclude="' + app.esc(row.applicantId) + '">Exclude</button>') : "";
      var p = row.presentation || {};
      return '<tr><td><strong>' + app.esc(row.name || row.displayName || "Unnamed") + '</strong><span>' + app.esc(row.applicantId) + '</span></td><td>' + app.esc(row.email || app.authorityUnavailable("recipient")) + '</td><td>' + app.esc(app.authorityLabel(p.actionability, "actionability")) + '</td><td><strong>' + app.esc(app.authorityLabel(p.lifecycle, "lifecycle state")) + '</strong><span>Finance: ' + app.esc(app.authorityLabel(p.finance, "finance")) + '</span><span>' + app.esc(row.coolingOffUntil ? "Cooling until " + row.coolingOffUntil : "No cooling expiry returned by Communication Authority") + '</span></td><td><strong>' + app.esc(row.authorityDecisionLabel || (excluded ? "Excluded by operator intent" : app.authorityUnavailable("recipient decision"))) + '</strong><span>' + app.esc(row.reason || (excluded ? "Excluded by operator intent" : app.authorityUnavailable("recipient reason"))) + '</span></td><td>' + app.esc(row.templateLabel || "Not selected") + '</td><td>' + button + '</td></tr>';
    }).join("") + '</tbody></table></div>';
  }
  function definitionList(rows) {
    return '<dl class="eduops-definition-list">' + (rows || []).map(function (item) {
      return '<div><dt>' + app.esc(item[0]) + '</dt><dd>' + app.esc(item[1] == null ? "" : item[1]) + '</dd></div>';
    }).join("") + '</dl>';
  }
  function previewExpired(preview) {
    var expires = Date.parse(preview && preview.expiresAt || "");
    return Number.isFinite(expires) && expires <= Date.now();
  }
  function confirmationDiagnostic(code, reason, extra) {
    var batch = app.state.batch || {};
    var preview = batch.preview || {};
    var diag = {
      blockCode: code || "BATCH_CONFIRMATION_BLOCKED",
      blockReason: reason || "Batch confirmation could not continue.",
      previewIdPresent: !!preview.previewId,
      idempotencyKeyPresent: !!preview.idempotencyKey,
      previewExpired: previewExpired(preview),
      modalState: app.state.confirm ? "OPEN" : "CLOSED",
      commandStarted: batch.executionStarted === true,
      receiptReturned: !!batch.receipt
    };
    Object.keys(extra || {}).forEach(function (key) { diag[key] = extra[key]; });
    batch.confirmationDiagnostic = diag;
    return diag;
  }
  function diagnosticHtml(diag) {
    if (!diag) return "";
    return '<div class="eduops-error-state"><strong>' + app.esc(diag.blockCode) + '</strong><span>' + app.esc(diag.blockReason) + '</span></div>' + definitionList([
      ["blockCode", diag.blockCode],
      ["blockReason", diag.blockReason],
      ["previewIdPresent", diag.previewIdPresent],
      ["idempotencyKeyPresent", diag.idempotencyKeyPresent],
      ["previewExpired", diag.previewExpired],
      ["modalState", diag.modalState],
      ["commandStarted", diag.commandStarted],
      ["receiptReturned", diag.receiptReturned]
    ]);
  }
  function partitionIdentity(preview) {
    var parts = (preview && preview.partitions || []).map(function (part) {
      return (part.label || "Partition") + " (" + Number(part.memberCount || 0) + ")";
    }).join("; ");
    return parts || preview && preview.queryFingerprint || app.authorityUnavailable("partition identity");
  }
  function templateCards(batch) {
    if (batch.catalogueLoading) return '<div class="eduops-loading-state"><strong>Evaluating complete communication catalogue</strong><span>Communication Authority is evaluating the exact execution cohort.</span></div>';
    if (batch.authorityError) return '<div class="eduops-error-state"><strong>Authoritative communication decision unavailable.</strong><span>' + app.esc(batch.authorityError) + '</span><button class="eduops-button eduops-button-secondary" type="button" data-batch-retry-catalogue>Refresh or retry</button></div>';
    if (!batch.catalogue) return '<div class="eduops-empty-state"><strong>Choose an execution limit</strong><span>The server cannot evaluate template availability until explicit operator intent is recorded.</span></div>';
    return '<div class="eduops-template-gallery">' + (batch.catalogue.templates || []).map(function (item) {
      var unavailable = item.selectable !== true;
      var reason = app.esc(item.reason || app.authorityUnavailable("template reason"));
      return '<article class="eduops-template-card" data-recommended="' + (item.recommended ? "true" : "false") + '" data-availability="' + app.esc(item.availabilityState) + '" aria-pressed="' + (batch.templateId === item.templateId ? "true" : "false") + '"><button type="button" data-batch-template-card="' + app.esc(item.templateId) + '"' + (unavailable ? " disabled" : "") + '><strong>' + app.esc((item.recommended ? "Recommended: " : "") + item.label) + '</strong><span>' + app.esc(item.availabilityLabel || app.authorityUnavailable("template availability")) + '</span><small>' + app.esc(unavailable ? "Unavailable. Expand authority reason." : item.reason || app.authorityUnavailable("template reason")) + '</small></button>' + (unavailable ? '<details class="eduops-template-reason"><summary>Authority reason</summary><small>' + reason + '</small></details>' : "") + '</article>';
    }).join("") + '</div>';
  }
  function renderCohort() {
    var batch = app.state.batch;
    var master = batch.catalogue && batch.catalogue.masterRecipients || batch.rows;
    var policy = app.state.profile && app.state.profile.batchPolicy;
    var limitOptions = (policy && policy.allowedExecutionLimits || []).map(function (value) { return '<option value="' + value + '"' + (batch.binding.executionLimit === value ? " selected" : "") + '>' + value + '</option>'; }).join("");
    var template = selectedTemplate();
    var nextRecipients = template ? selectedRecipients() : [];
    var templateOptions = batch.catalogue ? (batch.catalogue.templates || []).map(function (item) { var suffix = item.recommended ? " - Recommended" : ""; return '<option value="' + app.esc(item.templateId) + '"' + (batch.templateId === item.templateId ? " selected" : "") + (item.selectable === true ? "" : " disabled") + '>' + app.esc(item.label + suffix + " - " + item.availableRecipientCount + " available") + '</option>'; }).join("") : "";
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><span class="eduops-eyebrow">Operator cohort intent</span><h2>Master cohort</h2><p>Selection remains bound to the server-authored query or explicit applicant IDs.</p></div><span class="eduops-capability-state" data-state="PENDING">' + batch.masterCohortSize + ' selected</span></header><details class="eduops-selected-only" open><summary>Selected only: review exact master cohort</summary>' + recipientTable(master, true) + '</details></section><section class="eduops-panel-card eduops-span-12"><header><div><h2>Choose execution size and communication</h2><p>No communication is selected by default. Availability and recommendation are server-authored.</p></div></header><div class="eduops-form-grid"><label class="eduops-field">Execution limit<select data-batch-execution-limit><option value="">Choose limit</option>' + limitOptions + '</select></label><label class="eduops-field">Choose communication<select data-batch-template' + (!batch.catalogue ? " disabled" : "") + '><option value="">Choose communication</option>' + templateOptions + '</select></label></div>' + templateCards(batch) + '</section><section class="eduops-panel-card eduops-span-12"><header><div><h2>' + (template ? "Server-authorised recipients: " + Number(template.availableRecipientCount || 0) : "Execution cohort not yet authorised") + '</h2><p>Only server-authorised recipients for the explicitly selected communication appear here.</p></div></header>' + recipientTable(nextRecipients, false) + '</section></div>';
  }
  function renderPartitions() {
    var preview = app.state.batch.preview || {};
    var parts = preview.partitions || [];
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><h2>Server-authored partition</h2><p>Revalidation is complete. No execution has occurred.</p></div></header>' + (parts.length ? parts.map(function (part) { return '<article class="eduops-partition-card"><strong>' + app.esc(part.label) + '</strong><span>' + Number(part.memberCount || 0) + ' exact recipients</span></article>'; }).join("") + recipientTable(preview.recipients || [], false) : '<div class="eduops-error-state"><strong>No executable partition returned</strong><span>' + app.esc(preview.message || "Communication Authority did not authorise an execution partition.") + '</span></div>') + '</section></div>';
  }
  function renderPreview() {
    var preview = app.state.batch.preview || {};
    var template = preview.selectedTemplate || {};
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><span class="eduops-eyebrow">Communication preview</span><h2>' + app.esc(preview.summary || app.authorityUnavailable("communication preview")) + '</h2><p>No execution has occurred.</p></div><span class="eduops-capability-state" data-state="' + (preview.executable === true ? "READY" : "BLOCKED") + '">' + app.esc(preview.statusLabel || app.authorityUnavailable("preview status")) + '</span></header><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Canonical communication<input type="text" readonly value="' + app.esc(template.label || app.authorityUnavailable("template")) + '"></label><label class="eduops-field eduops-field-wide">Subject<input type="text" readonly value="' + app.esc(preview.subject || "") + '"></label><label class="eduops-field eduops-field-wide">Full message body<textarea rows="12" readonly>' + app.esc(preview.body || "") + '</textarea></label></div><p class="eduops-action-reason">' + app.esc(preview.statusReason || template.editingReason || app.authorityUnavailable("preview reason")) + '</p>' + diagnosticHtml(app.state.batch.confirmationDiagnostic) + recipientTable(preview.recipients || [], false) + '<details class="eduops-technical-details"><summary>Technical details</summary><dl class="eduops-definition-list"><div><dt>Preview ID</dt><dd>' + app.esc(preview.previewId) + '</dd></div><div><dt>Snapshot</dt><dd>' + app.esc(preview.snapshotId) + '</dd></div><div><dt>Expires</dt><dd>' + app.esc(app.formatPngDate(preview.expiresAt) || app.authorityUnavailable("preview expiry")) + '</dd></div><div><dt>Expiry (ISO)</dt><dd>' + app.esc(preview.expiresAt) + '</dd></div><div><dt>Query fingerprint</dt><dd>' + app.esc(preview.queryFingerprint) + '</dd></div><div><dt>Idempotency key</dt><dd>' + app.esc(preview.idempotencyKey) + '</dd></div><div><dt>Required capability</dt><dd>' + app.esc(preview.requiredCapability) + '</dd></div></dl></details></section></div>';
  }
  function renderReceipt() {
    var receipt = app.state.batch.receipt || {};
    var outcomes = receipt.applicantOutcomes || [];
    var outcomeTable = outcomes.length ? '<details class="eduops-technical-details" open><summary>Recipient outcomes</summary><div class="eduops-table-scroller"><table class="eduops-work-table"><thead><tr><th>Applicant</th><th>Outcome</th><th>Block code</th><th>Reason</th><th>Gmail</th><th>Row patch</th><th>Communication record</th></tr></thead><tbody>' + outcomes.map(function (item) { return '<tr><td>' + app.esc(item.applicantId || "") + '</td><td>' + app.esc(item.outcome || "") + '</td><td>' + app.esc(item.blockCode || "") + '</td><td>' + app.esc(item.reason || "") + '</td><td>' + app.esc(item.gmailAccepted ? "Accepted" : (item.gmailAttempted ? "Attempted" : "Not attempted")) + '</td><td>' + app.esc(item.rowPatchConfirmed ? "Confirmed" : "Not confirmed") + '</td><td>' + app.esc(item.communicationRecorded ? "Recorded" : "Not recorded") + '</td></tr>'; }).join("") + '</tbody></table></div></details>' : "";
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><h2>' + app.esc(receipt.communication && receipt.communication.templateLabel || receipt.publicLabel || app.authorityUnavailable("receipt label")) + '</h2><p>' + app.esc(receipt.receiptId || app.authorityUnavailable("receipt identity")) + '</p></div></header><dl class="eduops-definition-list"><div><dt>Outcome</dt><dd>' + app.esc(receipt.outcome || app.authorityUnavailable("receipt outcome")) + '</dd></div><div><dt>Communication</dt><dd>' + app.esc(receipt.communication && receipt.communication.templateLabel || receipt.publicLabel || app.authorityUnavailable("receipt label")) + '</dd></div><div><dt>Subject</dt><dd>' + app.esc(receipt.communication && receipt.communication.subject || app.authorityUnavailable("receipt subject")) + '</dd></div><div><dt>Sent count</dt><dd>' + Number(receipt.sentCount || receipt.completeCount || 0) + '</dd></div><div><dt>Blocked count</dt><dd>' + Number(receipt.blockedCount || 0) + '</dd></div><div><dt>Failed count</dt><dd>' + Number(receipt.failedCount || 0) + '</dd></div><div><dt>Reconciliation-required count</dt><dd>' + Number(receipt.reconciliationRequiredCount || 0) + '</dd></div><div><dt>Unresolved count</dt><dd>' + Number(receipt.unresolvedCount || 0) + '</dd></div></dl>' + outcomeTable + '</section></div>';
  }
  function operationStatus(batch) {
    if (batch.receipt) return "Operation complete";
    if (batch.preview && batch.preview.statusLabel) return batch.preview.statusLabel;
    if (batch.catalogue && batch.catalogue.statusLabel) return batch.catalogue.statusLabel;
    if (batch.authorityError) return "Blocked by authority";
    return "Operator intent captured - not yet revalidated";
  }
  function render() {
    ensureDom();
    var batch = app.state.batch;
    cohortHeader();
    renderSteps();
    dom.status.textContent = "Operation: " + operationStatus(batch);
    dom.status.setAttribute("data-state", batch.preview ? (batch.preview.executable === true ? "READY" : "BLOCKED") : "PENDING");
    dom.executionStatus.textContent = batch.receipt ? "Execution completed" : "Execution: No execution performed";
    if (batch.step === "cohort") dom.panel.innerHTML = renderCohort();
    else if (batch.step === "partitions") dom.panel.innerHTML = renderPartitions();
    else if (batch.step === "preview" || batch.step === "confirm") dom.panel.innerHTML = renderPreview();
    else dom.panel.innerHTML = renderReceipt();
    var footer = "";
    if (batch.step === "cohort") footer = '<button class="eduops-button eduops-button-primary" type="button" data-batch-preview' + (!batch.templateId || !batch.binding.executionLimit || !selectedTemplate() || selectedTemplate().selectable !== true ? " disabled" : "") + '>Revalidate and create preview</button>';
    if (batch.step === "partitions") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-back>Back to cohort</button><button class="eduops-button eduops-button-primary" type="button" data-batch-continue' + (batch.preview && batch.preview.executable === true ? "" : " disabled") + '>Review communication preview</button>';
    if (batch.step === "preview") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-back>Back</button><button class="eduops-button eduops-button-primary" type="button" data-batch-confirm>Continue to confirmation</button>';
    if (batch.step === "confirm") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-back>Back</button><button class="eduops-button eduops-button-primary" type="button" data-batch-execute>Send ' + app.esc(batch.preview.selectedTemplate && batch.preview.selectedTemplate.label || "communication") + ' to ' + Number(batch.preview.executionCohortSize || 0) + ' recipients</button>';
    if (batch.step === "receipt") footer = '<button class="eduops-button eduops-button-secondary" type="button" data-batch-close>Return to updated workload</button>';
    dom.footer.innerHTML = footer;
  }
  function loadCatalogue() {
    var batch = app.state.batch;
    if (!batch.binding.executionLimit) { batch.catalogue = null; render(); return; }
    batch.catalogueLoading = true;
    batch.authorityError = "";
    batch.templateId = "";
    batch.messageType = "";
    render();
    app.call("eduops_getBatchCommunicationCatalogue", { operation: "BATCH_COMMUNICATION", product: batch.binding.product, snapshotId: batch.binding.snapshotId, queryFingerprint: batch.binding.queryFingerprint, executionLimit: batch.binding.executionLimit, selection: batch.binding }).then(function (catalogue) {
      batch.catalogueLoading = false;
      batch.catalogue = catalogue;
      batch.binding = app.clone(catalogue.selectionBinding || batch.binding);
      batch.masterCohortSize = Number(catalogue.masterCohortSize || 0);
      render();
    }).catch(function (error) {
      batch.catalogueLoading = false;
      batch.catalogue = null;
      batch.authorityError = String(error && error.message || error || "Communication Authority did not return a decision.");
      render();
    });
  }
  function createPreview() {
    var batch = app.state.batch;
    var source = dom.footer.querySelector("[data-batch-preview]");
    var token = app.beginControlAction(source, "Revalidating...", "Revalidating exact recipients and canonical communication copy.");
    var key = app.idempotencyKey(batch.operation, "COHORT");
    batch.idempotencyKey = key;
    app.call("eduops_previewCommand", { operation: batch.operation, product: batch.binding.product, snapshotId: batch.binding.snapshotId, queryFingerprint: batch.binding.queryFingerprint, executionLimit: batch.binding.executionLimit, selection: batch.binding, idempotencyKey: key, draft: { messageType: batch.messageType } }).then(function (preview) {
      app.finishControlAction(token, preview.executable === true ? "SUCCESS" : "BLOCKED", preview.statusReason || preview.statusLabel || app.authorityUnavailable("batch preview"));
      batch.preview = preview;
      batch.confirmationDiagnostic = null;
      batch.executionStarted = false;
      batch.receiptReturned = false;
      app.state.commandPreview = preview;
      app.state.commandIdempotencyKey = key;
      app.state.commandExecutable = false;
      batch.step = "partitions";
      render();
    }).catch(function (error) {
      app.finishControlAction(token, "BLOCKED", "Batch preview blocked: " + (error.message || error));
      batch.preview = { state: "BLOCKED", executable: false, statusLabel: "Blocked by authority", statusReason: String(error.message || error), message: String(error.message || error), partitions: [] };
      app.state.commandPreview = null;
      app.state.commandIdempotencyKey = "";
      app.state.commandExecutable = false;
      batch.step = "partitions";
      render();
    });
  }
  function execute() {
    var batch = app.state.batch;
    var preview = batch && batch.preview || {};
    var recipients = (preview.recipients || []).filter(function (recipient) { return recipient.included === true; });
    function block(code, reason, extra) {
      var diag = confirmationDiagnostic(code, reason, extra);
      app.setInteractionState("BLOCKED", diag.blockCode + ": " + diag.blockReason);
      render();
      return diag;
    }
    function confirmationContextHtml(message) {
      return '<div class="eduops-warning-state"><strong>' + app.esc(message) + '</strong><span>Some messages may already have been sent. Reconcile this batch before retrying.</span></div>' + definitionList([["Preview ID", batch.preview.previewId || ""], ["Idempotency key", batch.preview.idempotencyKey || ""], ["Candidate count", Number(batch.preview.executionCohortSize || recipients.length || 0)], ["Confirmed at", batch.executionConfirmedAt || ""]]);
    }
    function completeWithReceipt(receipt, token) {
      if (token) app.finishControlAction(token, "SUCCESS", "Batch receipt returned.");
      app.state.commandPreview = null;
      app.state.commandIdempotencyKey = "";
      app.state.commandExecutable = false;
      app.closeConfirm(false);
      batch.receipt = receipt;
      batch.receiptReturned = true;
      batch.step = "receipt";
      render();
    }
    if (!preview || preview.executable !== true) return block("BATCH_CONFIRMATION_AUTHORITY_BLOCKED", preview.statusReason || preview.message || "Authoritative batch preview is not executable.");
    if (!preview.previewId || !preview.idempotencyKey) return block("BATCH_CONFIRMATION_IDENTITY_MISSING", "Preview ID and idempotency key are required before final confirmation.");
    if (previewExpired(preview)) return block("BATCH_CONFIRMATION_PREVIEW_EXPIRED", "The authoritative preview expired before final confirmation.");
    if (batch.executionStarted === true && !batch.receipt) return block("BATCH_CONFIRMATION_COMMAND_REJECTED", "A prior execution attempt has no receipt. Reconcile before retrying.", { commandStarted: true });
    if (app.state.confirm && app.state.confirm.batchPreviewId === preview.previewId) {
      var cancel = byId("eduopsConfirmCancel");
      if (cancel && typeof cancel.focus === "function") cancel.focus();
      return;
    }
    if (app.state.confirm) return block("BATCH_CONFIRMATION_MODAL_FAILED", "Another confirmation modal is already open.");
    try {
      app.openConfirm({
        title: batch.preview.summary,
        html: '<p><strong>' + app.esc(batch.preview.summary) + '</strong></p><div class="eduops-warning-state"><strong>This final confirmation sends email.</strong><span>Proceed only if this exact batch preview is approved.</span></div>' + definitionList([["Template / message type", batch.preview.selectedTemplate && (batch.preview.selectedTemplate.label || batch.preview.selectedTemplate.messageType || batch.preview.selectedTemplate.templateId) || app.authorityUnavailable("template")], ["Recipient count", Number(batch.preview.executionCohortSize || recipients.length || 0)], ["Partition / cohort identity", partitionIdentity(batch.preview)], ["Preview ID", batch.preview.previewId], ["Expires", app.formatPngDate(batch.preview.expiresAt) || app.authorityUnavailable("preview expiry")], ["Subject", batch.preview.subject || ""]]) + '<details class="eduops-technical-details"><summary>Technical details</summary>' + definitionList([["Expiry (ISO)", batch.preview.expiresAt], ["Idempotency key", batch.preview.idempotencyKey], ["Query fingerprint", batch.preview.queryFingerprint || ""], ["Snapshot", batch.preview.snapshotId || ""]]) + '</details>' + recipientTable(recipients, false),
        proceedLabel: batch.preview.summary,
        cancelLabel: "Return to preview",
        source: dom.footer.querySelector("[data-batch-execute]"),
        batchPreviewId: batch.preview.previewId,
        batchIdempotencyKey: batch.preview.idempotencyKey,
        onProceed: function () {
          if (batch.executionStarted === true) { confirmationDiagnostic("BATCH_CONFIRMATION_COMMAND_REJECTED", "A batch execution attempt is already in progress or awaiting receipt."); app.setInteractionState("BLOCKED", "BATCH_CONFIRMATION_COMMAND_REJECTED: A batch execution attempt is already in progress or awaiting receipt."); return; }
          batch.executionConfirmedAt = new Date().toISOString();
          batch.executionStarted = true;
          batch.confirmationDiagnostic = null;
          var executeToken = app.beginControlAction(byId("eduopsConfirmProceed"), "Executing...", "Executing the confirmed batch once.");
          var cancel = byId("eduopsConfirmCancel");
          if (cancel) cancel.disabled = true;
          var settled = false;
          var timeoutMs = Number(app.batchExecutionTimeoutMs || 90000);
          var timer = setTimeout(function () {
            if (settled) return;
            var text = byId("eduopsConfirmText");
            var proceed = byId("eduopsConfirmProceed");
            if (text) text.innerHTML = confirmationContextHtml("Execution outcome not yet confirmed.");
            if (proceed) proceed.disabled = true;
            app.call("eduops_recoverCommandReceipt", { previewId: batch.preview.previewId, idempotencyKey: batch.preview.idempotencyKey }).then(function (recovery) {
              if (settled) return;
              if (recovery && recovery.receipt) {
                settled = true;
                clearTimeout(timer);
                return completeWithReceipt(recovery.receipt, executeToken);
              }
              if (cancel) cancel.disabled = false;
              confirmationDiagnostic("BATCH_CONFIRMATION_COMMAND_REJECTED", "Execution outcome not yet confirmed. Reconcile before retrying.");
              app.setInteractionState("BLOCKED", "Execution outcome not yet confirmed. Reconcile before retrying.");
            }).catch(function () {
              if (cancel) cancel.disabled = false;
              confirmationDiagnostic("BATCH_CONFIRMATION_COMMAND_REJECTED", "Execution outcome not yet confirmed. Reconcile before retrying.");
              app.setInteractionState("BLOCKED", "Execution outcome not yet confirmed. Reconcile before retrying.");
            });
          }, timeoutMs);
          app.call("eduops_executeCommand", { previewId: batch.preview.previewId, idempotencyKey: batch.preview.idempotencyKey, confirmation: true }).then(function (receipt) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            if (!receipt || !receipt.receiptId) {
              if (cancel) cancel.disabled = false;
              confirmationDiagnostic("BATCH_CONFIRMATION_COMMAND_REJECTED", "Execution returned without a receipt. Reconcile before retrying.");
              app.finishControlAction(executeToken, "BLOCKED", "Execution returned without a receipt.");
              var receiptText = byId("eduopsConfirmText");
              if (receiptText) receiptText.innerHTML = confirmationContextHtml("Execution returned without a receipt.");
              return;
            }
            completeWithReceipt(receipt, executeToken);
          }).catch(function (error) {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            app.finishControlAction(executeToken, "BLOCKED", "Batch blocked: " + (error.message || error));
            if (cancel) cancel.disabled = false;
            confirmationDiagnostic("BATCH_CONFIRMATION_COMMAND_REJECTED", String(error.message || error || "Batch execution command was rejected."));
            var text = byId("eduopsConfirmText");
            if (text) text.innerHTML = confirmationContextHtml("Execution was blocked: " + (error.message || error));
            render();
          });
        }
      });
    } catch (error) {
      return block("BATCH_CONFIRMATION_MODAL_FAILED", String(error && error.message || error || "Batch confirmation modal could not be opened."));
    }
  }

  app.openBatch = function (source) {
    if (!app.operationAvailable("BATCH_COMMUNICATION")) { app.setInteractionState("BLOCKED", app.operationUnavailableReason("BATCH_COMMUNICATION")); return; }
    if (!app.state.profile || !app.state.profile.batchPolicy || !Array.isArray(app.state.profile.batchPolicy.allowedExecutionLimits)) { app.setInteractionState("BLOCKED", app.authorityUnavailable("batch execution policy")); return; }
    if (app.state.workbench && app.state.dirty) return app.requestWorkbenchLeave(function () { app.openBatch(source); }, source);
    ensureDom();
    app.state.returnContext = app.snapshotReturnContext();
    app.state.batch = { step: "cohort", binding: binding(), rows: selectedRows(), masterCohortSize: masterCohortSize(), operation: "BATCH_COMMUNICATION", templateId: "", messageType: "", catalogue: null, catalogueLoading: false, authorityError: "", preview: null, receipt: null, idempotencyKey: "", source: source };
    dom.root.hidden = false;
    dom.root.setAttribute("aria-hidden", "false");
    dom.title.textContent = "Batch Operations";
    dom.subtitle.textContent = app.state.batch.masterCohortSize + " selected applicant(s) / " + app.state.snapshotId;
    app.pushRoute("batch");
    render();
    byId("eduopsCloseBatch").focus();
  };
  app.closeBatch = function (fromHistory) { ensureDom(); dom.root.hidden = true; dom.root.setAttribute("aria-hidden", "true"); app.state.batch = null; if (!fromHistory) app.replaceRoute("workload"); return app.restoreReturnContext(); };

  function openWorkSession() {
    var rows = (app.state.workload && app.state.workload.rows || []).slice();
    if (!rows.length) { app.setInteractionState("BLOCKED", "Work Session cannot start because the current workload has no visible applicants."); return; }
    app.state.workSession = { applicantIds: rows.map(function (row) { return row.applicantId; }), index: 0, completed: [], skipped: [], exceptions: [] };
    app.openWorkbench(rows[0].applicantId, byId("eduopsStartSession"));
    renderSession();
  }
  function renderSession() {
    ensureDom();
    var session = app.state.workSession;
    if (!session || !app.state.workbench) { dom.session.hidden = true; return; }
    var current = session.applicantIds[session.index];
    dom.session.hidden = false;
    dom.session.innerHTML = '<div><strong>Work Session</strong><span>' + (session.index + 1) + ' of ' + session.applicantIds.length + ' / ' + app.esc(current) + '</span></div><div class="eduops-action-row"><button class="eduops-button eduops-button-secondary" type="button" data-session-skip>Skip</button><button class="eduops-button eduops-button-primary" type="button" data-session-next>Complete and next</button><button class="eduops-button eduops-button-secondary" type="button" data-session-exit>Return to workload</button></div>';
  }
  function advanceSession(outcome) {
    var session = app.state.workSession;
    if (!session) return;
    var current = session.applicantIds[session.index];
    session[outcome].push(current);
    if (session.index >= session.applicantIds.length - 1) { app.state.workSession = null; app.closeWorkbench(); return; }
    session.index++;
    app.state.dirty = false;
    app.openWorkbench(session.applicantIds[session.index], dom.session);
    setTimeout(renderSession, 0);
  }

  app.bindBatch = function () {
    ensureDom();
    byId("eduopsCloseBatch").addEventListener("click", function () { app.closeBatch(); });
    byId("eduopsOpenBatch").addEventListener("click", function () { app.openBatch(this); });
    var sessionButton = byId("eduopsStartSession");
    if (sessionButton) sessionButton.addEventListener("click", openWorkSession);
    dom.root.addEventListener("change", function (event) {
      if (event.target.matches("[data-batch-template]")) { invalidate("Communication changed. Revalidation is required.", false); app.state.batch.templateId = event.target.value; app.state.batch.messageType = event.target.value; render(); return; }
      if (event.target.matches("[data-batch-execution-limit]")) {
        app.state.selectionExecutionLimit = Number(event.target.value || 0);
        app.state.batch.binding = binding();
        invalidate("Execution limit changed. Revalidation is required.", true);
        loadCatalogue();
      }
    });
    dom.root.addEventListener("click", function (event) {
      var template = event.target.closest("[data-batch-template-card]");
      if (template && !template.disabled) { invalidate("Communication changed. Revalidation is required.", false); app.state.batch.templateId = template.getAttribute("data-batch-template-card"); app.state.batch.messageType = app.state.batch.templateId; render(); return; }
      if (event.target.closest("[data-batch-retry-catalogue]")) return loadCatalogue();
      if (event.target.closest("[data-batch-preview]")) return createPreview();
      if (event.target.closest("[data-batch-continue]")) { app.state.batch.step = "preview"; render(); return; }
      if (event.target.closest("[data-batch-confirm]")) { app.state.batch.step = "confirm"; app.state.commandExecutable = app.state.batch.preview && app.state.batch.preview.executable === true; render(); return; }
      if (event.target.closest("[data-batch-execute]")) return execute();
      if (event.target.closest("[data-batch-close]")) return app.closeBatch();
      var back = event.target.closest("[data-batch-back]");
      if (back) { app.state.batch.step = steps[Math.max(0, steps.indexOf(app.state.batch.step) - 1)]; render(); return; }
      var exclude = event.target.closest("[data-batch-exclude]");
      if (exclude) { app.excludeFromSelection(exclude.getAttribute("data-batch-exclude")); app.state.batch.binding = binding(); app.state.batch.masterCohortSize = masterCohortSize(); loadCatalogue(); return; }
      var restore = event.target.closest("[data-batch-restore]");
      if (restore) { app.restoreSelectionExclusion(restore.getAttribute("data-batch-restore")); app.state.batch.binding = binding(); app.state.batch.masterCohortSize = masterCohortSize(); loadCatalogue(); }
    });
    document.addEventListener("click", function (event) {
      if (event.target.closest("[data-session-skip]")) advanceSession("skipped");
      if (event.target.closest("[data-session-next]")) advanceSession("completed");
      if (event.target.closest("[data-session-exit]")) { app.state.workSession = null; app.closeWorkbench(); }
    });
  };
  app.renderWorkSession = renderSession;
})();
</script>
