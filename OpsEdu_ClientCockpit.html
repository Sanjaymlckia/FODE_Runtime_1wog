<script>
(function () {
  "use strict";

  var app = window.EduOpsApp;
  var bound = false;

  function byId(id) { return document.getElementById(id); }
  function packageById(packages, packageId) {
    return (Array.isArray(packages) ? packages : []).filter(function (item) { return item && item.packageId === packageId; })[0] || null;
  }
  function failClosed(message) {
    var target = byId("opseduActionPackages");
    if (target) target.innerHTML = '<div class="opsedu-cockpit-error"><strong>' + app.esc(message) + '</strong><span>Refresh or retry before continuing.</span></div>';
  }
  function activeState() {
    return app.state.actionabilityState || "READY";
  }
  function bucketButton(item) {
    var active = item.code === activeState();
    var shortLabels = { READY: "Ready", COOLING_OFF: "Cooling off", AWAITING_APPLICANT: "Applicant", AWAITING_PAYMENT: "Payment", REVIEW_REQUIRED: "Review", BLOCKED: "Blocked", UNKNOWN: "Classify", COMPLETE: "Complete" };
    return '<button type="button" class="opsedu-primary-bucket" data-opsedu-primary-bucket="' + app.esc(item.code) + '" aria-pressed="' + (active ? "true" : "false") + '" title="' + app.esc(item.label + ". " + Number(item.count || 0) + ". " + (item.reason || item.authoritySource || "")) + '"><span>' + app.esc(shortLabels[item.code] || item.label) + '</span><strong>' + Number(item.count || 0) + '</strong><small>' + app.esc(item.code === "READY" ? "Act now" : item.code === "COMPLETE" ? "Done" : item.code === "UNKNOWN" ? "Classify" : "Queue") + '</small><em class="eduops-visually-hidden">' + app.esc(item.label) + '</em></button>';
  }
  function packageCard(item) {
    var recommendation = item.recommendedCommunication;
    var recommendationLabel = recommendation && recommendation.available === true ? recommendation.label : "";
    return '<article class="opsedu-action-card" data-secondary="' + (item.secondary === true ? "true" : "false") + '" title="' + app.esc(item.label + ". " + Number(item.count || 0) + ". " + item.routeReason) + '"><div class="opsedu-action-card-top"><span>' + app.esc(item.ownerDomain) + '</span><strong>' + Number(item.count || 0) + '</strong></div><h3>' + app.esc(item.label) + '</h3><div class="opsedu-action-card-meta"><span>' + app.esc(item.mutationBoundary) + '</span>' + (recommendationLabel ? '<span>' + app.esc(recommendationLabel) + '</span>' : "") + '</div><button type="button" class="eduops-button eduops-button-primary" data-opsedu-package="' + app.esc(item.packageId) + '"' + (item.disabled === true ? " disabled" : "") + '>' + app.esc(item.primaryActionLabel) + '</button>' + (item.disabledReason ? '<small>' + app.esc(item.disabledReason) + '</small>' : "") + '</article>';
  }

  app.openServerBoundQueue = function (binding, reason) {
    if (!binding || binding.schemaVersion !== "EDUOPS_QUERY_BINDING_V1" || binding.authority !== "SERVER_AUTHORED" || !binding.query || !binding.snapshotId) {
      failClosed("Authoritative action queue binding was not returned.");
      return Promise.resolve({ ok: false, code: "BACKEND_CONTRACT_MISSING" });
    }
    var query = binding.query;
    app.state.product = query.product;
    app.state.actionabilityState = query.actionabilityState;
    app.state.worklistKey = query.worklistKey;
    app.state.workScope = query.workScope;
    app.state.filters = app.clone(query.filters);
    app.state.sort = app.clone(query.sort);
    app.state.page = 1;
    app.state.pageSize = Number(query.pageSize);
    app.state.snapshotId = binding.snapshotId;
    app.clearSelection();
    app.setInteractionState("LOADING", reason || "Opening authoritative action queue.");
    return app.requestWorkload().then(function (result) {
      var worklist = byId("eduopsWorklist");
      if (worklist) worklist.scrollIntoView({ behavior: "smooth", block: "start" });
      return result;
    });
  };

  app.renderOpsEduCockpit = function (response) {
    var cockpit = response && response.cockpit;
    if (!cockpit || cockpit.schemaVersion !== "OPSEDU_COCKPIT_V1" || !Array.isArray(cockpit.primaryBuckets) || !Array.isArray(cockpit.actionPackages)) {
      failClosed("Authoritative OpsEdu cockpit decision was not returned.");
      return;
    }
    byId("opseduCockpitContext").textContent = cockpit.productLabel;
    byId("opseduCockpitHeading").textContent = cockpit.heading;
    byId("opseduCockpitSnapshot").textContent = "Snapshot " + cockpit.snapshotId + " / " + cockpit.snapshotTimestamp;
    var bucketTarget = byId("opseduPrimaryBuckets");
    var buckets = Array.isArray(cockpit.primaryBuckets) ? cockpit.primaryBuckets : [];
    if (bucketTarget) bucketTarget.innerHTML = buckets.map(bucketButton).join("");
    var packages = cockpit.actionPackages.filter(function (item) { return !item.actionabilityState || item.actionabilityState === activeState(); });
    byId("opseduActionPackages").innerHTML = packages.map(packageCard).join("") || '<div class="opsedu-cockpit-empty"><strong>No work packages in this state.</strong><span>The backend returned no granular packages for the selected authoritative bucket.</span></div>';
  };

  function bind() {
    if (bound) return;
    bound = true;
    document.addEventListener("click", function (event) {
      var button = event.target.closest("[data-opsedu-package]");
      if (!button || button.disabled) return;
      var cockpit = app.state.workload && app.state.workload.cockpit;
      var item = packageById(cockpit && cockpit.actionPackages, button.getAttribute("data-opsedu-package"));
      if (!item || item.disabled === true) return failClosed("Authoritative action package was not returned.");
      app.openServerBoundQueue(item.defaultQueueBinding, "Opening " + item.label + ".");
    });
    document.addEventListener("click", function (event) {
      var button = event.target.closest("[data-opsedu-primary-bucket]");
      if (!button || button.disabled) return;
      var cockpit = app.state.workload && app.state.workload.cockpit;
      var item = (Array.isArray(cockpit && cockpit.primaryBuckets) ? cockpit.primaryBuckets : []).filter(function (bucket) { return bucket && bucket.code === button.getAttribute("data-opsedu-primary-bucket"); })[0];
      if (!item || item.disabled === true) return failClosed("Authoritative primary bucket was not returned.");
      app.openServerBoundQueue(item.defaultQueueBinding, "Opening " + item.label + ".");
    });
    document.addEventListener("click", function (event) {
      if (!event.target.closest("[data-opsedu-focus-packages]")) return;
      var cockpit = byId("opseduCockpit");
      if (cockpit) cockpit.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }

  bind();
})();
</script>
