<script>
(function () {
  "use strict";

  var app = window.EduOpsApp;
  var dom = {};
  var CUSTOM_EMAIL_MESSAGE_TYPE = "custom_email";

  function byId(id) { return document.getElementById(id); }
  function ensureDom() {
    if (dom.root) return;
    dom.root = byId("eduopsWorkbench");
    dom.title = byId("eduopsWorkbenchTitle");
    dom.subtitle = byId("eduopsWorkbenchSubtitle");
    dom.context = byId("eduopsWorkbenchContext");
    dom.authority = byId("eduopsWorkbenchAuthority");
    dom.tabs = byId("eduopsWorkbenchTabs");
    dom.panel = byId("eduopsWorkbenchPanel");
    dom.session = byId("eduopsSessionBar");
  }

  function row() { return app.state.workbench && app.state.workbench.exactAuthorityProjection || {}; }
  function identity() { return app.state.workbench && app.state.workbench.identity || {}; }
  function displayValue(value) {
    if (!value || typeof value !== "object") return value;
    var candidate = value.label || value.baseState || value.lifecycleStage || value.state || value.status;
    if (candidate && typeof candidate !== "object") return candidate;
    if (candidate && candidate !== value) return displayValue(candidate);
    return "See Audit context";
  }
  function definition(items) {
    return '<dl class="eduops-definition-list">' + items.map(function (item) {
      var value = displayValue(item[1]);
      return '<div><dt>' + app.esc(item[0]) + '</dt><dd>' + app.esc(value == null || value === "" ? "Not returned" : value) + '</dd></div>';
    }).join("") + '</dl>';
  }
  function normalizeCapabilityMap(projection) {
    var source = projection && typeof projection === "object" ? projection : {};
    var map = source.capabilities && typeof source.capabilities === "object" ? source.capabilities : source;
    return map.capabilities && typeof map.capabilities === "object" ? map.capabilities : map;
  }
  function actionCard(operation, label, description, capability, risk) {
    var enabled = commandEnabled(operation, capability);
    var reason = enabled ? "Preview required before confirmation." : disabledReason(operation, capability);
    return '<article class="eduops-domain-action"><div><strong>' + app.esc(label) + '</strong><p>' + app.esc(description) + '</p><small>' + app.esc(reason) + '</small></div><button type="button" class="eduops-button eduops-button-primary" data-preview-command="' + app.esc(operation) + '" data-command-risk="' + app.esc(risk || "STANDARD") + '"' + (enabled ? "" : " disabled") + '>Preview operation</button></article>';
  }
  function operationAvailable(operation) {
    if (operation === "PORTAL_ACCESS" || operation === "BOOKS_ACTION") return false;
    if (Object.prototype.hasOwnProperty.call(app.state.featureFlags || {}, operation)) return app.state.featureFlags[operation] === true;
    return /^(DOCUMENT_REVIEW|FINANCE_EVIDENCE_DECISION|SEND_INDIVIDUAL_COMMUNICATION|CONTACTABILITY_CORRECTION|BATCH_COMMUNICATION)$/.test(operation);
  }
  function commandEnabled(operation, capability) {
    if (operation === "PORTAL_ACCESS" || operation === "BOOKS_ACTION") return false;
    if (Object.prototype.hasOwnProperty.call(app.state.featureFlags || {}, operation) && app.state.featureFlags[operation] !== true) return false;
    return app.state.capabilities[capability] === true;
  }
  function disabledReason(operation, capability) {
    if (!operationAvailable(operation)) return operation === "PORTAL_ACCESS" ? "Portal access actions are not available in this release." : operation === "BOOKS_ACTION" ? "Books actions are not available in this release." : "This operation has been temporarily suspended by the system administrator.";
    if (app.state.capabilities[capability] !== true) return "Your role does not permit this action (" + capability + ").";
    return "Preview is required before confirmation.";
  }
  function selectedCommunicationTemplate() {
    var draft = app.state.communicationDraft || {};
    return communicationTemplateById(draft.templateId, draft.messageType) || {};
  }
  function communicationEnabled() {
    return commandEnabled("SEND_INDIVIDUAL_COMMUNICATION", "CAN_SEND_INDIVIDUAL_EMAIL") && selectedCommunicationTemplate().canSendNow === true;
  }
  function communicationDisabledReason() {
    var template = selectedCommunicationTemplate();
    if (Object.prototype.hasOwnProperty.call(app.state.featureFlags || {}, "SEND_INDIVIDUAL_COMMUNICATION") && app.state.featureFlags.SEND_INDIVIDUAL_COMMUNICATION !== true) return "Individual communication has been temporarily suspended by the system administrator.";
    if (app.state.capabilities.CAN_SEND_INDIVIDUAL_EMAIL !== true) return "Your role does not permit individual communication (CAN_SEND_INDIVIDUAL_EMAIL).";
    return template.blockReason || template.blockCode || "Communication Authority has not permitted this communication.";
  }
  function authorityHeader() {
    var exact = row();
    var comm = app.state.workbench.communications || {};
    var reliability = app.state.workbench.sourceReliability || {};
    dom.authority.innerHTML = [
      ["Actionability", app.humanize(exact.actionabilityState)],
      ["Worklist", app.humanize(exact.worklistKey || exact.worklistLabel)],
      ["Owner / next action", (exact.actionOwner || "Unassigned") + " / " + (exact.nextAction || "Review")],
      ["Recommended communication", app.humanize(comm.recommendedMessageType || "Not returned")],
      ["Source", app.humanize(reliability.state || exact.reliabilityState || "UNKNOWN")],
      ["Snapshot", app.state.workbench.snapshotId || app.state.snapshotId]
    ].map(function (item) { return '<div class="eduops-authority-item"><span>' + app.esc(item[0]) + '</span><strong>' + app.esc(item[1]) + '</strong></div>'; }).join("");
  }
  function cohortRows() { return app.state.workload && app.state.workload.rows || []; }
  function cohortIndex() { return cohortRows().findIndex(function (item) { return item.applicantId === identity().applicantId; }); }
  function updateApplicantNavigation() {
    var index = cohortIndex();
    byId("eduopsWorkbenchPrevious").disabled = index <= 0;
    byId("eduopsWorkbenchNext").disabled = index < 0 || index >= cohortRows().length - 1;
  }
  function navigateApplicant(delta, source) {
    var index = cohortIndex();
    var target = cohortRows()[index + delta];
    if (target) app.openWorkbench(target.applicantId, source, app.state.activeTab);
  }
  function navigationSummary() {
    var rows = cohortRows();
    var index = cohortIndex();
    if (index < 0) return "Applicant is outside the loaded workload page. Return to workload to choose another applicant.";
    return "Applicant " + (index + 1) + " of " + rows.length + " on the loaded workload page.";
  }

  var tabs = [
    ["overview", "Overview"], ["documents", "Documents"], ["finance", "Finance"],
    ["communications", "Communications"], ["portal", "Portal"],
    ["contactability", "Contactability"], ["audit", "Audit"]
  ];
  function renderTabs() {
    dom.tabs.innerHTML = tabs.map(function (item) {
      var selected = app.state.activeTab === item[0];
      return '<button type="button" role="tab" data-workbench-tab="' + item[0] + '" aria-selected="' + selected + '" tabindex="' + (selected ? "0" : "-1") + '">' + item[1] + '</button>';
    }).join("");
  }
  function renderOverview() {
    var exact = row();
    var comm = app.state.workbench.communications || {};
    var primaryTab = /payment|finance|invoice/i.test(String(exact.nextAction || exact.worklistKey || "")) ? "finance" : /email|communicat|contact/i.test(String(exact.nextAction || "")) ? "communications" : "documents";
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-8"><header><div><span class="eduops-eyebrow">Exact applicant authority</span><h2>Why this work is here</h2></div><span class="eduops-status-badge" data-state="' + app.esc(exact.actionabilityState || "UNKNOWN") + '">' + app.esc(app.humanize(exact.actionabilityState)) + '</span></header><p class="eduops-explanation"><strong>' + app.esc(exact.nextAction || "Review the returned authority") + '.</strong> ' + app.esc(exact.blockerReason || exact.selectBlockReason || "The authoritative projection permits the visible next action.") + '</p>' + definition([["ApplicantID", identity().applicantId], ["Row identity", app.state.workbench.rowKey], ["Primary route", exact.primaryRoute], ["Lifecycle", displayValue(exact.canonicalLifecycle)], ["Finance", app.humanize(exact.canonicalFinanceState)], ["Contactability", app.humanize(exact.contactabilityState)]]) + '</section><section class="eduops-panel-card eduops-span-4 eduops-primary-action-card"><header><div><h2>Primary action</h2><p>Routed from the authoritative projection, not front-end lifecycle logic.</p></div></header>' + definition([["Recommended next action", exact.nextAction], ["Recommended communication", comm.recommendedMessageType], ["Send eligibility", comm.eligibility], ["Navigation", navigationSummary()]]) + '<div class="eduops-action-row"><button type="button" class="eduops-button eduops-button-primary" data-workbench-tab-jump="' + app.esc(primaryTab) + '">Open ' + app.esc(app.humanize(primaryTab)) + '</button><button type="button" class="eduops-button eduops-button-secondary" data-workbench-return>Return to workload</button></div></section><section class="eduops-panel-card eduops-span-12"><header><div><h2>Return context</h2><p>The Workbench preserves its invoking cohort and exact page movement.</p></div></header>' + definition([["Product", app.state.workbench.product], ["Origin page", app.state.returnContext && app.state.returnContext.page], ["Snapshot", app.state.workbench.snapshotId], ["Dirty state", app.state.dirty ? "Unsaved changes" : "Clean"]]) + '</section></div>';

  function documentPayload(file) {

  }
  function loadManifest() {
    if (app.state.documentManifest) return Promise.resolve(app.state.documentManifest);

    return app.call("eduops_getDocumentManifest", { applicantId: identity().applicantId, rowNumber: identity().rowNumber, expectedSnapshotId: app.state.workbench.snapshotId }).then(function (result) {
      app.state.documentManifest = result;
      app.state.selectedDocumentIndex = Math.min(app.state.selectedDocumentIndex, Math.max(0, (result.files || []).length - 1));
      renderPanel();
      if ((result.files || []).length) loadRendition(app.state.selectedDocumentIndex, true);
      return result;
    }).catch(function (error) { dom.panel.innerHTML = '<div class="eduops-error-state"><strong>Document manifest unavailable</strong><span>' + app.esc(error.message || error) + '</span></div>'; });
  }
  function loadRendition(index, prefetchAdjacent) {
    var files = app.state.documentManifest && app.state.documentManifest.files || [];
    var file = files[index];
    if (!file) return;
    app.state.selectedDocumentIndex = index;
    renderPanel();
    if (app.state.documentRenditions[file.documentKey]) return;
    app.call("eduops_getDocumentRendition", documentPayload(file)).then(function (result) {
      app.state.documentRenditions[file.documentKey] = result;
      renderPanel();

        app.call("eduops_getDocumentRendition", documentPayload(files[index + 1])).then(function (adjacent) { app.state.documentRenditions[files[index + 1].documentKey] = adjacent; });

  function renditionHtml(file) {
    var result = app.state.documentRenditions[file.documentKey];

    var src = result.dataUrl || result.imageDataUrl || result.pngDataUrl || result.renditionDataUrl || "";
    if (!src) return '<div class="eduops-error-state"><strong>Browser rendition unavailable</strong><span>' + app.esc(result.error || result.message || "Use the separately authorised Open Original action.") + '</span></div>';
    return '<figure class="eduops-document-preview"><img src="' + app.esc(src) + '" alt="Derived PNG preview of ' + app.esc(file.displayName || file.name || "document") + '"><figcaption>Derived browser rendition. The canonical original is unchanged.</figcaption></figure>';

  function documentCard(item, itemIndex, selectedIndex) {

  }
  function renderDocuments() {

sabled") + '>Preview selected decision</button><button class="eduops-button eduops-button-primary" type="button" data-preview-command="DOCUMENT_REVIEW" data-command-scope="all"' + (canSave ? "" : " disabled") + '>Preview overall review</button><button class="eduops-button eduops-button-secondary" type="button" data-request-correction>Prepare correction request</button></div></div></section></div>';
  }

  function renderFinance() {
    var finance = app.state.workbench.finance || {};
    var enabled = commandEnabled("FINANCE_EVIDENCE_DECISION", "CAN_VERIFY_PAYMENT");
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-4"><header><div><h2>Finance authority</h2><p>Payment state remains separate from lifecycle.</p></div><span class="eduops-status-badge" data-state="' + app.esc(finance.state || "UNKNOWN") + '">' + app.esc(app.humanize(finance.state)) + '</span></header>' + definition([["Payment applicable", finance.paymentApplicable ? "Yes" : "No"], ["Evidence present", finance.paymentEvidencePresent ? "Yes" : "No"], ["Payment verified", finance.paymentVerified ? "Yes" : "No"], ["Finance owner", finance.owner], ["Blocker", finance.blocker], ["Next action", finance.nextAction]]) + '</section><section class="eduops-panel-card eduops-span-4"><header><div><h2>Receipt evidence</h2><p>Evidence preview remains applicant-specific.</p></div></header><div class="eduops-preview-surface"><div><strong>' + (finance.paymentEvidencePresent ? "Evidence returned" : "No receipt evidence") + '</strong><span>' + app.esc(finance.paymentEvidencePresent ? "Inspect the canonical evidence in Documents before deciding." : "Verification is blocked until evidence is returned.") + '</span></div></div></section><section class="eduops-panel-card eduops-span-4"><header><div><h2>Individual Finance decision</h2><p>Payment verification is never batch-capable.</p></div><span class="eduops-capability-state" data-state="' + (enabled ? "READY" : "DISABLED") + '">' + (enabled ? "Preview required" : "Disabled") + '</span></header><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Decision<select id="eduopsFinanceDecision"><option value="">Choose a supported decision</option><option value="VERIFIED">Payment verified</option></select></label><label class="eduops-field eduops-field-wide">Finance reviewer note<textarea id="eduopsFinanceNote" placeholder="Required evidence-based reason"></textarea></label></div><button class="eduops-button eduops-button-primary" type="button" data-preview-command="FINANCE_EVIDENCE_DECISION"' + (enabled && finance.paymentEvidencePresent ? "" : " disabled") + '>Preview Finance decision</button><p class="eduops-action-reason">' + app.esc(finance.paymentEvidencePresent ? disabledReason("FINANCE_EVIDENCE_DECISION", "CAN_VERIFY_PAYMENT") : "Blocked: no payment evidence is present.") + '</p></section><section class="eduops-panel-card eduops-span-12"><header><div><h2>Books / invoice information</h2><p>Books is not payment authority.</p></div><span class="eduops-capability-state" data-state="DISABLED">Disabled</span></header>' + definition([["Invoice readiness", finance.invoiceReadiness], ["Books match", finance.booksMatch], ["Authority boundary", "No Books write is enabled in this pass"]]) + '<div class="eduops-action-row"><button class="eduops-button eduops-button-secondary" type="button" data-preview-command="BOOKS_ACTION" disabled>Preview governed Books action</button></div><p class="eduops-row-block-reason">Governed Books execution remains disabled behind its separate feature flag and independent approval gate.</p></section></div>';
  }
  function ensureCommunicationDraft() {
    if (app.state.communicationDraft && app.state.communicationDraft.applicantId === identity().applicantId) return app.state.communicationDraft;
    var comm = app.state.workbench.communications || {};
    var draft = comm.draft || {};
    app.state.communicationDraft = { applicantId: identity().applicantId, templateId: draft.templateId || comm.recommendedTemplateId || comm.selectedMessageType || comm.recommendedMessageType || "", messageType: draft.messageType || comm.selectedMessageType || comm.recommendedMessageType || "", recipient: draft.recipient || comm.effectiveEmail || identity().email || "", subject: draft.subject || "", body: draft.body || "" };
    return app.state.communicationDraft;
  }
  function communicationTemplates(comm) {
    return Array.isArray(comm.templateGallery) ? comm.templateGallery : [];
  }
  function communicationTemplateById(templateId, messageType) {
    var list = communicationTemplates(app.state.workbench.communications || {});
    for (var i = 0; i < list.length; i++) {
      if (list[i].templateId === templateId || list[i].messageType === messageType) return list[i];
    }
    return null;
  }
  function applyCommunicationTemplate(templateItem) {
    if (!templateItem) return;
    var draft = ensureCommunicationDraft();
    draft.templateId = templateItem.templateId || templateItem.messageType || "";
    draft.messageType = templateItem.messageType || "";
    draft.subject = templateItem.defaultSubject || "";
    draft.body = templateItem.defaultBody || "";
  }
  function historyListHtml(result) {
    var receipts = result && result.receipts || [];
    return receipts.length ? '<ul class="eduops-audit-list">' + receipts.map(function (receipt) { return '<li><time>' + app.esc(receipt.at) + '</time><span><strong>' + app.esc(app.humanize(receipt.operation)) + '</strong><br>' + app.esc(receipt.outcome) + '</span><span>' + app.esc(receipt.receiptId) + '</span></li>'; }).join("") + '</ul>' : '<p>No operation receipts returned for this applicant.</p>';
  }
  function renderCommunications() {
    var comm = app.state.workbench.communications || {};
    var draft = ensureCommunicationDraft();
    var enabled = communicationEnabled();
    var selectedTemplate = selectedCommunicationTemplate();
    var selectedAuthority = selectedTemplate.authorityProjection || {};
    var templates = communicationTemplates(comm);
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-4"><header><div><h2>Template gallery</h2><p>Recommendation and template copy come from Communication Authority metadata.</p></div></header><div class="eduops-template-gallery">' + templates.map(function (item) { var recommended = item.recommended === true || item.messageType === comm.recommendedMessageType; return '<button type="button" class="eduops-template-card" data-communication-template="' + app.esc(item.templateId || item.messageType) + '" data-message-type="' + app.esc(item.messageType) + '" data-recommended="' + (recommended ? "true" : "false") + '" aria-pressed="' + (draft.templateId === (item.templateId || item.messageType) ? "true" : "false") + '"><strong>' + app.esc(recommended ? "Recommended: " + (item.selectedOptionLabel || item.label) : (item.selectedOptionLabel || item.label)) + '</strong><span>' + app.esc(item.label || item.messageType) + '</span><small>' + app.esc(item.purpose || item.whenToUse || item.stageSuitability) + '</small></button>'; }).join("") + '</div><div class="eduops-eligibility-panel">' + definition([["Recipient", draft.recipient || comm.effectiveEmail || identity().email], ["Contactability", (app.state.workbench.contactability || {}).state], ["Cooling-off until", comm.coolingOffUntil], ["Delivery state", comm.deliveryState], ["Latest communication", comm.latestCommunication], ["Selected template", selectedTemplate.selectedOptionLabel || selectedTemplate.label || draft.messageType], ["Authority status", selectedAuthority.Comm_Status], ["Authority reason", selectedTemplate.canSendNow ? "Authority permits communication preview." : (selectedTemplate.blockReason || selectedTemplate.blockCode)], ["Recommended template", comm.operatorRecommendation]]) + '</div></section><section class="eduops-panel-card eduops-span-8"><header><div><h2>Reviewed individual message</h2><p>The existing Communication Authority revalidates recipient, template, cooling-off, idempotency and contactability.</p></div><span class="eduops-capability-state" data-state="' + (enabled ? "READY" : "DISABLED") + '">' + (enabled ? "Preview required" : "Disabled") + '</span></header><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Recipient<input id="eduopsCommRecipient" type="email" value="' + app.esc(draft.recipient) + '"></label><label class="eduops-field eduops-field-wide">Subject<input id="eduopsCommSubject" type="text" value="' + app.esc(draft.subject) + '"></label><label class="eduops-field eduops-field-wide">Editable preview body<textarea id="eduopsCommBody" rows="8">' + app.esc(draft.body) + '</textarea></label></div><div class="eduops-action-row"><button class="eduops-button eduops-button-primary" type="button" data-preview-command="SEND_INDIVIDUAL_COMMUNICATION"' + (enabled ? "" : " disabled") + '>Generate authority preview</button></div><p class="eduops-action-reason">' + app.esc(enabled ? "Preview is required before confirmation." : communicationDisabledReason()) + '</p></section><section class="eduops-panel-card eduops-span-12"><header><div><h2>Communication history</h2><p>Recent EduOps receipts for this exact applicant.</p></div></header><div id="eduopsCommunicationHistory" class="eduops-loading-state">Loading communication history...</div></section></div>';
  }
  function renderPortal() {
    var portal = app.state.workbench.portal || {};
    var enabled = commandEnabled("PORTAL_ACCESS", "CAN_MANAGE_PORTAL_ACCESS");
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-8"><header><div><h2>Portal access authority</h2><p>Applicant-specific state; no reusable link is persisted in the Workbench.</p></div><span class="eduops-status-badge" data-state="' + (portal.locked ? "BLOCKED" : "READY") + '">' + (portal.locked ? "Locked" : "Open") + '</span></header>' + definition([["Access state", portal.accessState || portal.state], ["Submission", portal.submitted ? "Submitted" : "Not submitted"], ["Token state", portal.tokenState], ["Lock state", portal.locked ? "Locked" : "Unlocked"]]) + '<button class="eduops-button eduops-button-secondary" type="button" data-portal-communications>Prepare resend in Communications</button></section><section class="eduops-panel-card eduops-span-4"><header><div><h2>Portal access controls</h2><p>Portal actions are unavailable in this release.</p></div></header><label class="eduops-field">Portal action<select id="eduopsPortalAction"><option value="' + (portal.locked ? "UNLOCK" : "LOCK") + '">' + (portal.locked ? "Unlock access" : "Lock access") + '</option><option value="RESET">Reset portal link</option></select></label><button class="eduops-button eduops-button-primary" type="button" data-preview-command="PORTAL_ACCESS"' + (enabled ? "" : " disabled") + '>Preview Portal action</button><p class="eduops-action-reason">' + app.esc(disabledReason("PORTAL_ACCESS", "CAN_MANAGE_PORTAL_ACCESS")) + '</p></section></div>';
  }
  function renderContactability() {
    var contact = app.state.workbench.contactability || {};
    var enabled = commandEnabled("CONTACTABILITY_CORRECTION", "CAN_OPEN_REVIEW_WORKSPACE");
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-6"><header><div><h2>Canonical contactability</h2><p>Current contact facts and suppression state.</p></div><span class="eduops-status-badge" data-state="' + app.esc(contact.state || "UNKNOWN") + '">' + app.esc(app.humanize(contact.state)) + '</span></header>' + definition([["Effective email", contact.effectiveEmail || identity().email], ["Email source", contact.emailSource], ["Phone / WhatsApp", contact.phone || identity().phone], ["Valid email", contact.hasValidEmail ? "Yes" : "No"], ["Phone fallback", contact.hasPhoneFallback ? "Available" : "Unavailable"], ["Bounce / suppression", contact.suppressionState]]) + '<p class="eduops-explanation"><strong>No message was sent.</strong> WhatsApp fallback remains a separately authorised export path.</p></section><section class="eduops-panel-card eduops-span-6"><header><div><h2>Correct email</h2><p>The existing contactability authority requires an exact applicant and reason.</p></div><span class="eduops-capability-state" data-state="' + (enabled ? "READY" : "DISABLED") + '">' + (enabled ? "Preview required" : "Disabled") + '</span></header><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Corrected email<input id="eduopsCorrectedEmail" type="email" value="' + app.esc(contact.effectiveEmail || identity().email || "") + '"></label><label class="eduops-field eduops-field-wide">Correction reason<textarea id="eduopsContactReason" placeholder="Required audit reason"></textarea></label></div><button class="eduops-button eduops-button-primary" type="button" data-preview-command="CONTACTABILITY_CORRECTION"' + (enabled ? "" : " disabled") + '>Preview contact correction</button><p class="eduops-action-reason">Phone correction is not exposed because no dedicated existing authority was proven. ' + app.esc(disabledReason("CONTACTABILITY_CORRECTION", "CAN_OPEN_REVIEW_WORKSPACE")) + '</p></section></div>';
  }
  function renderAudit() {
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><h2>Applicant operation history</h2><p>Versioned receipts and source provenance for this exact identity.</p></div></header><div id="eduopsOperationHistory" class="eduops-loading-state">Loading operation history...</div></section></div>';
  }
  function loadHistory() {
    app.call("eduops_getOperationHistory", { applicantId: identity().applicantId, expectedSnapshotId: app.state.workbench.snapshotId }).then(function (result) {
      var target = byId("eduopsOperationHistory");
      if (!target) return;
      target.innerHTML = historyListHtml(result);
    }).catch(function (error) { var target = byId("eduopsOperationHistory"); if (target) target.textContent = "History unavailable: " + (error.message || error); });
  }
  function loadCommunicationHistory() {
    app.call("eduops_getOperationHistory", { applicantId: identity().applicantId, expectedSnapshotId: app.state.workbench.snapshotId }).then(function (result) {
      var target = byId("eduopsCommunicationHistory");
      if (!target) return;
      var receipts = (result.receipts || []).filter(function (receipt) { return /COMMUNICATION/i.test(String(receipt.operation || "")); });
      target.innerHTML = historyListHtml({ receipts: receipts });
    }).catch(function (error) { var target = byId("eduopsCommunicationHistory"); if (target) target.textContent = "Communication history unavailable: " + (error.message || error); });
  }
  function renderPanel() {
    if (!app.state.workbench) return;
    renderTabs();
    if (app.state.activeTab === "overview") dom.panel.innerHTML = renderOverview();
    else if (app.state.activeTab === "documents") dom.panel.innerHTML = renderDocuments();
    else if (app.state.activeTab === "audit") { dom.panel.innerHTML = renderAudit(); loadHistory(); }
    else if (app.state.activeTab === "finance") dom.panel.innerHTML = renderFinance();
    else if (app.state.activeTab === "communications") { dom.panel.innerHTML = renderCommunications(); loadCommunicationHistory(); }
    else if (app.state.activeTab === "portal") dom.panel.innerHTML = renderPortal();
    else if (app.state.activeTab === "contactability") dom.panel.innerHTML = renderContactability();
  }

  app.openWorkbench = function (applicantId, source, tab) {
    ensureDom();
    if (app.state.workbench && app.state.dirty) return app.requestWorkbenchLeave(function () { app.openWorkbench(applicantId, source, tab); }, source);
    app.state.returnContext = app.state.workbench ? app.state.returnContext : app.snapshotReturnContext();
    dom.root.hidden = false;
    dom.root.setAttribute("aria-hidden", "false");
    dom.panel.innerHTML = '<div class="eduops-loading-state"><strong>Opening exact applicant Workbench</strong><span>' + app.esc(applicantId) + ' / ' + app.esc(app.state.snapshotId) + '</span></div>';
    app.setInteractionState("LOADING", "Opening exact applicant " + applicantId + ".");
    app.call("eduops_getApplicantWorkbench", { product: app.state.product, applicantId: applicantId, expectedSnapshotId: app.state.snapshotId, returnContext: app.state.returnContext }).then(function (result) {
      app.state.workbench = result;
      app.state.capabilities = normalizeCapabilityMap(result.capabilities || app.state.capabilities || {});
      app.state.featureFlags = result.featureFlags || app.state.featureFlags || {};
      app.state.activeTab = tab || "overview";
      app.state.documentManifest = null;
      app.state.documentRenditions = {};
      app.state.documentDraft = {};
      app.state.dirty = false;
      app.pushRoute("workbench=" + encodeURIComponent(result.applicantId));
      dom.title.textContent = result.identity.displayName || result.applicantId;
      dom.subtitle.textContent = result.identity.applicantId + " / exact row " + result.identity.rowNumber;
      dom.context.textContent = result.product + " Individual Workbench";
      authorityHeader();
      updateApplicantNavigation();
      renderPanel();
      if (typeof app.renderWorkSession === "function") app.renderWorkSession();
      app.setInteractionState("SUCCESS", (result.identity.displayName || result.applicantId) + " Workbench opened.");
      byId("eduopsCloseWorkbench").focus();
    }).catch(function (error) { dom.panel.innerHTML = '<div class="eduops-error-state"><strong>Workbench unavailable</strong><span>' + app.esc(error.message || error) + '</span></div>'; app.setInteractionState("ERROR", "Workbench failed to open: " + (error.message || error)); });
  };
  app.closeWorkbench = function (source, fromHistory) {
    if (app.state.dirty) return app.requestWorkbenchLeave(function () { app.closeWorkbench(source, fromHistory); }, source);
    ensureDom();
    dom.root.hidden = true;
    dom.root.setAttribute("aria-hidden", "true");
    app.state.workbench = null;
    app.state.documentManifest = null;
    app.state.dirty = false;
    if (!fromHistory) app.replaceRoute("workload");
    return app.restoreReturnContext();
  };
  app.requestWorkbenchLeave = function (leave, source) {
    if (!app.state.dirty) return leave();
    app.state.pendingLeave = leave;
    app.openConfirm({ title: "Unsaved Workbench changes", html: '<p>Your draft changes for <strong>' + app.esc(identity().applicantId) + '</strong> have not been executed.</p><p>Stay to continue editing, or discard the local draft and leave.</p>', cancelLabel: "Stay and continue editing", proceedLabel: "Discard changes and leave", source: source, onProceed: function () { app.state.dirty = false; var next = app.state.pendingLeave; app.state.pendingLeave = null; app.closeConfirm(false); if (next) next(); } });
  };
  function refreshWorkbenchAfterReceipt(receipt) {
    if (!app.state.workbench) return Promise.resolve(receipt);
    var previousTab = app.state.activeTab;
    var applicantId = identity().applicantId;
    return app.call("eduops_getApplicantWorkbench", { product: app.state.product, applicantId: applicantId, expectedSnapshotId: app.state.snapshotId || app.state.workbench.snapshotId, returnContext: app.state.returnContext }).then(function (result) {
      app.state.workbench = result;
      app.state.workbench.lastReceipt = receipt;
      app.state.capabilities = normalizeCapabilityMap(result.capabilities || app.state.capabilities || {});
      app.state.featureFlags = result.featureFlags || app.state.featureFlags || {};
      app.state.activeTab = previousTab;
      app.state.documentManifest = null;
      app.state.documentRenditions = {};
      app.state.documentDraft = {};
      app.state.communicationDraft = null;
      app.state.dirty = false;
      dom.title.textContent = result.identity.displayName || result.applicantId;
      dom.subtitle.textContent = result.identity.applicantId + " / exact row " + result.identity.rowNumber;
      authorityHeader();
      updateApplicantNavigation();
      renderPanel();
      return receipt;
    });
  }

  function commandDraft(operation, source, file) {
    if (operation === "DOCUMENT_REVIEW") {
      var current = file ? app.state.documentDraft[file.documentKey] || { status: file.status || "REVIEW_REQUIRED", note: "" } : {};
      if (source && source.getAttribute("data-command-scope") === "all") {
        return { docs: (app.state.documentManifest.files || []).map(function (item) { var draft = app.state.documentDraft[item.documentKey] || { status: item.status || "REVIEW_REQUIRED", note: "" }; return { file: item.sourceField, status: draft.status, comment: draft.note }; }) };
      }
      return current;
    }
    if (operation === "FINANCE_EVIDENCE_DECISION") return { decision: byId("eduopsFinanceDecision").value, reason: byId("eduopsFinanceNote").value };
    if (operation === "SEND_INDIVIDUAL_COMMUNICATION") {
      var comm = ensureCommunicationDraft();
      comm.recipient = byId("eduopsCommRecipient").value;
      comm.subject = byId("eduopsCommSubject").value;
      comm.body = byId("eduopsCommBody").value;
      return { messageType: comm.messageType, recipient: comm.recipient, subject: comm.subject, body: comm.body };
    }
    if (operation === "PORTAL_ACCESS") return { action: byId("eduopsPortalAction").value };
    if (operation === "CONTACTABILITY_CORRECTION") return { email: byId("eduopsCorrectedEmail").value, reason: byId("eduopsContactReason").value };
    return {};
  }
  function previewCommand(operation, source) {
    var manifest = app.state.documentManifest;
    var file = manifest && manifest.files && manifest.files[app.state.selectedDocumentIndex];
    var payload = { operation: operation, product: app.state.product, applicantId: identity().applicantId, rowKey: app.state.workbench.rowKey, snapshotId: app.state.workbench.snapshotId, queryFingerprint: app.queryFingerprint(), idempotencyKey: app.idempotencyKey(operation, identity().applicantId), document: file ? documentPayload(file) : null, draft: commandDraft(operation, source, file) };
    var token = app.beginControlAction(source, "Creating preview...", "Validating " + app.humanize(operation) + " for " + payload.applicantId + ".");
    app.call("eduops_previewCommand", payload).then(function (preview) {
      app.finishControlAction(token, "SUCCESS", app.humanize(operation) + " preview is ready for confirmation.");
      app.openConfirm({ title: "Confirm " + app.humanize(operation), html: '<div class="eduops-command-preview"><p><strong>' + app.esc(preview.summary || "Authoritative preview returned") + '</strong></p>' + definition([["ApplicantID", payload.applicantId], ["Snapshot", payload.snapshotId], ["Capability", preview.requiredCapability], ["Risk", preview.risk || "STANDARD"], ["Preview ID", preview.previewId], ["Expires", preview.expiresAt]]) + '</div>', proceedLabel: "Execute operation", cancelLabel: "Return without action", source: source, onProceed: function () { var executeToken = app.beginControlAction(byId("eduopsConfirmProceed"), "Executing...", "Executing the confirmed operation once."); app.call("eduops_executeCommand", { previewId: preview.previewId, idempotencyKey: payload.idempotencyKey, confirmation: true }).then(function (receipt) { app.finishControlAction(executeToken, "SUCCESS", "Receipt " + receipt.receiptId + " returned: " + receipt.outcome + ". Refreshing authoritative applicant state."); app.state.dirty = false; app.closeConfirm(false); app.toast("Receipt " + receipt.receiptId + " returned: " + receipt.outcome); return refreshWorkbenchAfterReceipt(receipt).catch(function (refreshError) { app.state.workbench.lastReceipt = receipt; renderPanel(); app.toast("Receipt returned, but authoritative refresh failed: " + (refreshError.message || refreshError)); }); }).catch(function (error) { app.finishControlAction(executeToken, "BLOCKED", "Operation blocked: " + (error.message || error)); app.closeConfirm(false); app.toast("Operation blocked: " + (error.message || error)); }); } });
    }).catch(function (error) { app.finishControlAction(token, "BLOCKED", "Preview blocked: " + (error.message || error)); app.toast("Preview blocked: " + (error.message || error)); });
  }

  app.bindWorkbench = function () {
    ensureDom();
    byId("eduopsCloseWorkbench").addEventListener("click", function () { app.closeWorkbench(this); });
    byId("eduopsWorkbenchPrevious").addEventListener("click", function () { navigateApplicant(-1, this); });
    byId("eduopsWorkbenchNext").addEventListener("click", function () { navigateApplicant(1, this); });
    byId("eduopsWorkbenchMore").addEventListener("click", function () { app.state.activeTab = "audit"; renderPanel(); app.setInteractionState("SUCCESS", "Audit tab opened."); });
    dom.root.addEventListener("click", function (event) {
      var tab = event.target.closest("[data-workbench-tab],[data-workbench-tab-jump]");
      if (tab) { app.state.activeTab = tab.getAttribute("data-workbench-tab") || tab.getAttribute("data-workbench-tab-jump"); renderPanel(); app.setInteractionState("SUCCESS", app.humanize(app.state.activeTab) + " tab opened."); return; }
      var returnToWorkload = event.target.closest("[data-workbench-return]");
      if (returnToWorkload) { app.closeWorkbench(returnToWorkload); return; }
      var documentButton = event.target.closest("[data-document-index]");
      if (documentButton) { loadRendition(Number(documentButton.getAttribute("data-document-index")), true); return; }
      var move = event.target.closest("[data-document-move]");
      if (move) { loadRendition(app.state.selectedDocumentIndex + Number(move.getAttribute("data-document-move")), true); return; }
      var original = event.target.closest("[data-open-original]");
      if (original) { var file = app.state.documentManifest.files[app.state.selectedDocumentIndex]; var originalToken = app.beginControlAction(original, "Authorising...", "Authorising the separate canonical original action."); app.call("eduops_getDocumentFileAction", documentPayload(file)).then(function (result) { var url = result.url || result.openUrl || result.portalUrl || ""; app.finishControlAction(originalToken, url ? "SUCCESS" : "BLOCKED", url ? "Canonical original action opened in a separate tab." : (result.message || "Open Original returned no reusable URL.")); if (url) window.open(url, "_blank", "noopener,noreferrer"); else app.toast(result.message || "Open Original action returned without a reusable URL."); }).catch(function (error) { app.finishControlAction(originalToken, "BLOCKED", "Open Original blocked: " + (error.message || error)); app.toast("Open Original blocked: " + (error.message || error)); }); return; }
      var command = event.target.closest("[data-preview-command]");
      if (command) previewCommand(command.getAttribute("data-preview-command"), command);
      var correction = event.target.closest("[data-request-correction]");
      if (correction) { app.state.activeTab = "communications"; applyCommunicationTemplate(communicationTemplateById("docs_missing", "docs_missing")); renderPanel(); app.setInteractionState("SUCCESS", "Correction request prepared in Communications. Review the message before preview."); return; }
      var portalComm = event.target.closest("[data-portal-communications]");
      if (portalComm) { app.state.activeTab = "communications"; applyCommunicationTemplate(communicationTemplateById("legacy_invite", "legacy_invite")); renderPanel(); app.setInteractionState("SUCCESS", "Portal resend prepared in Communications. No message has been sent."); return; }
      var template = event.target.closest("[data-communication-template]");
      if (template) { applyCommunicationTemplate(communicationTemplateById(template.getAttribute("data-communication-template"), template.getAttribute("data-message-type"))); renderPanel(); app.setInteractionState("SUCCESS", template.textContent.trim().replace(/\s+/g, " ") + " selected."); return; }
    });
    dom.root.addEventListener("contextmenu", function (event) {
      var documentButton = event.target.closest("[data-document-index]");
      if (!documentButton || app.state.activeTab !== "documents") return;
      event.preventDefault();
      app.state.selectedDocumentIndex = Number(documentButton.getAttribute("data-document-index"));
      renderPanel();
      var openButton = dom.root.querySelector("[data-open-original]");
      if (openButton) openButton.click();
    });
    dom.root.addEventListener("input", function (event) {
      var manifest = app.state.documentManifest;
      var file = manifest && manifest.files && manifest.files[app.state.selectedDocumentIndex];
      if (event.target.matches("[data-document-status],[data-document-note]")) {
        if (!file) return;
        var draft = app.state.documentDraft[file.documentKey] || {};
        if (event.target.matches("[data-document-status]")) draft.status = event.target.value;
        if (event.target.matches("[data-document-note]")) draft.note = event.target.value;
        app.state.documentDraft[file.documentKey] = draft;
        app.state.dirty = true;
      }
      if (event.target.matches("#eduopsCommRecipient,#eduopsCommSubject,#eduopsCommBody,#eduopsFinanceDecision,#eduopsFinanceNote,#eduopsPortalAction,#eduopsCorrectedEmail,#eduopsContactReason")) app.state.dirty = true;
    });
    dom.root.addEventListener("keydown", function (event) {
      if (app.state.activeTab !== "documents" || /INPUT|TEXTAREA|SELECT/.test(event.target.tagName)) return;
      if (event.key === "ArrowLeft" || event.key === "ArrowRight") { event.preventDefault(); loadRendition(app.state.selectedDocumentIndex + (event.key === "ArrowLeft" ? -1 : 1), true); }
    });
  };
  app.renderWorkbenchPanel = renderPanel;
})();
</script>
