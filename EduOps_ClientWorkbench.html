ion class="eduops-panel-card eduops-span-8"><header><div><h2>Reviewed individual message</h2><p>Communication Authority controls recipient, availability, editing and final revalidation.</p></div><span class="eduops-capability-state" data-state="' + (enabled ? "READY" : "DISABLED") + '">' + (enabled ? "Preview required" : "Disabled") + '</span></header><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Recipient<input id="eduopsCommRecipient" type="email" readonly value="' + app.esc(draft.recipient) + '"></label><label class="eduops-field eduops-field-wide">Subject<input id="eduopsCommSubject" type="text"' + (editable ? "" : " readonly") + ' value="' + app.esc(draft.subject) + '"></label><label class="eduops-field eduops-field-wide">Full message body<textarea id="eduopsCommBody" rows="10"' + (editable ? "" : " readonly") + '>' + app.esc(draft.body) + '</textarea></label></div><div class="eduops-action-row"><button class="eduops-button eduops-button-primary" type="button" data-preview-command="SEND_INDIVIDUAL_COMMUNICATION"' + (enabled ? "" : " disabled") + '>Generate authority preview</button></div><p class="eduops-action-reason">' + app.esc(enabled ? (selectedTemplate.description || "Communication Authority permits preview.") : communicationDisabledReason()) + '</p></section><section class="eduops-panel-card eduops-span-12"><header><div><h2>Communication history</h2><p>Recent EduOps receipts for this exact applicant.</p></div></header><div id="eduopsCommunicationHistory" class="eduops-loading-state">Loading communication history...</div></section></div>';
  }
  function renderPortal() {
    var portal = app.state.workbench.portal || {};
    if (portal.schemaVersion !== "EDUOPS_PORTAL_AUTHORITY_V1" || portal.available !== true) return '<div class="eduops-error-state"><strong>' + app.esc(app.authorityUnavailable("portal-access")) + '</strong><span>' + app.esc(portal.reason || "BACKEND_CONTRACT_MISSING") + '</span><button class="eduops-button eduops-button-secondary" type="button" data-portal-communications>Open Communications</button></div>';
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><h2>Portal Access Domain</h2><p>Read-only authoritative access projection. No portal mutation contract is active.</p></div></header>' + definition([["Access state", portal.accessState], ["Token state", portal.tokenState], ["Expires", portal.expiresAt], ["Reason", portal.reason]]) + '<p class="eduops-action-reason">' + app.esc(app.authorityUnavailable("portal-access operation")) + '</p></section></div>';
  }
  function renderContactability() {
    var contact = app.state.workbench.contactability || {};
    var enabled = commandEnabled("CONTACTABILITY_CORRECTION", "CAN_OPEN_REVIEW_WORKSPACE");
    if (contact.schemaVersion !== "EDUOPS_CONTACTABILITY_AUTHORITY_V1" || contact.available !== true) return '<div class="eduops-error-state"><strong>' + app.esc(app.authorityUnavailable("contactability")) + '</strong><span>' + app.esc(contact.reason || "BACKEND_CONTRACT_MISSING") + '</span></div>';
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-6"><header><div><h2>Canonical contactability</h2><p>Current contact facts and suppression state.</p></div><span class="eduops-status-badge" data-state="' + app.esc(contact.state) + '">' + app.esc(app.authorityLabel(contact.presentation, "contactability")) + '</span></header>' + definition([["Effective email", contact.effectiveEmail], ["Email source", contact.emailSource], ["Phone / WhatsApp", contact.phone], ["Valid email", contact.hasValidEmail ? "Yes" : "No"], ["Phone fallback", contact.hasPhoneFallback ? "Available" : "Unavailable"], ["Bounce / suppression", contact.suppressionState]]) + '</section><section class="eduops-panel-card eduops-span-6"><header><div><h2>Correct email</h2><p>The backend will revalidate the exact applicant and reason.</p></div><span class="eduops-capability-state" data-state="' + (enabled ? "READY" : "DISABLED") + '">' + (enabled ? "Preview required" : "Disabled") + '</span></header><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Corrected email<input id="eduopsCorrectedEmail" type="email" value="' + app.esc(contact.effectiveEmail) + '"></label><label class="eduops-field eduops-field-wide">Correction reason<textarea id="eduopsContactReason" placeholder="Required audit reason"></textarea></label></div><button class="eduops-button eduops-button-primary" type="button" data-preview-command="CONTACTABILITY_CORRECTION"' + (enabled ? "" : " disabled") + '>Preview contact correction</button><p class="eduops-action-reason">' + app.esc(disabledReason("CONTACTABILITY_CORRECTION", "CAN_OPEN_REVIEW_WORKSPACE")) + '</p></section></div>';
  }
  function renderAudit() {
    return '<div class="eduops-panel-grid"><section class="eduops-panel-card eduops-span-12"><header><div><h2>Applicant operation history</h2><p>Versioned receipts and source provenance for this exact identity.</p></div></header><div id="eduopsOperationHistory" class="eduops-loading-state">Loading operation history...</div></section></div>';
  }
  function loadHistory() {
    app.call("eduops_getOperationHistory", { applicantId: identity().applicantId, expectedSnapshotId: app.state.workbench.snapshotId }).then(function (result) {
      var target = byId("eduopsOperationHistory");
      if (!target) return;
      target.innerHTML = historyListHtml(result, false);
    }).catch(function (error) { var target = byId("eduopsOperationHistory"); if (target) target.textContent = "History unavailable: " + (error.message || error); });
  }
  function loadCommunicationHistory() {
    app.call("eduops_getOperationHistory", { applicantId: identity().applicantId, expectedSnapshotId: app.state.workbench.snapshotId }).then(function (result) {
      var target = byId("eduopsCommunicationHistory");
      if (!target) return;
      target.innerHTML = historyListHtml(result, true);
    }).catch(function (error) { var target = byId("eduopsCommunicationHistory"); if (target) target.textContent = "Communication history unavailable: " + (error.message || error); });
  }
  function renderPanel() {
    if (!app.state.workbench) return;
    renderTabs();
    if (app.state.activeTab === "overview") dom.panel.innerHTML = renderOverview();
    else if (app.state.activeTab === "documents") dom.panel.innerHTML = renderDocuments();
    else if (app.state.activeTab === "audit") { dom.panel.innerHTML = renderAudit(); loadHistory(); }
    else if (app.state.activeTab === "finance") dom.panel.innerHTML = renderFinance();
    else if (app.state.activeTab === "communications") { dom.panel.innerHTML = renderCommunications(); loadCommunicationHistory(); }
    else if (app.state.activeTab === "portal") dom.panel.innerHTML = renderPortal();
    else if (app.state.activeTab === "contactability") dom.panel.innerHTML = renderContactability();
  }

  app.openWorkbench = function (applicantId, source, tab) {
    ensureDom();
    if (app.state.workbench && app.state.dirty) return app.requestWorkbenchLeave(function () { app.openWorkbench(applicantId, source, tab); }, source);
    app.state.returnContext = app.state.workbench ? app.state.returnContext : app.snapshotReturnContext();
    dom.root.hidden = false;
    dom.root.setAttribute("aria-hidden", "false");
    dom.panel.innerHTML = '<div class="eduops-loading-state"><strong>Opening exact applicant Workbench</strong><span>' + app.esc(applicantId) + ' / ' + app.esc(app.state.snapshotId) + '</span></div>';
    app.setInteractionState("LOADING", "Opening exact applicant " + applicantId + ".");
    app.call("eduops_getApplicantWorkbench", { product: app.state.product, applicantId: applicantId, expectedSnapshotId: app.state.snapshotId, returnContext: app.state.returnContext }).then(function (result) {
      if (!result || result.schemaVersion !== "EDUOPS_APPLICANT_WORKBENCH_V2") throw new Error(app.authorityUnavailable("applicant workbench"));
      app.state.workbench = result;
      app.state.operationAvailability = result.operationAvailability || {};
      app.state.activeTab = tab || "overview";
      app.state.documentManifest = null;
      app.state.documentRenditions = {};
      app.state.documentDraft = {};
      app.state.dirty = false;
      app.pushRoute("workbench=" + encodeURIComponent(result.applicantId));
      dom.title.textContent = result.identity.displayName || result.applicantId;
      dom.subtitle.textContent = result.identity.applicantId + " / exact row " + result.identity.rowNumber;
      dom.context.textContent = result.product + " Individual Workbench";
      authorityHeader();
      updateApplicantNavigation();
      renderPanel();
      if (typeof app.renderWorkSession === "function") app.renderWorkSession();
      app.setInteractionState("SUCCESS", (result.identity.displayName || result.applicantId) + " Workbench opened.");
      byId("eduopsCloseWorkbench").focus();
    }).catch(function (error) { dom.panel.innerHTML = '<div class="eduops-error-state"><strong>Workbench unavailable</strong><span>' + app.esc(error.message || error) + '</span></div>'; app.setInteractionState("ERROR", "Workbench failed to open: " + (error.message || error)); });
  };
  app.closeWorkbench = function (source, fromHistory) {
    if (app.state.dirty) return app.requestWorkbenchLeave(function () { app.closeWorkbench(source, fromHistory); }, source);
    ensureDom();
    dom.root.hidden = true;
    dom.root.setAttribute("aria-hidden", "true");
    app.state.workbench = null;
    app.state.documentManifest = null;
    app.state.dirty = false;
    if (!fromHistory) app.replaceRoute("workload");
    return app.restoreReturnContext();
  };
  app.requestWorkbenchLeave = function (leave, source) {
    if (!app.state.dirty) return leave();
    app.state.pendingLeave = leave;
    app.openConfirm({ title: "Unsaved Workbench changes", html: '<p>Your draft changes for <strong>' + app.esc(identity().applicantId) + '</strong> have not been executed.</p><p>Stay to continue editing, or discard the local draft and leave.</p>', cancelLabel: "Stay and continue editing", proceedLabel: "Discard changes and leave", source: source, onProceed: function () { app.state.dirty = false; var next = app.state.pendingLeave; app.state.pendingLeave = null; app.closeConfirm(false); if (next) next(); } });
  };
  function refreshWorkbenchAfterReceipt(receipt) {
    if (!app.state.workbench) return Promise.resolve(receipt);
    var previousTab = app.state.activeTab;
    var applicantId = identity().applicantId;
    return app.call("eduops_getApplicantWorkbench", { product: app.state.product, applicantId: applicantId, expectedSnapshotId: app.state.snapshotId || app.state.workbench.snapshotId, returnContext: app.state.returnContext }).then(function (result) {
      if (!result || result.schemaVersion !== "EDUOPS_APPLICANT_WORKBENCH_V2") throw new Error(app.authorityUnavailable("applicant workbench"));
      app.state.workbench = result;
      app.state.workbench.lastReceipt = receipt;
      app.state.operationAvailability = result.operationAvailability || {};
      app.state.activeTab = previousTab;
      app.state.documentManifest = null;
      app.state.documentRenditions = {};
      app.state.documentDraft = {};
      app.state.communicationDraft = null;
      app.state.dirty = false;
      dom.title.textContent = result.identity.displayName || result.applicantId;
      dom.subtitle.textContent = result.identity.applicantId + " / exact row " + result.identity.rowNumber;
      authorityHeader();
      updateApplicantNavigation();
      renderPanel();
      return receipt;
    });
  }

  function commandDraft(operation, source, file) {
    if (operation === "DOCUMENT_REVIEW") {
      var current = file ? app.state.documentDraft[file.documentKey] || { status: file.status || "", note: "" } : {};
      if (source && source.getAttribute("data-command-scope") === "all") {
        return { docs: documentFiles().map(function (item) { var draft = app.state.documentDraft[item.documentKey] || { status: item.status || "", note: "" }; return { file: item.sourceField, status: draft.status, comment: draft.note }; }) };
      }
      return current;
    }
    if (operation === "FINANCE_EVIDENCE_DECISION") return { decision: byId("eduopsFinanceDecision").value, reason: byId("eduopsFinanceNote").value };
    if (operation === "SEND_INDIVIDUAL_COMMUNICATION") {
      var comm = ensureCommunicationDraft();
      comm.recipient = byId("eduopsCommRecipient").value;
      comm.subject = byId("eduopsCommSubject").value;
      comm.body = byId("eduopsCommBody").value;
      return { templateId: comm.templateId, recipient: comm.recipient, subject: comm.subject, body: comm.body };
    }
    if (operation === "CONTACTABILITY_CORRECTION") return { email: byId("eduopsCorrectedEmail").value, reason: byId("eduopsContactReason").value };
    return {};
  }
  function previewCommand(operation, source) {
    app.invalidateOperationAuthority("A new operation preview was requested.");
    var manifest = app.state.documentManifest;
    var file = manifest && documentFiles()[app.state.selectedDocumentIndex];
    var payload = { operation: operation, product: app.state.product, applicantId: identity().applicantId, rowKey: app.state.workbench.rowKey, snapshotId: app.state.workbench.snapshotId, idempotencyKey: app.idempotencyKey(operation, identity().applicantId), document: file ? documentPayload(file) : null, draft: commandDraft(operation, source, file) };
    var token = app.beginControlAction(source, "Creating preview...", "Validating the requested operation for " + payload.applicantId + ".");
    app.call("eduops_previewCommand", payload).then(function (preview) {
      app.state.commandPreview = preview;
      app.state.commandIdempotencyKey = payload.idempotencyKey;
      app.state.commandExecutable = preview && preview.executable === true;
      if (!app.state.commandExecutable) { app.finishControlAction(token, "BLOCKED", preview && preview.statusReason || app.authorityUnavailable("operation preview")); return; }
      var operationLabel = preview.operationLabel || app.authorityUnavailable("operation label");
      app.finishControlAction(token, "SUCCESS", operationLabel + " preview is ready for confirmation.");
      var communicationPreview = operation === "SEND_INDIVIDUAL_COMMUNICATION";
      var previewTitle = communicationPreview ? "Send " + (preview.selectedTemplate && preview.selectedTemplate.label || app.authorityUnavailable("communication template")) + " to " + (payload.draft.recipient || app.authorityUnavailable("communication recipient")) : "Confirm " + operationLabel;
      var operatorPreview = communicationPreview ? '<div class="eduops-command-preview"><p><strong>' + app.esc(previewTitle) + '</strong></p><div class="eduops-form-grid"><label class="eduops-field eduops-field-wide">Recipient<input type="text" readonly value="' + app.esc(payload.draft.recipient || "") + '"></label><label class="eduops-field eduops-field-wide">Subject<input type="text" readonly value="' + app.esc(preview.subject || app.authorityUnavailable("preview subject")) + '"></label><label class="eduops-field eduops-field-wide">Full message body<textarea rows="12" readonly>' + app.esc(preview.body || app.authorityUnavailable("preview body")) + '</textarea></label></div><details class="eduops-technical-details"><summary>Technical details</summary>' + definition([["ApplicantID", payload.applicantId], ["Snapshot", payload.snapshotId], ["Preview ID", preview.previewId], ["Expires", preview.expiresAt]]) + '</details></div>' : '<div class="eduops-command-preview"><p><strong>' + app.esc(preview.summary || app.authorityUnavailable("operation preview")) + '</strong></p>' + definition([["ApplicantID", payload.applicantId], ["Snapshot", payload.snapshotId], ["Capability", preview.requiredCapability], ["Risk", preview.risk], ["Preview ID", preview.previewId], ["Expires", preview.expiresAt]]) + '</div>';
      app.openConfirm({ title: previewTitle, html: operatorPreview, proceedLabel: communicationPreview ? previewTitle : "Execute operation", cancelLabel: "Return without action", source: source, onProceed: function () { var executeToken = app.beginControlAction(byId("eduopsConfirmProceed"), "Executing...", "Executing the confirmed operation once."); app.call("eduops_executeCommand", { previewId: preview.previewId, idempotencyKey: payload.idempotencyKey, confirmation: true }).then(function (receipt) { app.finishControlAction(executeToken, "SUCCESS", "Receipt " + receipt.receiptId + " returned: " + receipt.outcome + ". Refreshing authoritative applicant state."); app.state.dirty = false; app.invalidateOperationAuthority("Operation receipt returned."); app.toast("Receipt " + receipt.receiptId + " returned: " + receipt.outcome); return refreshWorkbenchAfterReceipt(receipt).catch(function (refreshError) { app.state.workbench.lastReceipt = receipt; renderPanel(); app.toast("Receipt returned, but authoritative refresh failed: " + (refreshError.message || refreshError)); }); }).catch(function (error) { app.finishControlAction(executeToken, "BLOCKED", "Operation blocked: " + (error.message || error)); app.invalidateOperationAuthority("Operation execution was blocked."); app.toast("Operation blocked: " + (error.message || error)); }); } });
    }).catch(function (error) { app.invalidateOperationAuthority("Operation preview failed."); app.finishControlAction(token, "BLOCKED", "Preview blocked: " + (error.message || error)); app.toast("Preview blocked: " + (error.message || error)); });
  }

  app.bindWorkbench = function () {
    ensureDom();
    byId("eduopsCloseWorkbench").addEventListener("click", function () { app.closeWorkbench(this); });
    byId("eduopsWorkbenchPrevious").addEventListener("click", function () { navigateApplicant(-1, this); });
    byId("eduopsWorkbenchNext").addEventListener("click", function () { navigateApplicant(1, this); });
    byId("eduopsWorkbenchMore").addEventListener("click", function () { app.state.activeTab = "audit"; renderPanel(); app.setInteractionState("SUCCESS", "Audit tab opened."); });
    dom.root.addEventListener("click", function (event) {
      var tab = event.target.closest("[data-workbench-tab],[data-workbench-tab-jump]");
      if (tab) { app.state.activeTab = tab.getAttribute("data-workbench-tab") || tab.getAttribute("data-workbench-tab-jump"); renderPanel(); app.setInteractionState("SUCCESS", app.formatCode(app.state.activeTab) + " tab opened."); return; }
      var returnToWorkload = event.target.closest("[data-workbench-return]");
      if (returnToWorkload) { app.closeWorkbench(returnToWorkload); return; }
      var documentButton = event.target.closest("[data-document-index]");
      if (documentButton) { loadRendition(Number(documentButton.getAttribute("data-document-index")), true); return; }
      var move = event.target.closest("[data-document-move]");
      if (move) { loadRendition(app.state.selectedDocumentIndex + Number(move.getAttribute("data-document-move")), true); return; }
      var original = event.target.closest("[data-open-original]");
      if (original) { var file = documentFiles()[app.state.selectedDocumentIndex]; var originalToken = app.beginControlAction(original, "Authorising...", "Authorising the separate canonical original action."); app.call("eduops_getDocumentFileAction", documentPayload(file)).then(function (result) { var url = result.url || result.openUrl || result.portalUrl || ""; app.finishControlAction(originalToken, url ? "SUCCESS" : "BLOCKED", url ? "Canonical original action opened in a separate tab." : (result.message || "Open Original returned no reusable URL.")); if (url) window.open(url, "_blank", "noopener,noreferrer"); else app.toast(result.message || "Open Original action returned without a reusable URL."); }).catch(function (error) { app.finishControlAction(originalToken, "BLOCKED", "Open Original blocked: " + (error.message || error)); app.toast("Open Original blocked: " + (error.message || error)); }); return; }
      var command = event.target.closest("[data-preview-command]");
      if (command) previewCommand(command.getAttribute("data-preview-command"), command);
      var correction = event.target.closest("[data-request-correction]");
      if (correction) { app.state.activeTab = "communications"; app.state.communicationDraft = null; renderPanel(); app.setInteractionState("SUCCESS", "Communications opened. Choose the server-recommended or another available communication explicitly."); return; }
      var portalComm = event.target.closest("[data-portal-communications]");
      if (portalComm) { app.state.activeTab = "communications"; app.state.communicationDraft = null; renderPanel(); app.setInteractionState("SUCCESS", "Communications opened. Choose an available communication explicitly. No message has been sent."); return; }
      var template = event.target.closest("[data-communication-template]");
      if (template) { app.invalidateOperationAuthority("Communication changed. Revalidation is required."); applyCommunicationTemplate(communicationTemplateById(template.getAttribute("data-communication-template"), template.getAttribute("data-message-type"))); renderPanel(); app.setInteractionState("SUCCESS", template.textContent.trim().replace(/\s+/g, " ") + " selected."); return; }
    });
    dom.root.addEventListener("contextmenu", function (event) {
      var documentButton = event.target.closest("[data-document-index]");
      if (!documentButton || app.state.activeTab !== "documents") return;
      event.preventDefault();
      app.state.selectedDocumentIndex = Number(documentButton.getAttribute("data-document-index"));
      renderPanel();
      var openButton = dom.root.querySelector("[data-open-original]");
      if (openButton) openButton.click();
    });
    dom.root.addEventListener("input", function (event) {
      var manifest = app.state.documentManifest;
      var file = manifest && documentFiles()[app.state.selectedDocumentIndex];
      if (event.target.matches("[data-document-status],[data-document-note]")) {
        if (!file) return;
        var draft = app.state.documentDraft[file.documentKey] || {};
        if (event.target.matches("[data-document-status]")) draft.status = event.target.value;
        if (event.target.matches("[data-document-note]")) draft.note = event.target.value;
        app.state.documentDraft[file.documentKey] = draft;
        app.state.dirty = true;
      }
      if (event.target.matches("#eduopsCommSubject,#eduopsCommBody")) {
        var communicationDraft = app.state.communicationDraft || {};
        if (event.target.matches("#eduopsCommSubject")) communicationDraft.subject = event.target.value;
        if (event.target.matches("#eduopsCommBody")) communicationDraft.body = event.target.value;
        app.state.communicationDraft = communicationDraft;
        app.invalidateOperationAuthority("Communication content changed. Revalidation is required.");
      }
      if (event.target.matches("#eduopsCommRecipient,#eduopsCommSubject,#eduopsCommBody,#eduopsFinanceDecision,#eduopsFinanceNote,#eduopsPortalAction,#eduopsCorrectedEmail,#eduopsContactReason")) app.state.dirty = true;
    });
    dom.root.addEventListener("keydown", function (event) {
      if (app.state.activeTab !== "documents" || /INPUT|TEXTAREA|SELECT/.test(event.target.tagName)) return;
      if (event.key === "ArrowLeft" || event.key === "ArrowRight") { event.preventDefault(); loadRendition(app.state.selectedDocumentIndex + (event.key === "ArrowLeft" ? -1 : 1), true); }
    });
  };
  app.renderWorkbenchPanel = renderPanel;
})();
</script>
